# SPDX-License-Identifier: Apache-2.0
# Single source of truth for all pinned container image digests.
#
# DO NOT EDIT individual consumer files — edit this file and run:
#   make sync-images   (stamps all consumer files from the values below)
#   make check-images  (exits non-zero if any consumer diverges)
#
# Schema per entry:
#   name      — human-friendly identifier (used as key by sync/check tools)
#   ref       — full image path without tag or digest
#   tag       — optional mutable tag (informational only; digest wins)
#   digest    — sha256 digest (the authoritative pin)
#   consumers — files that must embed this digest verbatim

images:

  - name: ci-runner
    ref: ghcr.io/zynax-io/zynax/ci-runner
    digest: sha256:696d49c7912bd51943a87b95e31dce803264c85416826522872c66043930b0dc
    consumers:
      - .github/workflows/ai-context-budget.yml
      - .github/workflows/ci.yml
      - .github/workflows/pr-checks.yml
      - .github/workflows/_test-go.yml
      - .github/workflows/_test-python.yml

  - name: golang-alpine
    ref: golang
    tag: "1.26.4-alpine"
    digest: sha256:f23e8b227fb4493eabe03bede4d5a32d04092da71962f1fb79b5f7d1e6c2a17f
    consumers:
      - agents/adapters/adk/Dockerfile
      - agents/adapters/ci/Dockerfile
      - agents/adapters/git/Dockerfile
      - agents/adapters/http/Dockerfile
      - agents/adapters/llm/Dockerfile
      - infra/docker/Dockerfile.ci-runner
      - infra/docker/Dockerfile.service
      - infra/docker/Dockerfile.tools

  # Alpine base for the ci-runner final stage. digest MUST be the multi-arch
  # INDEX digest of the tag (not a single-platform manifest) — the tools-image
  # builds compile natively on ubuntu-24.04-arm with no QEMU (#839), so a
  # single-arch pin makes the arm64 `apk add` fail with exit 255. Managing it
  # here means `make check-images` governs the pin and the drift gate catches
  # a future single-arch mispin.
  - name: alpine
    ref: alpine
    tag: "3.21"
    digest: sha256:48b0309ca019d89d40f670aa1bc06e426dc0931948452e8491e3d65087abc07d
    consumers:
      - infra/docker/Dockerfile.ci-runner

  - name: distroless-static
    ref: gcr.io/distroless/static
    tag: nonroot
    digest: sha256:dfadf31470f770fcabd48903762dce126958e98d1ce320acf1216bbfaa42d79c
    consumers:
      - agents/adapters/adk/Dockerfile
      - agents/adapters/ci/Dockerfile
      - agents/adapters/git/Dockerfile
      - agents/adapters/http/Dockerfile
      - agents/adapters/llm/Dockerfile
      - infra/docker/Dockerfile.service

  # Alpine (musl) replaced Debian slim for the Python adapters: trixie's
  # perl-base/ncurses carried unfixed CRITICAL/HIGH CVEs the adapters never
  # use, and every locked native dep ships musllinux wheels (protobuf falls
  # back to its pure-python wheel), so the install stays wheels-only.
  - name: python-alpine
    ref: python
    tag: "3.12-alpine"
    digest: sha256:f7fd610959cae736251523b54eb26cecb74f60ffa60bf39d9faccf128b526ab8
    consumers:
      - agents/adapters/langgraph/Dockerfile

  # Python base for the developer tools image (distinct from python-alpine,
  # which is 3.12 for the adapters). digest MUST be the multi-arch INDEX digest
  # of the tag — a single-platform pin breaks the native arm64 tools-image
  # build (see the `alpine` entry above for the failure mode).
  - name: python-tools-alpine
    ref: python
    tag: "3.14-alpine"
    digest: sha256:003970a263347645cd23d4f90929ad16ba7ce7d808ee4674ffcc93cb21cc289f
    consumers:
      - infra/docker/Dockerfile.tools

  # Postgres base image for the thin project-owned chart (ADR-026). The chart
  # renders `<ref>:<tag>@<digest>`; the digest is the multi-arch index digest
  # of the tag and is stamped into the chart values via the banner region.
  - name: postgres
    ref: postgres
    tag: "17.10"
    digest: sha256:ef92240eff6b0bcce8ccf038c2edcd0d8fd8ef90621849993b8c8995881ab09a
    consumers:
      - helm/charts/postgres/values.yaml

  # ── Zynax service images ──────────────────────────────────────────────────
  # Digest = the manifest digest of :latest (== the newest main-<sha> tag).
  # Maintained ATOMICALLY by the release.yml retag-on-merge bot commit
  # (ADR-027) — do not edit these by hand. New services self-register on
  # their first promotion. consumers stays empty until a file pins a service
  # digest verbatim; the bot commit only touches this file while that holds.

  - name: api-gateway
