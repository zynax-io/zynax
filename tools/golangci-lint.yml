# SPDX-License-Identifier: Apache-2.0
# Zynax — golangci-lint v2 config (all Go platform services)
#
# v2 format: version key is required; run.go removed (inferred from go.mod);
# linters-settings moved under linters.settings; default: none makes the
# enabled list authoritative.
version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  default: none
  enable:
    - errcheck       # never discard errors
    - govet          # suspicious constructs
    - staticcheck    # advanced static analysis
    - unused         # unused code
    - ineffassign
    - revive
    - gocritic
    - funlen         # function length
    - cyclop
    - gosec          # security
    - wrapcheck      # errors must be wrapped
    - errorlint      # correct error wrapping
    - contextcheck   # context.Context must be first arg
    - goconst        # repeated strings → constants
  settings:
    funlen:
      lines: 80
      statements: 40
    cyclop:
      max-complexity: 16
    wrapcheck:
      ignore-package-globs:
        - "google.golang.org/grpc/*"

issues:
  exclusions:
    rules:
      - path: "_test\\.go"
        linters: [funlen, cyclop, gocritic, gosec]
      - path: "generated/"
        linters: [all]
      - path: "cmd/.*/main\\.go"
        linters: [funlen]
