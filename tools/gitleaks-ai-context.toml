# gitleaks config for scanning AI context files (CLAUDE.md, AGENTS.md, docs/ai-assistant-setup.md).
# Focused on patterns that are safe in source code but dangerous in public documentation:
# local paths, credentials, PII, and internal infrastructure details.
#
# Run manually: make gitleaks
# CI: triggered on any PR touching CLAUDE.md, AGENTS.md, docs/ai-assistant-setup.md, .ai/, .claude/

title = "Zynax AI context security scan"

[extend]
# Inherit the default gitleaks ruleset for token/key detection, then add our own rules.
useDefault = true

[[rules]]
id          = "local-absolute-path"
description = "Absolute local filesystem path — must not appear in public AI context files"
regex       = '''(?i)(\/home\/[a-z0-9_\-\.]+\/|\/mnt\/[a-z0-9_\-\.]+\/|\/Users\/[a-zA-Z0-9_\-\.]+\/|C:\\[Uu]sers\\[a-zA-Z0-9_\-\.]+\\)'''
tags        = ["pii", "local-path"]
[rules.allowlist]
# Policy doc uses counter-examples to illustrate what NOT to put in AI context files
paths       = ['''docs/knowledge-base-policy\.md''']

[[rules]]
id          = "email-address"
description = "Email address — must not appear in public AI context files"
regex       = '''[a-zA-Z0-9._%+\-]{2,}@[a-zA-Z0-9.\-]{2,}\.[a-zA-Z]{2,6}'''
tags        = ["pii", "email"]
[rules.allowlist]
# Python decorators look like email addresses
regexes     = [
  '''@pytest\.|@app\.|@router\.|@celery\.|@task\.|@property|@staticmethod|@classmethod|@abstractmethod|@override|@dataclass|@asynccontextmanager''',
  # SSH git URLs (git@github.com:…) match the email pattern but are not emails
  '''git@github\.com''',
  '''git@gitlab\.com''',
]
# Docs/governance files legitimately contain template or project-contact emails;
# policy doc uses them as counter-examples; spec files may have AsyncAPI contact fields.
paths       = [
  '''spec/''',
  '''CONTRIBUTING\.md''',
  '''GOVERNANCE\.md''',
  '''docs/git-workflow\.md''',
  '''docs/github-setup\.md''',
  '''docs/dev-config-private\.md''',
  '''docs/engineering/''',
  '''docs/knowledge-base-policy\.md''',
  '''\.github/''',
]

[[rules]]
id          = "internal-hostname"
description = "Hostname with internal TLD (.internal, .local, .corp, .lan) — infrastructure detail"
regex       = '''[a-zA-Z0-9\-]+\.(internal|local|corp|lan|intranet)\b'''
tags        = ["infrastructure"]
[rules.allowlist]
# 'local' as a standalone word or in NATS URLs is fine (dev environment docs)
regexes     = ['''nats://localhost|nats://local\b|description.*[Ll]ocal''']
# .dockerignore / .gitignore list glob patterns — never real hostnames
# infra/AGENTS.md and agents/*/AGENTS.md document Docker bridge hostnames (host.docker.internal)
# Policy doc uses counter-examples
paths       = [
  '''\.dockerignore$''',
  '''\.gitignore$''',
  '''infra/AGENTS\.md''',
  '''agents/.*/AGENTS\.md''',
  '''docs/knowledge-base-policy\.md''',
  # Helm templates legitimately use cluster-local DNS names (svc.cluster.local)
  '''helm/.*\.yaml$''',
  '''helm/.*\.txt$''',
]

[[rules]]
id          = "private-ip-range"
description = "Private IP address range — infrastructure detail"
regex       = '''(10\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}|172\.(1[6-9]|2[0-9]|3[01])\.[0-9]{1,3}\.[0-9]{1,3}|192\.168\.[0-9]{1,3}\.[0-9]{1,3})'''
tags        = ["infrastructure", "ip"]

[[rules]]
id          = "prompt-injection"
description = "Prompt injection payload — text instructing an AI to override governance rules"
regex       = '''(?i)(ignore\s+(previous|prior|all)\s+(instructions?|prompts?|rules?)|forget\s+(everything|all\s+previous|all\s+prior)\s*(instructions?|context)?|you\s+are\s+now\s+(a|an)\s+[a-z][a-z]+|you\s+(have\s+)?no\s+(restrictions?|ethical\s+guidelines?|safety\s+rules?)|disregard\s+(all\s+)?(previous|system)\s+(instructions?|rules?))'''
tags        = ["injection", "security"]
[rules.allowlist]
# Skip files that intentionally document injection patterns as examples or rules
paths       = [
  '''tools/gitleaks-ai-context\.toml''',
  '''docs/knowledge-base-policy\.md''',
  '''CONTRIBUTING\.md''',
  '''\.claude/commands/''',
  '''\.claude/settings''',
]

[allowlist]
regexes     = [
  # Docker Alpine container paths documented as known pitfalls — not local machine paths
  '''\/go\/bin\/|\/usr\/local\/go|golang:[0-9\.]+-alpine|/root/go/bin/''',
  # RFC 5737 documentation addresses are safe
  '''192\.0\.2\.|198\.51\.100\.|203\.0\.113\.''',
]
paths       = [
  # Never scan generated files or vendored dependencies
  '''generated/''',
  '''vendor/''',
  '''go\.sum''',
  '''.*\.lock''',
  # Local tool caches — gitignored, machine-specific, never contain real secrets
  '''\.ruff_cache/''',
  '''\.venv/''',
  '''\.mypy_cache/''',
  # The baseline file itself stores finding data and must not be re-scanned
  '''tools/gitleaks-baseline\.json''',
]
