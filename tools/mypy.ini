# SPDX-License-Identifier: Apache-2.0
# Zynax — Shared mypy configuration (strict mode)
# See root AGENTS.md §4.3: 100% type coverage, no Any without justification.

[mypy]
python_version = 3.12
strict = true

# Strict mode enables all of the following — listed explicitly for clarity:
warn_return_any = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unused_configs = true
disallow_any_generics = true
disallow_subclassing_any = true
disallow_untyped_calls = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
strict_optional = true
no_implicit_reexport = true
extra_checks = true

# Error formatting
show_error_codes = true
show_column_numbers = true
pretty = true

# Incremental for speed in local dev
incremental = true
cache_dir = .mypy_cache

# Per-module overrides for third-party stubs that are incomplete
[mypy-grpc.*]
ignore_missing_imports = true

[mypy-grpcio.*]
ignore_missing_imports = true

[mypy-testcontainers.*]
ignore_missing_imports = true

[mypy-prometheus_client.*]
ignore_missing_imports = true

[mypy-opentelemetry.*]
ignore_missing_imports = true

[mypy-structlog.*]
ignore_missing_imports = true

# Generated proto stubs — not strict
[mypy-zynax.*_pb2*]
ignore_errors = true
