// SPDX-License-Identifier: Apache-2.0
//
// SchedulerService — scored, readiness-aware agent selection contract.
//
// The task broker (or any dispatching caller) asks the scheduler for exactly
// ONE agent able to execute a capability, under an optional policy and hard
// constraints. The scheduler answers from its informer-backed view of Agent
// custom resources and returns the chosen agent together with a structured
// SelectionRationale explaining the decision.
//
// Design rationale: ADR-039 (CRD-native scheduler — the Agent CR is the
// single source of truth; the registry evolves into a stateless scheduler),
// ADR-040 (capability matching and scheduling intelligence stay Zynax-core),
// ADR-028 (expert targeting is strict — no fallback). This file is additive:
// AgentDef and CapabilityDef are reused from agent_registry.proto, whose
// RPCs are deprecated separately (deprecation in M8, removal in M9).
//
// Contract invariants:
//   1. SelectAgent returns exactly one agent or a gRPC error — never an
//      empty response and never more than one candidate.
//   2. capability_name is required; empty is rejected with INVALID_ARGUMENT.
//   3. No agent declares the capability → NOT_FOUND (with a machine-readable
//      reason in the status message).
//   4. Candidates exist but hard constraints, readiness, or the expert
//      target eliminate all of them → FAILED_PRECONDITION; the status
//      message names the first eliminating filter.
//   5. expert_target is strict (ADR-028): only agents declaring that expert
//      scope are eligible; when none qualifies the call fails rather than
//      falling back to a non-expert agent.
//   6. Metrics unavailability is never an error: selection degrades to
//      readiness-filtered round-robin and the rationale reports mode
//      SELECTION_MODE_DEGRADED_ROUND_ROBIN (ADR-039 §3).
//   7. The rationale is structured for machines and dashboards — callers
//      must not need to parse free text to learn why an agent won.

syntax = "proto3";

package zynax.v1;

import "zynax/v1/agent_registry.proto";

option go_package = "github.com/zynax-io/zynax/gen/go/zynax/v1;zynaxv1";

// SchedulerService selects the single best live agent for a capability.
// It is the read/selection half of the CRD-native scheduler (ADR-039): the
// write half is `kubectl apply` of Agent custom resources, not an RPC.
service SchedulerService {
  // SelectAgent returns exactly one chosen agent plus the rationale for the
  // choice, evaluated through the ordered pipeline: capability match →
  // hard constraints → readiness → expert target → metrics-weighted
  // load/latency → cost/gpu/model tie-break → locality.
  // Returns INVALID_ARGUMENT if capability_name is empty.
  // Returns NOT_FOUND if no agent declares the capability.
  // Returns FAILED_PRECONDITION if constraints, readiness, or the expert
  // target eliminate every candidate.
  rpc SelectAgent(SelectAgentRequest) returns (SelectAgentResponse);
}

// SelectionPolicy names the scoring strategy the caller requests.
// Ordinal values are permanent — never reorder or reassign.
enum SelectionPolicy {
  // Server default. Currently equivalent to SELECTION_POLICY_METRICS_WEIGHTED.
  SELECTION_POLICY_UNSPECIFIED = 0;

  // Full ADR-039 §4 pipeline: readiness-filtered candidates ranked by
  // live load/latency from the metrics backend, with cost/gpu/model
  // tie-breaks. Degrades per invariant 6 when metrics are unavailable.
  SELECTION_POLICY_METRICS_WEIGHTED = 1;

  // Skip the metrics stage deliberately: rotate over ready, constraint-
  // and expert-eligible candidates. Rationale mode reports
  // SELECTION_MODE_ROUND_ROBIN (not the degraded variant).
  SELECTION_POLICY_ROUND_ROBIN = 2;
}

// SelectionConstraints are hard filters — an agent failing any populated
// field is eliminated before scoring (ADR-039 §4 "hard constraints" stage).
// Empty fields are unconstrained. Values are matched against the scheduler's
// view of the agent's declared scheduling hints (Agent CR spec).
message SelectionConstraints {
  // Required tags: every listed tag must be declared by the agent.
  repeated string tags = 1;

  // Required implementation language of the agent (e.g. "python", "go").
  string language = 2;

  // Required model the agent must serve (e.g. a concrete LLM name).
  string model = 3;

  // When true, only agents declaring GPU capacity are eligible.
  bool require_gpu = 4;

  // Required protocols: every listed protocol must be supported by the
  // agent (e.g. "grpc", "http", "mcp").
  repeated string protocols = 5;
}

// SelectionMode reports which scoring path actually produced the decision.
// Ordinal values are permanent — never reorder or reassign.
enum SelectionMode {
  // Never returned. Proto3 default sentinel; presence indicates a missing
  // or corrupt rationale.
  SELECTION_MODE_UNSPECIFIED = 0;

  // The metrics-weighted pipeline ran end to end.
  SELECTION_MODE_METRICS_WEIGHTED = 1;

  // The caller requested SELECTION_POLICY_ROUND_ROBIN.
  SELECTION_MODE_ROUND_ROBIN = 2;

  // The metrics backend was unavailable; selection fell back to
  // readiness-filtered round-robin (ADR-039 §3). Not an error.
  SELECTION_MODE_DEGRADED_ROUND_ROBIN = 3;
}

// SelectionRationale explains, structurally, why the returned agent won.
// Counts trace the ADR-039 §4 pipeline stages so operators can see where
// candidates were eliminated without reading scheduler logs.
message SelectionRationale {
  // Agents that matched the capability (pipeline stage 1).
  int32 candidates_matched = 1;

  // Candidates remaining after hard constraints (stage 2).
  int32 candidates_after_constraints = 2;

  // Candidates remaining after the readiness filter (stage 3).
  int32 candidates_ready = 3;

  // Candidates remaining after the expert-target filter (stage 4).
  // Equal to candidates_ready when no expert_target was requested.
  int32 candidates_after_expert_filter = 4;

  // Which scoring path produced the decision (stages 5–7).
  SelectionMode mode = 5;

  // Ordered factors that decided the winner among the final candidates,
  // most significant first. Stable, machine-readable tokens — e.g. "load",
  // "latency", "cost", "gpu", "model", "locality", "rotation".
  repeated string winning_factors = 6;

  // Optional single-sentence human summary for dashboards and task records.
  // Informational only: machines must rely on the structured fields above.
  string summary = 7;
}

// SelectAgentRequest asks for one agent able to execute a capability.
message SelectAgentRequest {
  // The capability the selected agent must declare. Matched against
  // CapabilityDef.name. Required: empty string is rejected with
  // INVALID_ARGUMENT.
  string capability_name = 1;

  // The scoring strategy. UNSPECIFIED lets the server choose its default
  // (currently METRICS_WEIGHTED).
  SelectionPolicy policy = 2;

  // Hard filters applied before scoring. Optional.
  SelectionConstraints constraints = 3;

  // Strict expert scope (ADR-028): when non-empty, only agents declaring
  // this expert scope are eligible and there is NO fallback to non-expert
  // agents — elimination of all candidates yields FAILED_PRECONDITION.
  string expert_target = 4;
}

// SelectAgentResponse carries exactly one chosen agent and the rationale.
message SelectAgentResponse {
  // The selected agent. Always populated on success (invariant 1); the
  // endpoint field is directly dialable by the caller.
  AgentDef agent = 1;

  // Structured explanation of the decision. Always populated on success
  // (invariant 7).
  SelectionRationale rationale = 2;
}
