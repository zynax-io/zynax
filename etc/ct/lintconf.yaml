rules:
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 0
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 0
  colons:
    max-spaces-after: -1
    max-spaces-before: 0
  commas:
    max-spaces-after: -1
    min-spaces-after: 1
    max-spaces-before: 0
  document-start: disable
  indentation:
    indent-sequences: true
    spaces: 2
  line-length:
    max: 160
  trailing-spaces: enable
  truthy:
    allowed-values: ['true', 'false']
    check-keys: false
