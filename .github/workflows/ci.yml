# SPDX-License-Identifier: Apache-2.0
# Zynax — Core CI Pipeline
#
# Job names are deliberately chosen to match the branch protection required
# status checks configured on `main`. Never rename a job without updating
# the branch protection rules first (Settings → Branches → main).
#
# Required check names: dco · lint-proto · lint-go · lint-python · test-unit · test-integration · security
#
# Design: Docker-free in CI (install tools natively for speed and cache
# reuse). All commands mirror the Makefile targets so local and CI output
# is identical. When adding a new service or agent update the SERVICE_LIST
# and AGENT_LIST env vars below — no other changes required.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  GO_VERSION: "1.25"
  PYTHON_VERSION: "3.12"
  BUF_VERSION: "1.47.2"
  GOLANGCI_VERSION: "v2.11.4"
  GOVULNCHECK_VERSION: "v1.1.4"
  SERVICE_LIST: "agent-registry task-broker memory-service event-bus api-gateway workflow-compiler engine-adapter"
  AGENT_LIST: "summarizer researcher calculator"

# ── DCO ─────────────────────────────────────────────────────────────────────
# Every commit in a PR must carry a Signed-off-by trailer (Developer
# Certificate of Origin). This is enforced by the merge queue as well, but
# checking here surfaces the problem before review begins.
jobs:
  dco:
    name: dco
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by on every commit
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="HEAD~1"
            HEAD="HEAD"
          fi

          MISSING=""
          for sha in $(git log "${BASE}..${HEAD}" --format="%H"); do
            author_email=$(git log -1 --format="%ae" "$sha")
            if echo "$author_email" | grep -qE "\[bot\]"; then
              echo "  ⏭ Skipping bot commit: ${sha:0:12} (author: $author_email)"
              continue
            fi
            body=$(git log -1 --format="%B" "$sha")
            if ! echo "$body" | grep -qE "^Signed-off-by: .+ <.+>$"; then
              subject=$(git log -1 --format="%s" "$sha")
              MISSING="${MISSING}\n  ${sha:0:12}  ${subject}"
            fi
          done

          if [ -n "$MISSING" ]; then
            echo "❌ The following commits are missing a valid Signed-off-by trailer:"
            printf "%b\n" "$MISSING"
            echo ""
            echo "Fix: git rebase --signoff main  (or -s flag on each commit)"
            exit 1
          fi
          echo "✅ All commits carry Signed-off-by"

# ── Lint: Proto, AI context scan, and spec validation ────────────────────────
# Runs: gitleaks (AI KB files), buf lint/format, stubs freshness,
#       AsyncAPI spec, JSON schema validation.
# Parallel with lint-go and lint-python — all three need dco to pass first.
  lint-proto:
    name: lint-proto
    runs-on: ubuntu-24.04
    needs: [dco]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # ── Security: AI context file scan ──────────────────────────────────
      - name: Detect AI context file changes
        id: ai-detect
        run: |
          changed=$(git diff --name-only origin/main...HEAD -- \
            'CLAUDE.md' '*/AGENTS.md' 'AGENTS.md' \
            'docs/ai-assistant-setup.md' '.ai/' '.claude/' 2>/dev/null | wc -l)
          echo "has_changes=$changed" >> "$GITHUB_OUTPUT"

      - name: Cache gitleaks
        id: gitleaks-cache
        if: steps.ai-detect.outputs.has_changes != '0'
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: /usr/local/bin/gitleaks
          key: gitleaks-8.21.2-linux-x64

      - name: Install gitleaks
        if: steps.ai-detect.outputs.has_changes != '0' && steps.gitleaks-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks

      - name: Scan AI context files for secrets and PII
        if: steps.ai-detect.outputs.has_changes != '0'
        run: |
          files=$(git diff --name-only origin/main...HEAD -- \
            'CLAUDE.md' '*/AGENTS.md' 'AGENTS.md' \
            'docs/ai-assistant-setup.md' '.ai/' '.claude/')
          echo "── scanning AI context files for secrets / PII / local paths"
          echo "$files"
          gitleaks detect --no-git --source . \
            --config tools/gitleaks-ai-context.toml \
            --report-format json \
            --report-path /tmp/gitleaks-report.json 2>/dev/null || {
            echo "❌ Sensitive content detected in AI context files:"
            cat /tmp/gitleaks-report.json
            echo ""
            echo "See docs/knowledge-base-policy.md for sanitization guidance."
            exit 1
          }
          echo "✅ AI context files passed security scan"

      # ── Proto: buf lint + format check ──────────────────────────────────
      - name: Detect proto workspace
        id: proto-detect
        run: |
          if [ -f protos/buf.yaml ]; then
            echo "has_protos=1" >> "$GITHUB_OUTPUT"
          else
            echo "has_protos=0" >> "$GITHUB_OUTPUT"
            echo "ℹ️  protos/buf.yaml not found — buf lint skipped until proto branch merges."
          fi

      - name: Cache buf
        id: buf-cache
        if: steps.proto-detect.outputs.has_protos == '1'
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: /usr/local/bin/buf
          key: buf-${{ env.BUF_VERSION }}-linux-x86_64

      - name: Install buf
        if: steps.proto-detect.outputs.has_protos == '1' && steps.buf-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL \
            "https://github.com/bufbuild/buf/releases/download/v${{ env.BUF_VERSION }}/buf-Linux-x86_64" \
            -o /usr/local/bin/buf
          chmod +x /usr/local/bin/buf

      - name: buf lint (proto syntax and style)
        if: steps.proto-detect.outputs.has_protos == '1'
        working-directory: protos
        run: buf lint

      - name: buf format check
        if: steps.proto-detect.outputs.has_protos == '1'
        working-directory: protos
        run: buf format --diff --exit-code

      # ── Proto: stubs freshness (generate + diff) ─────────────────────────
      - name: Detect buf.gen.yaml
        id: gen-detect
        run: |
          if [ -f protos/buf.gen.yaml ]; then
            echo "has_gen=1" >> "$GITHUB_OUTPUT"
          else
            echo "has_gen=0" >> "$GITHUB_OUTPUT"
            echo "ℹ️  protos/buf.gen.yaml not found — stubs freshness check skipped."
          fi

      - name: Generate stubs and check for drift
        if: steps.gen-detect.outputs.has_gen == '1'
        working-directory: protos
        run: |
          # First pass: detect committed stubs drift
          buf generate --template buf.gen.yaml
          if ! git diff --quiet -- generated/; then
            echo "❌ Generated stubs are out of date."
            echo "   Run 'make generate-protos' locally and commit the result."
            git diff --stat -- generated/
            exit 1
          fi
          echo "✅ Generated stubs are up to date (first pass)"

          # Second pass: determinism check — buf generate must produce identical
          # output on repeat runs (no timestamps, no random ordering).
          buf generate --template buf.gen.yaml
          if ! git diff --quiet -- generated/; then
            echo "❌ buf generate is not deterministic — second run produced a diff."
            echo "   This is a bug in the buf plugin or buf.gen.yaml configuration."
            git diff --stat -- generated/
            exit 1
          fi
          echo "✅ buf generate is deterministic (second pass identical)"

      # ── Spec: AsyncAPI + JSON Schema validation ──────────────────────────
      - name: Detect spec files
        id: spec-detect
        run: |
          if [ -f spec/asyncapi/zynax-events.yaml ]; then
            echo "has_spec=1" >> "$GITHUB_OUTPUT"
          else
            echo "has_spec=0" >> "$GITHUB_OUTPUT"
            echo "ℹ️  spec/asyncapi/zynax-events.yaml not found — spec validation skipped."
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        if: steps.spec-detect.outputs.has_spec == '1'
        with:
          node-version: "20"

      - name: Install AsyncAPI CLI
        if: steps.spec-detect.outputs.has_spec == '1'
        run: npm install -g @asyncapi/cli --quiet

      - name: Validate AsyncAPI spec
        if: steps.spec-detect.outputs.has_spec == '1'
        run: |
          echo "── asyncapi validate: spec/asyncapi/zynax-events.yaml"
          asyncapi validate spec/asyncapi/zynax-events.yaml
          echo "✅ AsyncAPI spec is valid"

      - name: Validate JSON Schemas are well-formed
        if: steps.spec-detect.outputs.has_spec == '1'
        run: python3 tools/validate_json_schemas.py spec/schemas/

# ── Lint: Go services ─────────────────────────────────────────────────────────
# Runs: golangci-lint on all Go platform services.
# Parallel with lint-proto and lint-python. Unblocks test-unit immediately.
  lint-go:
    name: lint-go
    runs-on: ubuntu-24.04
    needs: [dco]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect Go services
        id: go-detect
        run: |
          count=$(find services/ -name "*.go" 2>/dev/null | wc -l)
          echo "has_go=$count" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        if: steps.go-detect.outputs.has_go != '0'
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: "**/go.sum"

      - name: Cache golangci-lint
        id: golangci-cache
        if: steps.go-detect.outputs.has_go != '0'
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: /usr/local/bin/golangci-lint
          key: golangci-${{ env.GOLANGCI_VERSION }}-linux-amd64

      - name: Install golangci-lint
        if: steps.go-detect.outputs.has_go != '0' && steps.golangci-cache.outputs.cache-hit != 'true'
        run: |
          VERSION="${{ env.GOLANGCI_VERSION }}"
          VERSION_BARE="${VERSION#v}"
          curl -fsSL \
            "https://github.com/golangci/golangci-lint/releases/download/${VERSION}/golangci-lint-${VERSION_BARE}-linux-amd64.tar.gz" \
            -o /tmp/golangci-lint.tar.gz
          tar -xzf /tmp/golangci-lint.tar.gz \
            --strip-components=1 \
            -C /usr/local/bin \
            "golangci-lint-${VERSION_BARE}-linux-amd64/golangci-lint"

      - name: golangci-lint (all Go services)
        if: steps.go-detect.outputs.has_go != '0'
        run: |
          failed=false
          for svc in ${{ env.SERVICE_LIST }}; do
            if [ -f "services/${svc}/go.mod" ]; then
              echo "── lint: services/${svc}"
              cd "services/${svc}"
              GOWORK=off golangci-lint run ./... --config "../../tools/golangci-lint.yml" || failed=true
              cd ../..
            fi
          done
          $failed && exit 1 || echo "✅ Go lint passed"

# ── Lint: Python agents and SDK ───────────────────────────────────────────────
# Runs: ruff + mypy on SDK + all Python agents.
# Parallel with lint-proto and lint-go. Does not block test-unit (Go-only gate).
  lint-python:
    name: lint-python
    runs-on: ubuntu-24.04
    needs: [dco]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect Python agents
        id: py-detect
        run: |
          count=$(find agents/ -name "*.py" 2>/dev/null | wc -l)
          echo "has_py=$count" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        if: steps.py-detect.outputs.has_py != '0'
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        if: steps.py-detect.outputs.has_py != '0'
        with:
          enable-cache: true

      - name: ruff + mypy (SDK + all Python agents)
        if: steps.py-detect.outputs.has_py != '0'
        run: |
          failed=false

          if [ -f agents/sdk/pyproject.toml ]; then
            echo "── lint: agents/sdk"
            cd agents/sdk
            uv run ruff check src/ || failed=true
            uv run mypy src/ --strict || failed=true
            cd ../..
          fi

          for agent in ${{ env.AGENT_LIST }}; do
            if [ -f "agents/examples/${agent}/pyproject.toml" ]; then
              echo "── lint: agents/examples/${agent}"
              cd "agents/examples/${agent}"
              uv run ruff check src/ tests/ || failed=true
              uv run mypy src/ --strict || failed=true
              cd ../../..
            fi
          done

          $failed && exit 1 || echo "✅ Python lint passed"

# ── Unit Tests ────────────────────────────────────────────────────────────────
# Runs: Go unit tests + godog BDD contract tests (when step defs exist),
#       pytest-bdd with ≥90% coverage (Python), proto contract spec report.
  test-unit:
    name: test-unit
    runs-on: ubuntu-24.04
    needs: [lint-go, lint-proto]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # ── BDD contract spec: scenario count summary ────────────────────────
      - name: Report BDD contract scenario counts
        run: |
          echo "── Zynax contract BDD scenario summary ──────────────────────────"
          total=0
          for feature in protos/tests/features/*.feature; do
            svc=$(basename "$feature" .feature)
            count=$(grep -c "^\s*Scenario:" "$feature" 2>/dev/null || echo 0)
            total=$((total + count))
            printf "  %-40s %3d scenarios\n" "$svc" "$count"
          done
          echo ""
          echo "Total: ${total} scenarios across $(ls protos/tests/features/*.feature | wc -l) contracts"

      # ── Go: unit tests + godog (when services exist) ─────────────────────
      - name: Detect Go code
        id: go-detect
        run: |
          svc_count=$(find services/ -name "*.go" 2>/dev/null | wc -l)
          bdd_count=$(find protos/tests/ -name "*.go" 2>/dev/null | wc -l)
          echo "has_services=$svc_count" >> "$GITHUB_OUTPUT"
          echo "has_bdd_impl=$bdd_count" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        if: >-
          steps.go-detect.outputs.has_services != '0' ||
          steps.go-detect.outputs.has_bdd_impl != '0'
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "**/go.sum"

      - name: Go service unit tests
        if: steps.go-detect.outputs.has_services != '0'
        run: |
          failed=false
          for svc in ${{ env.SERVICE_LIST }}; do
            if [ -f "services/${svc}/go.mod" ]; then
              echo "── test: services/${svc}"
              cd "services/${svc}"
              GOWORK=off go test ./... -v -race -timeout 60s \
                -count=1 \
                -coverprofile=coverage.out \
                -covermode=atomic || failed=true
              cd ../..
            fi
          done
          $failed && exit 1 || echo "✅ Go service tests passed"

      - name: Go service coverage gate (≥90%)
        if: steps.go-detect.outputs.has_services != '0'
        run: |
          failed=false
          for svc in ${{ env.SERVICE_LIST }}; do
            if [ -f "services/${svc}/coverage.out" ]; then
              total=$(GOWORK=off go tool cover -func="services/${svc}/coverage.out" \
                      | grep "^total:" | awk '{print $3}' | tr -d '%')
              if [ -z "$total" ]; then
                echo "  ⚠ no coverage total for services/${svc} — skipping"
                continue
              fi
              GOWORK=off go tool cover -func="services/${svc}/coverage.out" | grep "^total:" \
                | awk -v svc="${svc}" '{printf "── coverage: services/%s  %s\n", svc, $3}'
              if awk "BEGIN{exit !(${total} < 90)}"; then
                echo "  ❌ ${total}% < 90% — coverage gate failed for services/${svc}"
                failed=true
              else
                echo "  ✅ ${total}% ≥ 90% for services/${svc}"
              fi
            fi
          done
          $failed && exit 1 || true

      - name: Godog BDD contract tests (selective by changed proto)
        if: steps.go-detect.outputs.has_bdd_impl != '0'
        run: |
          # Proto file → test package mapping
          declare -A PKG_MAP
          PKG_MAP["agent.proto"]="agent_service"
          PKG_MAP["agent_registry.proto"]="agent_registry_service"
          PKG_MAP["cloudevents.proto"]="cloudevents_envelope"
          PKG_MAP["engine_adapter.proto"]="engine_adapter_service"
          PKG_MAP["event_bus.proto"]="event_bus_service"
          PKG_MAP["memory.proto"]="memory_service"
          PKG_MAP["task_broker.proto"]="task_broker_service"
          PKG_MAP["workflow_compiler.proto"]="workflow_compiler_service"

          # Diff range
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="HEAD~1"
            HEAD="HEAD"
          fi
          changed=$(git diff --name-only "${BASE}..${HEAD}" -- 'protos/' 2>/dev/null || true)

          # Shared infra changes → run full suite
          run_all=false
          if echo "$changed" | grep -qE "^protos/tests/(go\.(mod|sum)|testserver/)"; then
            run_all=true
            echo "ℹ️  Shared test infrastructure changed — running full suite."
          fi

          # Map changed files to packages
          pkgs=""
          if [ "$run_all" = "false" ]; then
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              case "$f" in
                protos/zynax/v1/*.proto)
                  b=$(basename "$f")
                  pkg="${PKG_MAP[$b]:-}"
                  [ -n "$pkg" ] && pkgs="$pkgs $pkg"
                  ;;
                protos/tests/features/*)
                  run_all=true
                  echo "ℹ️  Feature file changed — running full suite."
                  break
                  ;;
                protos/tests/*/*)
                  pkg=$(echo "$f" | cut -d/ -f3)
                  [ "$pkg" != "features" ] && pkgs="$pkgs $pkg"
                  ;;
              esac
            done <<< "$changed"
          fi

          # Deduplicate
          pkgs=$(echo "$pkgs" | tr ' ' '\n' | sort -u | grep -v '^$' | tr '\n' ' ')

          # Run
          cd protos/tests
          if [ "$run_all" = "true" ] || [ -n "$pkgs" ]; then
            if [ "$run_all" = "true" ] || [ -z "$pkgs" ]; then
              echo "── BDD: full suite"
              GOWORK=off go test ./... -v -timeout 120s 2>&1 | tee bdd-results.txt
            else
              pkg_args=$(echo "$pkgs" | tr ' ' '\n' | sed 's|^|./|;s|$|/...|' | tr '\n' ' ')
              echo "── BDD: selective — $pkgs"
              GOWORK=off go test $pkg_args -v -timeout 120s 2>&1 | tee bdd-results.txt
            fi
          else
            echo "ℹ️  No proto or contract test files changed — BDD suite skipped."
          fi
          echo "✅ BDD contract tests passed"

      # ── BDD results: post PR comment ──────────────────────────────────────
      - name: Post BDD contract test report on PR
        if: always() && github.event_name == 'pull_request' && steps.go-detect.outputs.has_bdd_impl != '0'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const marker = '<!-- zynax-bdd-report -->';

            let body;
            const resultsFile = 'protos/tests/bdd-results.txt';

            if (fs.existsSync(resultsFile)) {
              const raw = fs.readFileSync(resultsFile, 'utf8');
              const lines = raw.split('\n');

              const pkgResults = [];
              let passed = 0, failed = 0;
              for (const line of lines) {
                const okMatch  = line.match(/^ok\s+\S+\/protos\/tests\/(\S+)\s+(\S+)/);
                const failMatch = line.match(/^FAIL\s+\S+\/protos\/tests\/(\S+)/);
                // Count sub-test lines (individual scenarios, not top-level TestXxx)
                if (line.match(/\s+--- PASS: Test\w+\/.+/)) passed++;
                if (line.match(/\s+--- FAIL: Test\w+\/.+/)) failed++;
                if (okMatch)   pkgResults.push({ pkg: okMatch[1],   status: '✅', time: okMatch[2] });
                if (failMatch) pkgResults.push({ pkg: failMatch[1], status: '❌', time: '—' });
              }

              const total = passed + failed;
              const headline = failed === 0
                ? `✅ **${total} scenarios passed** across ${pkgResults.length} package(s)`
                : `❌ **${failed} scenario(s) failed** (${passed} passed) across ${pkgResults.length} package(s)`;

              const rows = pkgResults.length > 0
                ? pkgResults.map(r => `| \`${r.pkg}\` | ${r.status} | ${r.time} |`).join('\n')
                : '| — | ⏭️ skipped | — |';

              body = `${marker}\n## Contract Test Report\n\n${headline}\n\n| Package | Result | Time |\n|---------|--------|------|\n${rows}\n\n<sub>Run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) · \`${{ github.sha }}`.slice(0,7) + `\`</sub>`;
            } else {
              body = `${marker}\n## Contract Test Report\n\nℹ️ BDD suite skipped — no proto or contract test files changed in this PR.\n\n<sub>Run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})</sub>`;
            }

            // Find existing marker comment and update it, or create new
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # ── Python: pytest-bdd with coverage ─────────────────────────────────
      - name: Detect Python agents
        id: py-detect
        run: |
          count=$(find agents/ -name "*.py" 2>/dev/null | wc -l)
          echo "has_py=$count" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        if: steps.py-detect.outputs.has_py != '0'
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        if: steps.py-detect.outputs.has_py != '0'
        with:
          enable-cache: true

      - name: pytest-bdd (SDK + all Python agents)
        if: steps.py-detect.outputs.has_py != '0'
        run: |
          failed=false

          if [ -f agents/sdk/pyproject.toml ]; then
            echo "── test: agents/sdk"
            cd agents/sdk
            uv run pytest tests/ \
              --cov=src \
              --cov-report=term-missing \
              --cov-fail-under=90 \
              -v \
              --tb=short || failed=true
            cd ../..
          fi

          for agent in ${{ env.AGENT_LIST }}; do
            if [ -f "agents/examples/${agent}/pyproject.toml" ]; then
              echo "── test: agents/examples/${agent}"
              cd "agents/examples/${agent}"
              uv run pytest tests/ \
                --cov=src \
                --cov-report=term-missing \
                --cov-fail-under=90 \
                -v \
                --tb=short || failed=true
              cd ../../..
            fi
          done

          $failed && exit 1 || echo "✅ Python tests passed"

# ── Integration Tests ─────────────────────────────────────────────────────────
# Runs against real backing services (not mocked). Currently a no-op skeleton;
# real tests will be added when services ship. The job always passes so branch
# protection stays green. Remove the skip condition once tests exist.
  test-integration:
    name: test-integration
    runs-on: ubuntu-24.04
    needs: [test-unit]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect integration tests
        id: int-detect
        run: |
          count=$(find . -path "*/tests/integration/*.go" 2>/dev/null | wc -l)
          echo "has_integration=$count" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        if: steps.int-detect.outputs.has_integration != '0'
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run integration tests
        if: steps.int-detect.outputs.has_integration != '0'
        run: |
          for svc in ${{ env.SERVICE_LIST }}; do
            if [ -d "services/${svc}/tests/integration" ]; then
              echo "── integration: services/${svc}"
              cd "services/${svc}"
              go test ./tests/integration/... -v -timeout 120s
              cd ../..
            fi
          done
          echo "✅ Integration tests passed"

      - name: No integration tests yet
        if: steps.int-detect.outputs.has_integration == '0'
        run: |
          echo "ℹ️  No integration tests found — job passes as a no-op."
          echo "   Add tests under services/<name>/tests/integration/ when services ship."

# ── Security ──────────────────────────────────────────────────────────────────
# Runs: govulncheck (Go CVE database), bandit (Python SAST),
#       pip-audit (Python dependency CVEs). All scans run independently
#       so a single finding does not mask others.
  security:
    name: security
    runs-on: ubuntu-24.04
    needs: [dco]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # ── Go: govulncheck ───────────────────────────────────────────────────
      - name: Detect Go services
        id: go-detect
        run: |
          count=$(find services/ -name "go.mod" 2>/dev/null | wc -l)
          echo "has_go=$count" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        if: steps.go-detect.outputs.has_go != '0'
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "**/go.sum"

      - name: Cache govulncheck
        id: govulncheck-cache
        if: steps.go-detect.outputs.has_go != '0'
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: ~/go/bin/govulncheck
          key: govulncheck-${{ env.GOVULNCHECK_VERSION }}-go${{ env.GO_VERSION }}

      - name: Install govulncheck
        if: steps.go-detect.outputs.has_go != '0' && steps.govulncheck-cache.outputs.cache-hit != 'true'
        run: go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}

      - name: govulncheck (all Go services)
        if: steps.go-detect.outputs.has_go != '0'
        run: |
          failed=false
          for svc in ${{ env.SERVICE_LIST }}; do
            if [ -f "services/${svc}/go.mod" ]; then
              echo "── govulncheck: services/${svc}"
              cd "services/${svc}"
              GOWORK=off govulncheck ./... || failed=true
              cd ../..
            fi
          done
          $failed && exit 1 || echo "✅ govulncheck passed"

      # ── Python: bandit + pip-audit ────────────────────────────────────────
      - name: Detect Python agents
        id: py-detect
        run: |
          count=$(find agents/ -name "*.py" 2>/dev/null | wc -l)
          echo "has_py=$count" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        if: steps.py-detect.outputs.has_py != '0'
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        if: steps.py-detect.outputs.has_py != '0'
        with:
          enable-cache: true

      - name: bandit + pip-audit (SDK + all Python agents)
        if: steps.py-detect.outputs.has_py != '0'
        run: |
          failed=false

          if [ -f agents/sdk/pyproject.toml ]; then
            echo "── bandit: agents/sdk"
            cd agents/sdk
            uv run bandit -r src/ -ll -f json -o bandit-report.json || failed=true
            uv run bandit -r src/ -ll || true
            echo "── pip-audit: agents/sdk"
            uv run pip-audit || failed=true
            cd ../..
          fi

          for agent in ${{ env.AGENT_LIST }}; do
            if [ -f "agents/examples/${agent}/pyproject.toml" ]; then
              echo "── bandit: agents/examples/${agent}"
              cd "agents/examples/${agent}"
              uv run bandit -r src/ -ll -f json -o bandit-report.json || failed=true
              uv run bandit -r src/ -ll || true
              echo "── pip-audit: agents/examples/${agent}"
              uv run pip-audit || failed=true
              cd ../../..
            fi
          done
          $failed && exit 1 || echo "✅ Security scans passed"

      - name: No security targets yet
        if: >-
          steps.go-detect.outputs.has_go == '0' &&
          steps.py-detect.outputs.has_py == '0'
        run: |
          echo "ℹ️  No Go or Python code found — security job passes as no-op."
          echo "   govulncheck and bandit will activate when services are added."
