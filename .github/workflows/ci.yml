# SPDX-License-Identifier: Apache-2.0
# Zynax — Core CI Pipeline
#
# Job names match the branch protection required status checks on `main`.
# Never rename a job without updating branch protection first.
#
# Required checks: dco · lint-proto · lint-go · lint-python · test-unit · security
# (test-integration is non-required until real integration tests exist — #227)
#
# Job graph:
#   dco → changes → lint-proto ─╮
#                ├─ lint-go   ──┴──→ test-go   ─╮
#                │                  test-python ─┴──→ test-unit (wrapper, required check)
#                └─ lint-python    (parallel; code=false skips both)
#   dco → security  (independent)
#   dco → changes → lint-go → build-images  (pre-merge image gate — ADR-027, #1118;
#                                            PRs only, when docker == 'true')
#
# When adding a service/adapter update SERVICE_LIST, GO_ADAPTER_LIST — and the
# build-images matrix if it ships as a container image. Example agents under
# agents/examples/* are auto-discovered (glob on pyproject.toml) — no list to edit.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: 'Force full pipeline regardless of changed files'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  SERVICE_LIST: "agent-registry task-broker api-gateway workflow-compiler engine-adapter"
  GO_ADAPTER_LIST: "http git"
  GOPROXY: "https://proxy.golang.org,direct"
  GONOSUMDB: "*"

# ── DCO ─────────────────────────────────────────────────────────────────────
jobs:
  dco:
    name: dco
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/zynax-io/zynax/ci-runner@sha256:cf4972f24c76dc8061dfc3f7aef1b08a1b44ec2947953dbac91bdf51ca62491e
      options: --user root
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Trust workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Verify Signed-off-by on every commit
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "ℹ️  Push to main — DCO already verified in PR gate; squash-merge commit is exempt."
            echo "✅ All commits carry Signed-off-by"
            exit 0
          fi

          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          MISSING=""
          for sha in $(git log "${BASE}..${HEAD}" --format="%H"); do
            author_email=$(git log -1 --format="%ae" "$sha")
            if echo "$author_email" | grep -qE "\[bot\]"; then
              echo "  ⏭ Skipping bot commit: ${sha:0:12} (author: $author_email)"
              continue
            fi
            body=$(git log -1 --format="%B" "$sha")
            if ! echo "$body" | grep -qE "^Signed-off-by: .+ <.+>$"; then
              subject=$(git log -1 --format="%s" "$sha")
              MISSING="${MISSING}\n  ${sha:0:12}  ${subject}"
            fi
          done

          if [ -n "$MISSING" ]; then
            echo "❌ The following commits are missing a valid Signed-off-by trailer:"
            printf "%b\n" "$MISSING"
            echo ""
            echo "Fix: git rebase --signoff main  (or -s flag on each commit)"
            exit 1
          fi
          echo "✅ All commits carry Signed-off-by"

# ── Change Detection ──────────────────────────────────────────────────────────
# Outputs coarse-grained (code/proto/go/python) and per-service flags.
# On push to main uses git diff HEAD^1 HEAD; on PR uses the PR diff range.
  changes:
    name: changes
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/zynax-io/zynax/ci-runner@sha256:cf4972f24c76dc8061dfc3f7aef1b08a1b44ec2947953dbac91bdf51ca62491e
      options: --user root
    needs: [dco]
    outputs:
      code:             ${{ steps.detect.outputs.code             == 'true' || steps.force-detect.outputs.force == 'true' }}
      proto:            ${{ steps.detect.outputs.proto            == 'true' || steps.force-detect.outputs.force == 'true' }}
      go:               ${{ steps.detect.outputs.go               == 'true' || steps.force-detect.outputs.force == 'true' }}
      python:           ${{ steps.detect.outputs.python           == 'true' || steps.force-detect.outputs.force == 'true' }}
      engine_adapter:   ${{ steps.detect.outputs.engine_adapter   == 'true' || steps.force-detect.outputs.force == 'true' }}
      workflow_compiler: ${{ steps.detect.outputs.workflow_compiler == 'true' || steps.force-detect.outputs.force == 'true' }}
      api_gateway:      ${{ steps.detect.outputs.api_gateway      == 'true' || steps.force-detect.outputs.force == 'true' }}
      task_broker:      ${{ steps.detect.outputs.task_broker      == 'true' || steps.force-detect.outputs.force == 'true' }}
      agent_registry:   ${{ steps.detect.outputs.agent_registry   == 'true' || steps.force-detect.outputs.force == 'true' }}
      cli:              ${{ steps.detect.outputs.cli              == 'true' || steps.force-detect.outputs.force == 'true' }}
      adapters_go:      ${{ steps.detect.outputs.adapters_go      == 'true' || steps.force-detect.outputs.force == 'true' }}
      adapters_python:  ${{ steps.detect.outputs.adapters_python  == 'true' || steps.force-detect.outputs.force == 'true' }}
      docker:           ${{ steps.detect.outputs.docker           == 'true' || steps.force-detect.outputs.force == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Trust workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Detect force-full signal
        id: force-detect
        run: |
          force="false"
          reason=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force }}" == "true" ]]; then
            force="true"; reason="workflow_dispatch(force=true)"
          fi
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'ci: force-full') }}" == "true" ]]; then
            force="true"; reason="label(ci: force-full)"
          fi
          if [[ "${{ contains(github.event.head_commit.message, '[full-ci]') }}" == "true" ]] || \
             [[ "${{ contains(github.event.pull_request.title, '[full-ci]') }}" == "true" ]]; then
            force="true"; reason="commit-keyword([full-ci])"
          fi
          echo "force=$force" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          if [[ "$force" == "true" ]]; then
            echo "::warning::Full pipeline forced via $reason — all change-detection outputs set to true"
          fi

      - name: Detect changed path groups
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            BASE="HEAD^1"
            HEAD_SHA="HEAD"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            {
              echo "code=true"; echo "proto=true"; echo "go=true"; echo "python=true"
              echo "engine_adapter=true"; echo "workflow_compiler=true"; echo "api_gateway=true"
              echo "task_broker=true"; echo "agent_registry=true"; echo "cli=true"
              echo "adapters_go=true"; echo "adapters_python=true"; echo "docker=true"
            } >> "$GITHUB_OUTPUT"
            echo "ℹ️  Unknown event '${{ github.event_name }}' — all lanes enabled."
            exit 0
          fi
          if ! FILES=$(git diff --name-only "${BASE}...${HEAD_SHA}" 2>/tmp/git-diff-err.txt); then
            echo "⚠️  git diff failed — enabling all lanes as fail-safe"
            cat /tmp/git-diff-err.txt
            {
              echo "code=true"; echo "proto=true"; echo "go=true"; echo "python=true"
              echo "engine_adapter=true"; echo "workflow_compiler=true"; echo "api_gateway=true"
              echo "task_broker=true"; echo "agent_registry=true"; echo "cli=true"
              echo "adapters_go=true"; echo "adapters_python=true"; echo "docker=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          code=false proto=false go=false python=false
          engine_adapter=false workflow_compiler=false api_gateway=false
          task_broker=false agent_registry=false cli=false
          adapters_go=false adapters_python=false docker=false

          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if echo "$f" | grep -qE '^(services/|agents/|cmd/|protos/|go\.work(\.sum)?$)'; then
              code=true
            fi
            # docker: any path that ends up inside a container image (#1118 / ADR-027).
            # Locked matrix strategy: ALL images build when ANY of these change.
            if echo "$f" | grep -qE '^(services/|infra/docker/Dockerfile\.|agents/adapters/[^/]+/Dockerfile$)'; then
              docker=true
            fi
            if echo "$f" | grep -qE '^(protos/|spec/|CLAUDE\.md|AGENTS\.md|.*/AGENTS\.md|docs/ai-assistant-setup\.md|\.ai/|\.claude/)'; then
              proto=true
            fi
            if echo "$f" | grep -qE '^(services/|protos/|cmd/|agents/adapters/|libs/|go\.work(\.sum)?$)'; then
              go=true
            fi
            if echo "$f" | grep -qE '^agents/' && ! echo "$f" | grep -qE '^agents/adapters/'; then
              python=true
            fi
            # Expert-mapping drift guard (#1205 / ADR-033) reconciles the mapping
            # against .claude experts, agents/examples, and ADR-033 — trigger the
            # python lane when any of those surfaces move.
            if echo "$f" | grep -qE '^(automation/|\.claude/commands/experts/|docs/adr/ADR-033)'; then
              python=true
            fi
            case "$f" in
              services/engine-adapter/*)    engine_adapter=true ;;
              services/workflow-compiler/*) workflow_compiler=true ;;
              services/api-gateway/*)       api_gateway=true ;;
              services/task-broker/*)       task_broker=true ;;
              services/agent-registry/*)    agent_registry=true ;;
              cmd/*)                        cli=true ;;
              agents/adapters/http/*|agents/adapters/git/*|agents/adapters/ci/*) adapters_go=true ;;
              agents/adapters/llm/*|agents/adapters/langgraph/*)                 adapters_python=true ;;
              protos/generated/go/*|go.work|go.work.sum)
                engine_adapter=true workflow_compiler=true api_gateway=true
                task_broker=true agent_registry=true cli=true adapters_go=true ;;
              tools/golangci-lint.yml)
                engine_adapter=true workflow_compiler=true api_gateway=true
                task_broker=true agent_registry=true cli=true adapters_go=true ;;
            esac
          done <<< "$FILES"

          {
            echo "code=$code"; echo "proto=$proto"; echo "go=$go"; echo "python=$python"
            echo "engine_adapter=$engine_adapter"; echo "workflow_compiler=$workflow_compiler"
            echo "api_gateway=$api_gateway"; echo "task_broker=$task_broker"
            echo "agent_registry=$agent_registry"; echo "cli=$cli"
            echo "adapters_go=$adapters_go"; echo "adapters_python=$adapters_python"
            echo "docker=$docker"
          } >> "$GITHUB_OUTPUT"
          echo "── code=$code  proto=$proto  go=$go  python=$python  docker=$docker"
          echo "── engine-adapter=$engine_adapter  workflow-compiler=$workflow_compiler  api-gateway=$api_gateway  task-broker=$task_broker  agent-registry=$agent_registry  cli=$cli  adapters-go=$adapters_go  adapters-python=$adapters_python"

# ── Lint: Proto, AI context scan, spec validation ─────────────────────────────
  lint-proto:
    name: lint-proto
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/zynax-io/zynax/ci-runner@sha256:cf4972f24c76dc8061dfc3f7aef1b08a1b44ec2947953dbac91bdf51ca62491e
      options: --user root
    needs: [changes]
    if: needs.changes.outputs.proto == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Trust workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # ── Security: AI context file scan ──────────────────────────────────
      - name: Detect AI context file changes
        id: ai-detect
        run: |
          if ! files=$(git diff --name-only origin/main...HEAD -- \
            'CLAUDE.md' '*/AGENTS.md' 'AGENTS.md' \
            'docs/ai-assistant-setup.md' '.ai/' '.claude/' \
            2>/tmp/ai-diff-err.txt); then
            echo "⚠️  git diff failed for AI context scan — enabling scan as fail-safe"
            cat /tmp/ai-diff-err.txt || true
            echo "has_changes=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$files" ]; then echo "has_changes=1" >> "$GITHUB_OUTPUT"
          else echo "has_changes=0" >> "$GITHUB_OUTPUT"; fi

      - name: Scan AI context files for secrets and PII
        if: steps.ai-detect.outputs.has_changes != '0'
        run: |
          files=$(git diff --name-only origin/main...HEAD -- \
            'CLAUDE.md' '*/AGENTS.md' 'AGENTS.md' \
            'docs/ai-assistant-setup.md' '.ai/' '.claude/' 2>/dev/null || true)
          echo "── scanning AI context files for secrets / PII / local paths"
          echo "$files"
          gitleaks detect --no-git --source . \
            --config tools/gitleaks-ai-context.toml \
            --baseline-path tools/gitleaks-baseline.json \
            --report-format json \
            --report-path /tmp/gitleaks-report.json 2>/dev/null || {
            echo "❌ Sensitive content detected in AI context files:"
            cat /tmp/gitleaks-report.json
            echo ""
            echo "See docs/knowledge-base-policy.md for sanitization guidance."
            exit 1
          }
          echo "✅ AI context files passed security scan"

      # ── Proto: buf lint + format ──────────────────────────────────────────
      - name: Detect proto workspace
        id: proto-detect
        run: |
          if [ ! -f protos/buf.yaml ]; then
            echo "has_protos=0" >> "$GITHUB_OUTPUT"
            echo "ℹ️  protos/buf.yaml not found — buf lint skipped."
            exit 0
          fi
          changed_protos=$(git diff --name-only origin/main...HEAD -- \
            'protos/' 2>/dev/null \
            | grep -E '\.proto$|buf\.(yaml|gen\.yaml)$' || true)
          if [ -n "$changed_protos" ]; then echo "has_protos=1" >> "$GITHUB_OUTPUT"
          else
            echo "has_protos=0" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No proto files changed — buf lint/format/stubs checks skipped."
          fi

      - name: buf lint (proto syntax and style)
        if: steps.proto-detect.outputs.has_protos == '1'
        working-directory: protos
        run: buf lint

      - name: buf format check
        if: steps.proto-detect.outputs.has_protos == '1'
        working-directory: protos
        run: buf format --diff --exit-code

      # ── Proto: stubs freshness (generate + diff) ──────────────────────────
      - name: Detect buf.gen.yaml
        id: gen-detect
        run: |
          if [ -f protos/buf.gen.yaml ]; then echo "has_gen=1" >> "$GITHUB_OUTPUT"
          else
            echo "has_gen=0" >> "$GITHUB_OUTPUT"
            echo "ℹ️  protos/buf.gen.yaml not found — stubs freshness check skipped."
          fi

      - name: Generate stubs and check for drift
        if: steps.gen-detect.outputs.has_gen == '1' && steps.proto-detect.outputs.has_protos == '1'
        working-directory: protos
        run: |
          buf generate --template buf.gen.yaml
          if ! git diff --quiet -- generated/; then
            echo "❌ Generated stubs are out of date. Run 'make generate-protos' and commit."
            git diff --stat -- generated/; exit 1
          fi
          echo "✅ Generated stubs are up to date (first pass)"
          buf generate --template buf.gen.yaml
          if ! git diff --quiet -- generated/; then
            echo "❌ buf generate is not deterministic — second run produced a diff."
            git diff --stat -- generated/; exit 1
          fi
          echo "✅ buf generate is deterministic (second pass identical)"

      # ── Spec: AsyncAPI + JSON Schema ──────────────────────────────────────
      - name: Detect spec files
        id: spec-detect
        run: |
          if [ ! -f spec/asyncapi/zynax-events.yaml ]; then
            echo "has_spec=0" >> "$GITHUB_OUTPUT"
            echo "ℹ️  spec/asyncapi/zynax-events.yaml not found — spec validation skipped."
            exit 0
          fi
          changed_spec=$(git diff --name-only origin/main...HEAD -- 'spec/' 2>/dev/null | grep . || true)
          if [ -n "$changed_spec" ]; then echo "has_spec=1" >> "$GITHUB_OUTPUT"
          else
            echo "has_spec=0" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No spec files changed — spec validation skipped."
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: steps.spec-detect.outputs.has_spec == '1'
        with:
          node-version: "20"

      - name: Install AsyncAPI CLI
        if: steps.spec-detect.outputs.has_spec == '1'
        run: npm install -g @asyncapi/cli --quiet

      - name: Validate AsyncAPI spec
        if: steps.spec-detect.outputs.has_spec == '1'
        run: |
          asyncapi validate spec/asyncapi/zynax-events.yaml
          echo "✅ AsyncAPI spec is valid"

      - name: Validate JSON Schemas are well-formed
        if: steps.spec-detect.outputs.has_spec == '1'
        run: zynax-ci validate schema spec/schemas/

# ── Lint: Go services ─────────────────────────────────────────────────────────
  lint-go:
    name: lint-go
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/zynax-io/zynax/ci-runner@sha256:cf4972f24c76dc8061dfc3f7aef1b08a1b44ec2947953dbac91bdf51ca62491e
      options: --user root
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Trust workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: golangci-lint (platform services)
        if: >-
          needs.changes.outputs.engine_adapter == 'true' ||
          needs.changes.outputs.workflow_compiler == 'true' ||
          needs.changes.outputs.api_gateway == 'true' ||
          needs.changes.outputs.task_broker == 'true' ||
          needs.changes.outputs.agent_registry == 'true'
        env:
          ENGINE_ADAPTER_CHANGED:    ${{ needs.changes.outputs.engine_adapter }}
          WORKFLOW_COMPILER_CHANGED: ${{ needs.changes.outputs.workflow_compiler }}
          API_GATEWAY_CHANGED:       ${{ needs.changes.outputs.api_gateway }}
          TASK_BROKER_CHANGED:       ${{ needs.changes.outputs.task_broker }}
          AGENT_REGISTRY_CHANGED:    ${{ needs.changes.outputs.agent_registry }}
        run: |
          bash tools/ci/run-go-svc-loop.sh services/ "${{ env.SERVICE_LIST }}" -- \
            golangci-lint run ./... --config ../../tools/golangci-lint.yml
          echo "✅ Go service lint passed"

      - name: golangci-lint (Go adapters)
        if: needs.changes.outputs.adapters_go == 'true'
        run: |
          failed=false
          for adapter in ${{ env.GO_ADAPTER_LIST }}; do
            if [ -f "agents/adapters/${adapter}/go.mod" ]; then
              echo "── lint: agents/adapters/${adapter}"
              cd "agents/adapters/${adapter}"
              GOWORK=off golangci-lint run ./... --config ../../../tools/golangci-lint.yml || failed=true
              cd ../../..
            fi
          done
          $failed && exit 1 || echo "✅ Go adapter lint passed"

      - name: golangci-lint (CLI tools)
        if: needs.changes.outputs.cli == 'true'
        run: |
          failed=false
          for cli in zynax zynax-ci; do
            if [ -f "cmd/${cli}/go.mod" ]; then
              echo "── lint: cmd/${cli}"
              cd "cmd/${cli}"
              GOWORK=off golangci-lint run ./... --config ../../tools/golangci-lint.yml || failed=true
              cd ../..
            fi
          done
          $failed && exit 1 || echo "✅ CLI tool lint passed"

      - name: zynax-ci check deps (go.mod version alignment)
        run: |
          cd cmd/zynax-ci
          GOWORK=off go run . check deps --root "$GITHUB_WORKSPACE"
          echo "✅ go.mod version alignment check passed"

      - name: zynax-ci check images (digest drift detection)
        run: |
          cd cmd/zynax-ci
          GOWORK=off go run . images check --root "$GITHUB_WORKSPACE"
          echo "✅ Image digest alignment check passed"

# ── Lint: Python agents and SDK ───────────────────────────────────────────────
  lint-python:
    name: lint-python
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/zynax-io/zynax/ci-runner@sha256:cf4972f24c76dc8061dfc3f7aef1b08a1b44ec2947953dbac91bdf51ca62491e
      options: --user root
    needs: [changes]
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect Python agents
        id: py-detect
        run: |
          count=$(find agents/ -name "*.py" 2>/dev/null | wc -l)
          echo "has_py=$count" >> "$GITHUB_OUTPUT"
          # Auto-discover example agents from agents/examples/*/pyproject.toml
          # (mirrors the Makefile AGENTS glob — no manual list to maintain).
          agents=""
          for dir in agents/examples/*/; do
            [ -f "${dir}pyproject.toml" ] && agents="$agents $(basename "$dir")"
          done
          agents=$(echo "$agents" | tr ' ' '\n' | sort | tr '\n' ' ')
          echo "agents=$agents" >> "$GITHUB_OUTPUT"
          echo "Discovered example agents: ${agents:-<none>}"

      - name: ruff + mypy (SDK + all Python agents)
        if: steps.py-detect.outputs.has_py != '0'
        run: |
          failed=false

          if [ -f agents/sdk/pyproject.toml ]; then
            echo "── lint: agents/sdk"
            cd agents/sdk
            uv run ruff check src/ || failed=true
            uv run mypy src/ --strict || failed=true
            cd ../..
          fi

          for agent in ${{ steps.py-detect.outputs.agents }}; do
            if [ -f "agents/examples/${agent}/pyproject.toml" ]; then
              echo "── lint: agents/examples/${agent}"
              cd "agents/examples/${agent}"
              uv run ruff check src/ tests/ || failed=true
              uv run mypy src/ --strict || failed=true
              cd ../../..
            fi
          done

          $failed && exit 1 || echo "✅ Python lint passed"

      # Authoring <-> runtime expert mapping drift guard (#1205 / ADR-033).
      # Reconciles automation/experts/runtime_mapping.yaml against the .claude
      # authoring experts (read-only), agents/examples runtime agents, and the
      # ADR-033 mapping table. Always runs in this lane (no agents/ files needed).
      - name: Expert mapping drift guard (ADR-033)
        run: uv run --no-project --quiet --with pyyaml python automation/scripts/check_expert_mapping.py

# ── Tests: Go ─────────────────────────────────────────────────────────────────
# Calls _test-go.yml reusable workflow (Go unit + BDD + coverage gates).
# always() breaks cascade-skip when lint lanes are skipped on path-filtered PRs.
  test-go:
    name: test-go
    needs: [changes, lint-go, lint-proto]
    if: >-
      always() &&
      needs.changes.result == 'success' &&
      needs.changes.outputs.code == 'true' &&
      needs.lint-go.result != 'failure' &&
      needs.lint-proto.result != 'failure'
    uses: ./.github/workflows/_test-go.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      engine_adapter:    ${{ needs.changes.outputs.engine_adapter }}
      workflow_compiler: ${{ needs.changes.outputs.workflow_compiler }}
      api_gateway:       ${{ needs.changes.outputs.api_gateway }}
      task_broker:       ${{ needs.changes.outputs.task_broker }}
      agent_registry:    ${{ needs.changes.outputs.agent_registry }}
      cli:               ${{ needs.changes.outputs.cli }}
      adapters_go:       ${{ needs.changes.outputs.adapters_go }}
      event_name:        ${{ github.event_name }}
      pr_base_sha:       ${{ github.event.pull_request.base.sha || '' }}
      pr_head_sha:       ${{ github.event.pull_request.head.sha || '' }}

# ── Tests: Python ─────────────────────────────────────────────────────────────
# Runs in parallel with test-go (independent lane).
  test-python:
    name: test-python
    needs: [changes, lint-python]
    if: >-
      always() &&
      needs.changes.result == 'success' &&
      needs.changes.outputs.code == 'true' &&
      needs.changes.outputs.python == 'true' &&
      needs.lint-python.result != 'failure'
    uses: ./.github/workflows/_test-python.yml
    with:
      event_name: ${{ github.event_name }}

# ── test-unit: required-check wrapper (branch protection gate) ────────────────
# Branch protection requires "test-unit" to pass. This wrapper job fulfils
# that requirement by waiting for test-go + test-python.
# IMPORTANT: must use `if: always()` unconditionally. Using
# `!contains(needs.*.result, 'failure')` causes the job to be SKIPPED (not
# failed) when an upstream job fails — GitHub treats SKIPPED as neutral and
# allows the merge, bypassing the required-check gate entirely (#986).
  test-unit:
    name: test-unit
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/zynax-io/zynax/ci-runner@sha256:cf4972f24c76dc8061dfc3f7aef1b08a1b44ec2947953dbac91bdf51ca62491e
      options: --user root
    needs: [test-go, test-python]
    if: always()
    steps:
      - name: All tests passed
        run: |
          tg="${{ needs.test-go.result }}"
          tp="${{ needs.test-python.result }}"
          echo "test-go=${tg}  test-python=${tp}"
          if [[ "${tg}" == "failure" || "${tp}" == "failure" ]]; then
            echo "::error::test-go=${tg}  test-python=${tp}"
            exit 1
          fi
          echo "✅ all tests passed or skipped"

# ── Integration Tests ─────────────────────────────────────────────────────────
# No-op skeleton until real integration tests exist (#227 / M7.C).
  test-integration:
    name: test-integration
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/zynax-io/zynax/ci-runner@sha256:cf4972f24c76dc8061dfc3f7aef1b08a1b44ec2947953dbac91bdf51ca62491e
      options: --user root
    needs: [changes, lint-go, lint-proto, lint-python]
    if: >-
      always() &&
      needs.changes.result == 'success' &&
      needs.changes.outputs.code == 'true' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect integration tests
        id: int-detect
        run: |
          count=$(grep -rl "//go:build integration" services/ 2>/dev/null | wc -l)
          echo "has_integration=$count" >> "$GITHUB_OUTPUT"

      - name: Run integration tests
        if: steps.int-detect.outputs.has_integration != '0'
        run: |
          failed=false
          for svc in ${{ env.SERVICE_LIST }}; do
            if grep -rl "//go:build integration" "services/${svc}/" 2>/dev/null | grep -q .; then
              echo "── integration: services/${svc}"
              cd "services/${svc}"
              GOWORK=off go test -tags=integration ./... -v -timeout 120s
              cd ../..
            fi
          done
          echo "✅ Integration tests passed"

      - name: No integration tests yet
        if: steps.int-detect.outputs.has_integration == '0'
        run: |
          echo "ℹ️  No integration test files found — job passes as a no-op."
          echo "   Tag test files with '//go:build integration' to include them here."

# ── Security ──────────────────────────────────────────────────────────────────
# govulncheck (Go CVE), bandit + pip-audit (Python SAST/CVE), trivy (Dockerfile).
  security:
    name: security
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/zynax-io/zynax/ci-runner@sha256:cf4972f24c76dc8061dfc3f7aef1b08a1b44ec2947953dbac91bdf51ca62491e
      options: --user root
    needs: [dco, changes]
    if: github.event_name != 'push' || needs.changes.outputs.code == 'true'
    env:
      UV_LINK_MODE: copy
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect Go services
        id: go-detect
        run: |
          count=$(find services/ -name "go.mod" 2>/dev/null | wc -l)
          echo "has_go=$count" >> "$GITHUB_OUTPUT"

      - name: govulncheck (changed Go services)
        if: steps.go-detect.outputs.has_go != '0'
        env:
          ENGINE_ADAPTER_CHANGED:    ${{ needs.changes.outputs.engine_adapter }}
          WORKFLOW_COMPILER_CHANGED: ${{ needs.changes.outputs.workflow_compiler }}
          API_GATEWAY_CHANGED:       ${{ needs.changes.outputs.api_gateway }}
          TASK_BROKER_CHANGED:       ${{ needs.changes.outputs.task_broker }}
          AGENT_REGISTRY_CHANGED:    ${{ needs.changes.outputs.agent_registry }}
        run: |
          bash tools/ci/run-go-svc-loop.sh services/ "${{ env.SERVICE_LIST }}" -- govulncheck ./...
          echo "✅ govulncheck passed"

      - name: Detect Python agents
        id: py-detect
        run: |
          count=$(find agents/ -name "*.py" 2>/dev/null | wc -l)
          echo "has_py=$count" >> "$GITHUB_OUTPUT"
          # Auto-discover example agents from agents/examples/*/pyproject.toml
          # (mirrors the Makefile AGENTS glob — no manual list to maintain).
          agents=""
          for dir in agents/examples/*/; do
            [ -f "${dir}pyproject.toml" ] && agents="$agents $(basename "$dir")"
          done
          agents=$(echo "$agents" | tr ' ' '\n' | sort | tr '\n' ' ')
          echo "agents=$agents" >> "$GITHUB_OUTPUT"
          echo "Discovered example agents: ${agents:-<none>}"

      - name: bandit + pip-audit (SDK + all Python agents)
        if: steps.py-detect.outputs.has_py != '0' && needs.changes.outputs.python == 'true'
        run: |
          failed=false

          if [ -f agents/sdk/pyproject.toml ]; then
            echo "── bandit: agents/sdk"
            cd agents/sdk
            uv run bandit -r src/ -ll -f json -o bandit-report.json || failed=true
            uv run bandit -r src/ -ll || true
            echo "── pip-audit: agents/sdk"
            # --ignore-vuln PYSEC-2026-196: pip 26.1.1 vuln (fix: 26.1.2) reported
            # because pip-audit scans the CI runner environment; zynax-sdk does not
            # depend on pip directly. Remove once runner image upgrades pip.
            uv run pip-audit --ignore-vuln PYSEC-2026-196 || failed=true
            cd ../..
          fi

          for agent in ${{ steps.py-detect.outputs.agents }}; do
            if [ -f "agents/examples/${agent}/pyproject.toml" ]; then
              echo "── bandit: agents/examples/${agent}"
              cd "agents/examples/${agent}"
              uv run bandit -r src/ -ll -f json -o bandit-report.json || failed=true
              uv run bandit -r src/ -ll || true
              echo "── pip-audit: agents/examples/${agent}"
              uv run pip-audit || failed=true
              cd ../../..
            fi
          done
          $failed && exit 1 || echo "✅ Security scans passed"

      - name: trivy filesystem scan (go.mod + pyproject.toml CVEs)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          exit-code: 1
          severity: HIGH,CRITICAL
          scanners: vuln
          skip-dirs: .git
          trivyignores: .trivyignore
          cache: false

      - name: trivy Dockerfile misconfiguration scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: infra/
          exit-code: 1
          severity: HIGH,CRITICAL
          trivyignores: .trivyignore
          cache: false

      - name: No security targets yet
        if: steps.go-detect.outputs.has_go == '0' && steps.py-detect.outputs.has_py == '0'
        run: |
          echo "ℹ️  No Go or Python source found — govulncheck and bandit skipped."
          echo "   trivy dependency and config scans above always run."

# ── Pre-merge image build + scan (shift-left gate — ADR-027, #1118) ───────────
# Builds every container image ONCE, pre-merge, pushes it to the public GHCR
# staging lane (staging/<svc>:pr-<head-sha>), then gates the PR on:
#   Hadolint (Dockerfile lint) → Trivy CRITICAL,HIGH (exit-code 1, .trivyignore
#   honored) → SARIF to the Security tab → CycloneDX SBOM artifact (30 days).
# On merge the staging image is RETAGGED, never rebuilt (#1120) — the image in
# production is the exact binary that passed this gate.
#
# Locked matrix strategy (#1118): ALL images build when ANY docker-relevant path
# changes (a base-image or shared-template change affects every image); the
# whole matrix is skipped otherwise. Tag uses the PR HEAD sha (not the synthetic
# merge sha) so the retag job can recover it from workflow_run.head_sha (ADR-027)
# and e2e-smoke can derive it from the PR context.
# provenance default kept (SLSA Build L1 — ADR-025): do not set provenance:false.
  build-images:
    name: "Build + scan: ${{ matrix.service }}"
    runs-on: ubuntu-24.04
    needs: [changes, lint-go]
    if: >-
      always() &&
      needs.changes.result == 'success' &&
      needs.changes.outputs.docker == 'true' &&
      needs.lint-go.result != 'failure' &&
      (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      packages: write          # pushes staging-lane images to GHCR
      security-events: write   # uploads trivy SARIF to the GitHub Security tab
    strategy:
      fail-fast: false
      matrix:
        # Keep in sync with the cleanup matrix in pr-image-cleanup.yml (#1119) —
        # every service pushed to the staging lane must be deleted on PR close.
        include:
          # Go services — shared template infra/docker/Dockerfile.service (#668)
          - { service: api-gateway }
          - { service: engine-adapter }
          - { service: workflow-compiler }
          - { service: task-broker }
          - { service: agent-registry }
          - { service: event-bus }
          - { service: memory-service }
          # Adapters — per-adapter Dockerfiles (same model — spec Q3C locked)
          - { service: http-adapter,      dockerfile: agents/adapters/http/Dockerfile }
          - { service: llm-adapter,       dockerfile: agents/adapters/llm/Dockerfile }
          - { service: langgraph-adapter, dockerfile: agents/adapters/langgraph/Dockerfile }
          - { service: ci-adapter,        dockerfile: agents/adapters/ci/Dockerfile }
          - { service: git-adapter,       dockerfile: agents/adapters/git/Dockerfile }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve staging image ref
        id: ref
        run: |
          HEAD_SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          echo "image=ghcr.io/zynax-io/zynax/staging/${{ matrix.service }}:pr-${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"

      # failure-threshold starts at `error`: the Go template + 3 Go adapters carry
      # pre-existing DL3003 warnings (RUN cd → WORKDIR). Promote to `warning`
      # once those are cleaned up.
      - name: Hadolint — Dockerfile lint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ${{ matrix.dockerfile || 'infra/docker/Dockerfile.service' }}
          failure-threshold: error

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # cache scope matches release.yml's amd64 build so PR builds reuse the
      # layer cache populated on main (same Dockerfile, same context).
      - name: Build and push to staging lane
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ matrix.dockerfile || 'infra/docker/Dockerfile.service' }}
          build-args: SVC=${{ matrix.service }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.ref.outputs.image }}
          labels: |
            org.opencontainers.image.revision=${{ steps.ref.outputs.head_sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha,scope=${{ matrix.service }}-amd64
          cache-to: type=gha,scope=${{ matrix.service }}-amd64,mode=max

      - name: Trivy scan (CRITICAL,HIGH = fail)
        id: trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          # Same DB pin + severity-source policy as release.yml (#1022).
          # renovate: datasource=docker depName=ghcr.io/aquasecurity/trivy-db
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db:2@sha256:225c785a3ce630d8f8b75ab23f4d7b0b1402f94a54dfe6441e6711c7deb8dec8
          TRIVY_VULN_SEVERITY_SOURCE: nvd,ghsa
        with:
          image-ref: ${{ steps.ref.outputs.image }}
          version: v0.71.0
          format: sarif
          output: trivy-staging-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: false
          trivyignores: .trivyignore

      # Upload even on a failed scan so findings are visible in the Security tab.
      - name: Upload Trivy SARIF to GitHub Security tab
        if: always() && steps.trivy.outcome != 'skipped'
        uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3.36.0
        with:
          sarif_file: trivy-staging-${{ matrix.service }}.sarif
          category: staging-${{ matrix.service }}

      # SBOM from the pushed staging image — generated even when Trivy fails so
      # the inventory of a blocked PR is still auditable.
      - name: Generate SBOM (CycloneDX JSON)
        if: always() && steps.build.outcome == 'success'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.ref.outputs.image }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.service }}.json
          upload-artifact: false

      - name: Upload SBOM artifact
        if: always() && steps.build.outcome == 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-${{ matrix.service }}-${{ steps.ref.outputs.head_sha }}
          path: sbom-${{ matrix.service }}.json
          retention-days: 30
