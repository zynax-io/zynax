# SPDX-License-Identifier: Apache-2.0
# Zynax — zynax-ci binary release (manual trigger only)
#
# Tag-triggered releases are handled by release.yml (unified coordinator).
# Use this for dry-run builds.

name: zynax-ci release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.4.0)'
        required: true

# Least-privilege default — jobs that need more escalate per-job below (#1116).
permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: cmd/zynax-ci/go.mod
          cache: true
          cache-dependency-path: cmd/zynax-ci/go.sum

      - name: Build zynax-ci binary
        working-directory: cmd/zynax-ci
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          GOWORK=off go build -trimpath \
            -ldflags "-s -w -X github.com/zynax-io/zynax/cmd/zynax-ci/cmd.Version=${GITHUB_REF_NAME}" \
            -o zynax-ci-${{ matrix.suffix }} .

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: zynax-ci-${{ matrix.suffix }}
          path: cmd/zynax-ci/zynax-ci-${{ matrix.suffix }}
          retention-days: 1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: [build]
    permissions:
      contents: write   # creates the GitHub Release with zynax-ci binaries
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: zynax-ci ${{ github.ref_name || inputs.tag }}
          body: |
            ## zynax-ci ${{ github.ref_name || inputs.tag }}

            Standalone CI and developer toolchain for Zynax.

            ### Installation

            ```bash
            # Linux (amd64)
            curl -fsSL https://github.com/zynax-io/zynax/releases/download/${{ github.ref_name || inputs.tag }}/zynax-ci-linux-amd64 \
              -o ~/bin/zynax-ci && chmod +x ~/bin/zynax-ci

            # macOS (Apple Silicon)
            curl -fsSL https://github.com/zynax-io/zynax/releases/download/${{ github.ref_name || inputs.tag }}/zynax-ci-darwin-arm64 \
              -o ~/bin/zynax-ci && chmod +x ~/bin/zynax-ci
            ```

            Or build from source: `cd cmd/zynax-ci && GOWORK=off go build -o ~/bin/zynax-ci .`
          files: dist/zynax-ci-*
          generate_release_notes: true
