# SPDX-License-Identifier: Apache-2.0
# PR image cleanup — delete staging-lane images when a PR closes (#1119, ADR-027).
#
# The pre-merge build-images job in ci.yml pushes staging/<svc>:pr-<head-sha>
# images to GHCR for every docker-relevant PR. Without cleanup that lane grows
# unbounded. This workflow fires on PR close — merged AND abandoned — and
# deletes the package versions tagged with the closed PR's head SHA, keeping
# GHCR storage bounded with zero manual hygiene.
#
# A PR that never built staging images (e.g. docs-only) simply finds no
# matching version and exits 0 — fail-fast is off and a missing package or
# version is never an error.
#
# Tag-targeted deletion uses the GitHub REST API directly via the runner's
# preinstalled `gh` CLI: actions/delete-package-versions cannot select a
# container version by tag (long-open upstream request), so the version id
# must be resolved through the API either way — doing the DELETE with the
# same API keeps third-party action surface at zero (supply chain, #1116).
#
# Ordering vs the retag model (§3C, #1120): release.yml's retag-on-merge job
# promotes the staging manifest AFTER the post-merge CI run completes — several
# minutes after the PR closes. Deleting on merge would therefore race (and
# win) against the promotion, leaving nothing to retag (observed live on
# PR #1137). Split of responsibilities:
#   - PRs closed WITHOUT merging → cleaned up here (the only consumer of the
#     staging image was the PR itself).
#   - Merged PRs → release.yml retag-on-merge deletes each staging version
#     right after promoting + signing it (the manifest is copied into the
#     production package zynax/<svc>, so the staging version is dead weight
#     the moment promotion lands).
# A merged PR whose post-merge CI never goes green keeps its staging images
# until the run is fixed/re-run — that is intentional: they are still the
# only promotable artifact for that merge.

name: PR Image Cleanup

on:
  pull_request:
    types: [closed]

permissions:
  packages: write

concurrency:
  group: pr-image-cleanup-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  cleanup:
    name: "Delete staging: ${{ matrix.service }}"
    # Merged PRs are cleaned by release.yml retag-on-merge AFTER promotion —
    # deleting here would race the retag and strand the merge unpromoted.
    # Fork PRs never pushed a staging image (read-only token — see ci.yml
    # build-images), so there is nothing to delete and packages:write would 403.
    if: >-
      github.event.pull_request.merged == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        # Keep in sync with the build-images matrix in ci.yml (#1118) — every
        # service that pushes to the staging lane must be cleaned up here.
        service:
          - api-gateway
          - engine-adapter
          - workflow-compiler
          - task-broker
          - agent-registry
          - event-bus
          - memory-service
          - http-adapter
          - llm-adapter
          - langgraph-adapter
          - ci-adapter
          - git-adapter
    steps:
      - name: Delete staging package version for pr-<head-sha>
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          SERVICE: ${{ matrix.service }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          TAG="pr-${HEAD_SHA}"
          PKG="zynax%2Fstaging%2F${SERVICE}"

          # 404 (package never created — service never built on any PR) is a
          # quiet no-op, same as a docs-only PR that built nothing. On a non-2xx
          # response gh api exits non-zero but still prints the JSON error body
          # to stdout, so reset IDS on failure — an `|| true` INSIDE the
          # substitution would keep that body and feed garbage to the loop.
          IDS=$(gh api --paginate "/orgs/${OWNER}/packages/container/${PKG}/versions" \
            --jq ".[] | select(.metadata.container.tags[]? == \"${TAG}\") | .id" \
            2>/dev/null) || IDS=""

          if [ -z "${IDS}" ]; then
            echo "No staging version tagged ${TAG} for ${SERVICE} — nothing to delete."
            exit 0
          fi

          for ID in ${IDS}; do
            # Belt and braces: only numeric version ids reach the DELETE call.
            if ! [[ "${ID}" =~ ^[0-9]+$ ]]; then
              echo "Skipping non-numeric version id token: ${ID}"
              continue
            fi
            gh api --method DELETE \
              "/orgs/${OWNER}/packages/container/${PKG}/versions/${ID}"
            echo "Deleted staging/${SERVICE} version ${ID} (tag ${TAG})."
          done
