name: AI Context Budget

on:
  push:
    branches: [main]
    paths:
      - 'CLAUDE.md'
      - '**/AGENTS.md'
      - 'docs/ai-assistant-setup.md'
  pull_request:
    paths:
      - 'CLAUDE.md'
      - '**/AGENTS.md'
      - 'docs/ai-assistant-setup.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  count:
    name: Count AI context lines
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/zynax-io/zynax/ci-runner@sha256:b0653d255e0b8b7133b8c7537a8885431f68367bb74ba7851f73e58a3d675d0f
      options: --user root
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Count AI context lines
        id: count
        run: |
          OUTPUT=$(zynax-ci check ai-context)
          echo "$OUTPUT"
          {
            echo "## AI Context Budget"
            echo ""
            echo "$OUTPUT"
          } >> "$GITHUB_STEP_SUMMARY"
        # Advisory only — never fail CI
        continue-on-error: false
