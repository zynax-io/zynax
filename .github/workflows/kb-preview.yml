# SPDX-License-Identifier: Apache-2.0
# KB Previsualization — renders a human-readable preview of AI knowledge base
# additions. This workflow (on pull_request) stays read-only and uploads the
# preview as an artifact; kb-preview-post.yml posts the comment and sets the
# kb-content-previsualized status on workflow_run, from the trusted base-repo
# context — so PRs from forks (read-only token) get the preview too (#1668).
#
# Triggered only on PRs that touch KB paths (ADR-018):
#   CLAUDE.md · AGENTS.md · docs/ai-assistant-setup.md · .ai/ · .claude/
#
# Status check name: kb-content-previsualized
#   success  — preview comment posted; reviewer must read it before approving
#   success  — PR has no KB additions (deletions / renames only)
#
# The actual merge gate is CODEOWNERS: a maintainer must approve the PR.
# The PR checklist (PULL_REQUEST_TEMPLATE.md) requires the reviewer to
# confirm they read the preview comment before clicking Approve.
# Note: a comment-based approval workflow (issue_comment trigger) only runs
# from the default branch — incompatible with a PR-branch-only design.

name: KB Previsualization

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'CLAUDE.md'
      - 'AGENTS.md'
      - '**/AGENTS.md'
      - 'docs/ai-assistant-setup.md'
      - 'docs/knowledge-base-policy.md'
      - 'docs/patterns/spdd-guide.md'
      - 'docs/spdd/**'
      - '.ai/**'
      - '.claude/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default — jobs that need more escalate per-job below (#1116).
permissions:
  contents: read

jobs:
  kb-previsualize:
    name: kb-content-previsualized
    runs-on: ubuntu-24.04
    permissions:
      contents: read   # read-only; the comment + status are set by kb-preview-post.yml (workflow_run)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Extract KB additions
        id: extract
        run: |
          additions=$(git diff --diff-filter=AM \
            "origin/${{ github.base_ref }}...HEAD" -- \
            CLAUDE.md AGENTS.md '*/AGENTS.md' \
            'docs/ai-assistant-setup.md' 'docs/knowledge-base-policy.md' \
            'docs/patterns/spdd-guide.md' 'docs/spdd/**' \
            '.ai/**' '.claude/**' \
            | grep '^+' | grep -v '^+++' | sed 's/^+//' | head -300)
          if [ -z "$additions" ]; then
            echo "has_additions=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_additions=true" >> "$GITHUB_OUTPUT"
            delimiter="$(openssl rand -hex 8)"
            {
              echo "additions<<${delimiter}"
              echo "${additions}"
              echo "${delimiter}"
            } >> "$GITHUB_OUTPUT"
          fi

      # Render the preview comment body to the payload dir (fork PRs run with a
      # read-only token and cannot comment or set a status here). kb-preview-post.yml
      # posts the comment and sets the kb-content-previsualized status on
      # workflow_run, from the trusted base-repo context.
      - name: Render KB content preview comment
        if: steps.extract.outputs.has_additions == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          ADDITIONS: ${{ steps.extract.outputs.additions }}
        with:
          script: |
            const fs = require('fs');
            const additions = process.env.ADDITIONS;
            const body = [
              '<!-- zynax-kb-preview -->',
              '## 🔍 Knowledge Base Content Preview',
              '',
              'The following content will become **publicly visible** on merge.',
              'A maintainer must review this preview before approving.',
              '',
              '```',
              additions,
              '```',
              '',
              '---',
              '_This preview was generated automatically. If the content above_',
              '_contains secrets, PII, or prompt injection, close this PR and_',
              '_open a security issue._',
              '',
              '_Policy: [docs/knowledge-base-policy.md](docs/knowledge-base-policy.md)_',
              '_Before approving the PR, confirm all items in the KB Security Review checklist._',
            ].join('\n');
            fs.mkdirSync('kb-preview', { recursive: true });
            fs.writeFileSync('kb-preview/comment.md', body);

      # Metadata for the trusted poster: PR number, head SHA, and whether a
      # comment was rendered (drives the status description).
      - name: Record KB preview metadata
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HAS_ADDITIONS: ${{ steps.extract.outputs.has_additions }}
        run: |
          mkdir -p kb-preview
          printf '{"pr":%s,"sha":"%s","has_additions":%s}\n' \
            "$PR_NUMBER" "$HEAD_SHA" "$HAS_ADDITIONS" > kb-preview/meta.json

      - name: Upload KB preview payload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: kb-preview-payload
          path: kb-preview/
          if-no-files-found: ignore
          retention-days: 1
