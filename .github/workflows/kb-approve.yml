# SPDX-License-Identifier: Apache-2.0
# KB Preview Approval — listens for maintainer approval comments on KB PRs
# and flips the kb-content-previsualized status check to success.
#
# Trigger: a PR comment containing "KB preview approved"
# Auth:    only @zynax-io/maintainers (admin or maintain permission) can approve
#
# Approval comment format (post on the PR):
#   KB preview approved
#
# The kb-preview.yml workflow sets the status to pending when it posts the
# preview comment. This workflow sets it to success once a maintainer approves.

name: KB Preview Approval

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  statuses: write
  pull-requests: read

jobs:
  kb-approve:
    name: KB preview approval
    # Only run on PR comments that contain the approval phrase
    if: >-
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, 'KB preview approved')
    runs-on: ubuntu-24.04
    steps:
      - name: Verify commenter has maintainer permissions
        id: check-permission
        run: |
          login="${{ github.event.comment.user.login }}"
          permission=$(gh api \
            "repos/${{ github.repository }}/collaborators/${login}/permission" \
            --jq '.permission' 2>/dev/null || echo "none")
          echo "permission=${permission}" >> "$GITHUB_OUTPUT"
          echo "login=${login}" >> "$GITHUB_OUTPUT"
          if [[ "${permission}" != "admin" && "${permission}" != "maintain" ]]; then
            echo "⚠️ @${login} does not have maintainer permissions (${permission})."
            echo "   Only maintainers can approve KB previews."
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Get PR HEAD SHA
        id: get-sha
        run: |
          sha=$(gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}" \
            --jq '.head.sha')
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Approve — set kb-content-previsualized to success
        if: >-
          steps.check-permission.outputs.permission == 'admin' ||
          steps.check-permission.outputs.permission == 'maintain'
        run: |
          login="${{ steps.check-permission.outputs.login }}"
          sha="${{ steps.get-sha.outputs.sha }}"
          gh api \
            "repos/${{ github.repository }}/statuses/${sha}" \
            --method POST \
            --field state=success \
            --field context=kb-content-previsualized \
            --field "description=KB preview approved by @${login}"
          echo "✅ KB preview approved by @${login} — status set to success."
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Reject — commenter is not a maintainer
        if: >-
          steps.check-permission.outputs.permission != 'admin' &&
          steps.check-permission.outputs.permission != 'maintain'
        run: |
          login="${{ steps.check-permission.outputs.login }}"
          echo "❌ @${login} cannot approve KB previews — not a repo maintainer."
          exit 1
