# SPDX-License-Identifier: Apache-2.0
#
# Release coordinator — single workflow triggered by a version tag.
# Fans out to parallel build jobs, then creates ONE GitHub Release with
# all artifacts attached. Replaces the three legacy tag-triggered workflows
# (cli-release.yml, service-release.yml, zynax-ci-release.yml), which are
# now workflow_dispatch-only for manual/dry-run use.
#
# Trigger:
#   git tag v0.4.0 && git push origin v0.4.0
#
# Dry-run (manual):
#   Actions → Release → Run workflow → enter tag

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  schedule:
    - cron: '0 3 * * 1'    # Monday 03:00 UTC — weekly base-image CVE safety net
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.4.0)'
        required: false
      rebuild_all:
        description: 'Force rebuild all service images regardless of changes'
        type: boolean
        default: false

permissions:
  contents: write
  packages: write
  id-token: write            # reserved for cosign OIDC signing (#239) — do not remove
  security-events: write     # required for trivy SARIF upload to GitHub Security tab

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/zynax-io/zynax
  SYFT_VERSION: "1.44.0"

# ── CLI binary — 5 platforms ──────────────────────────────────────────────────

jobs:
  build-cli:
    name: CLI — ${{ matrix.goos }}/${{ matrix.goarch }}
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64, archive: tar.gz }
          - { goos: linux,   goarch: arm64, archive: tar.gz }
          - { goos: darwin,  goarch: amd64, archive: tar.gz }
          - { goos: darwin,  goarch: arm64, archive: tar.gz }
          - { goos: windows, goarch: amd64, archive: zip    }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: cmd/zynax/go.mod
          cache-dependency-path: cmd/zynax/go.sum

      - name: Resolve version
        id: ver
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          BINARY=zynax
          [ "$GOOS" = "windows" ] && BINARY=zynax.exe
          cd cmd/zynax
          GOWORK=off go build -trimpath \
            -ldflags "-s -w -X github.com/zynax-io/zynax/cmd/zynax/cmd.Version=${VERSION}" \
            -o "${BINARY}" .

      - name: Package
        id: pkg
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          NAME="zynax_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          cd cmd/zynax
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip "${NAME}.zip" zynax.exe
            echo "file=${NAME}.zip" >> "$GITHUB_OUTPUT"
          else
            tar czf "${NAME}.tar.gz" zynax
            echo "file=${NAME}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cmd/zynax/${{ steps.pkg.outputs.file }}
          retention-days: 7

# ── zynax-ci binary — 4 platforms ────────────────────────────────────────────

  build-zynax-ci:
    name: zynax-ci — ${{ matrix.goos }}/${{ matrix.goarch }}
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - { goos: linux,  goarch: amd64, suffix: linux-amd64  }
          - { goos: linux,  goarch: arm64, suffix: linux-arm64  }
          - { goos: darwin, goarch: amd64, suffix: darwin-amd64 }
          - { goos: darwin, goarch: arm64, suffix: darwin-arm64 }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: cmd/zynax-ci/go.mod
          cache: true
          cache-dependency-path: cmd/zynax-ci/go.sum

      - name: Resolve version
        id: ver
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: cmd/zynax-ci
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          GOWORK=off go build -trimpath \
            -ldflags "-s -w -X github.com/zynax-io/zynax/cmd/zynax-ci/cmd.Version=${{ steps.ver.outputs.version }}" \
            -o zynax-ci-${{ matrix.suffix }} .

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: zynax-ci-${{ matrix.suffix }}
          path: cmd/zynax-ci/zynax-ci-${{ matrix.suffix }}
          retention-days: 7

# ── Per-service change detection ─────────────────────────────────────────────
# On branch pushes: detect which services changed (git diff HEAD^1..HEAD).
# On tag push, schedule, or workflow_dispatch: resolve-matrix forces all services.

  changes:
    name: Detect changed services
    runs-on: ubuntu-24.04
    outputs:
      api_gateway:       ${{ steps.detect.outputs.api_gateway }}
      engine_adapter:    ${{ steps.detect.outputs.engine_adapter }}
      workflow_compiler: ${{ steps.detect.outputs.workflow_compiler }}
      task_broker:       ${{ steps.detect.outputs.task_broker }}
      agent_registry:    ${{ steps.detect.outputs.agent_registry }}
      http_adapter:      ${{ steps.detect.outputs.http_adapter }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Detect per-service file changes
        id: detect
        run: |
          api_gateway=false engine_adapter=false workflow_compiler=false
          task_broker=false agent_registry=false http_adapter=false

          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_type }}" = "branch" ]; then
            if ! FILES=$(git diff --name-only HEAD^1...HEAD 2>/tmp/git-diff-err.txt); then
              echo "⚠️  git diff failed — enabling all services as fail-safe"
              cat /tmp/git-diff-err.txt
              api_gateway=true engine_adapter=true workflow_compiler=true
              task_broker=true agent_registry=true http_adapter=true
            else
              while IFS= read -r f; do
                [ -z "$f" ] && continue
                echo "$f" | grep -qE '^(services/api-gateway/|protos/generated/go/)'      && api_gateway=true
                echo "$f" | grep -qE '^(services/engine-adapter/|protos/generated/go/)'   && engine_adapter=true
                echo "$f" | grep -qE '^(services/workflow-compiler/|protos/generated/go/)' && workflow_compiler=true
                echo "$f" | grep -qE '^(services/task-broker/|protos/generated/go/)'      && task_broker=true
                echo "$f" | grep -qE '^(services/agent-registry/|protos/generated/go/)'   && agent_registry=true
                echo "$f" | grep -qE '^(agents/adapters/http/|protos/generated/go/)'      && http_adapter=true
              done <<< "$FILES"
            fi
          else
            echo "ℹ️  event='${{ github.event_name }}' ref_type='${{ github.ref_type }}' — resolve-matrix will decide"
          fi

          {
            echo "api_gateway=$api_gateway"
            echo "engine_adapter=$engine_adapter"
            echo "workflow_compiler=$workflow_compiler"
            echo "task_broker=$task_broker"
            echo "agent_registry=$agent_registry"
            echo "http_adapter=$http_adapter"
          } >> "$GITHUB_OUTPUT"

  resolve-matrix:
    name: Resolve image build matrix
    needs: [changes]
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      any:    ${{ steps.build.outputs.any }}
    steps:
      - id: build
        run: |
          force="false"
          [[ "${{ github.ref_type }}" == "tag" ]]                     && force="true"
          [[ "${{ github.event_name }}" == "schedule" ]]              && force="true"
          [[ "${{ github.event_name }}" == "workflow_dispatch" ]]     && force="true"
          [[ "${{ inputs.rebuild_all }}" == "true" ]]                 && force="true"

          svc() { printf '{"service":"%s","dockerfile":"%s"}' "$1" "$2"; }
          entries=()
          [[ "$force" == "true" || "${{ needs.changes.outputs.api_gateway }}"       == "true" ]] && entries+=("$(svc api-gateway services/api-gateway/Dockerfile)")
          [[ "$force" == "true" || "${{ needs.changes.outputs.engine_adapter }}"    == "true" ]] && entries+=("$(svc engine-adapter services/engine-adapter/Dockerfile)")
          [[ "$force" == "true" || "${{ needs.changes.outputs.workflow_compiler }}" == "true" ]] && entries+=("$(svc workflow-compiler services/workflow-compiler/Dockerfile)")
          [[ "$force" == "true" || "${{ needs.changes.outputs.task_broker }}"       == "true" ]] && entries+=("$(svc task-broker services/task-broker/Dockerfile)")
          [[ "$force" == "true" || "${{ needs.changes.outputs.agent_registry }}"    == "true" ]] && entries+=("$(svc agent-registry services/agent-registry/Dockerfile)")
          [[ "$force" == "true" || "${{ needs.changes.outputs.http_adapter }}"      == "true" ]] && entries+=("$(svc http-adapter agents/adapters/http/Dockerfile)")

          if [[ ${#entries[@]} -eq 0 ]]; then
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            echo 'any=false' >> "$GITHUB_OUTPUT"
            echo "ℹ️  No service images changed — build skipped."
          else
            printf -v joined '%s,' "${entries[@]}"
            echo "matrix={\"include\":[${joined%,}]}" >> "$GITHUB_OUTPUT"
            echo 'any=true' >> "$GITHUB_OUTPUT"
            echo "✓ Building ${#entries[@]} service(s)"
          fi

# ── Service images + CycloneDX SBOMs ─────────────────────────────────────────

  build-push-images:
    name: Image & SBOM — ${{ matrix.service }}
    needs: [resolve-matrix]
    if: needs.resolve-matrix.outputs.any == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve version
        id: ver
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Compute image tags
        id: img
        run: |
          PREFIX="${{ env.IMAGE_PREFIX }}/${{ matrix.service }}"
          SHA="${{ github.sha }}"
          if [[ "${{ github.ref_type }}" == "branch" && "${{ github.event_name }}" != "workflow_dispatch" ]]; then
            echo "tags=${PREFIX}:main,${PREFIX}:main-${SHA:0:8}" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ steps.ver.outputs.version }}"
            echo "tags=${PREFIX}:${TAG},${PREFIX}:latest" >> "$GITHUB_OUTPUT"
          fi
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # ── Trivy pre-push scan — single-platform build then scan, block on CRITICAL ─
      - name: Build image for trivy scan (linux/amd64)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          load: true
          tags: scan-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: scan-${{ matrix.service }}:${{ github.sha }}
          format: sarif
          output: trivy-results-${{ matrix.service }}.sarif
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Upload trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3.36.0
        with:
          sarif_file: trivy-results-${{ matrix.service }}.sarif
          category: container-${{ matrix.service }}

      # ── Multi-arch push (only reached if trivy scan above exits 0) ────────────
      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.img.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.img.outputs.created }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}

      - name: Report image sizes
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SVC="${{ matrix.service }}"
          DIGEST="${{ steps.build.outputs.digest }}"
          BASE="https://ghcr.io/v2/zynax-io/zynax/${SVC}"
          { echo "## 📦 ${SVC}"; echo "**Digest:** \`${DIGEST}\`"; echo ""; \
            echo "| Platform | Compressed size |"; echo "|----------|-----------------|"; \
          } >> "$GITHUB_STEP_SUMMARY"
          INDEX=$(curl -fsSL \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.oci.image.index.v1+json" \
            "${BASE}/manifests/${DIGEST}" 2>/dev/null) || true
          if [ -n "$INDEX" ]; then
            while IFS='|' read -r osname arch pdigs; do
              MF=$(curl -fsSL \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Accept: application/vnd.oci.image.manifest.v1+json" \
                "${BASE}/manifests/${pdigs}" 2>/dev/null) || true
              if [ -n "$MF" ]; then
                BYTES=$(echo "$MF" | jq '[.layers[].size] | add // 0')
                SIZE_MB=$(echo "scale=1; ${BYTES} / 1048576" | bc)
                echo "| ${osname}/${arch} | ${SIZE_MB} MB |" >> "$GITHUB_STEP_SUMMARY"
              else
                echo "| ${osname}/${arch} | — |" >> "$GITHUB_STEP_SUMMARY"
              fi
            done < <(echo "$INDEX" | jq -r \
              '.manifests[] | select(.platform.architecture == "amd64" or .platform.architecture == "arm64") | select(.platform.os != "unknown") | [.platform.os, .platform.architecture, .digest] | join("|")' \
              2>/dev/null)
          else
            echo "| (manifest unavailable) | — |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"

      - name: Install cosign
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Sign image
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        run: |
          cosign sign --yes \
            "${{ env.IMAGE_PREFIX }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}"

      - name: Install syft ${{ env.SYFT_VERSION }}
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        run: |
          curl -sSfL \
            "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_amd64.tar.gz" \
            -o /tmp/syft.tar.gz
          tar -xzf /tmp/syft.tar.gz -C /usr/local/bin syft
          rm /tmp/syft.tar.gz

      - name: Generate SBOM (SPDX)
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        run: |
          syft \
            "${{ env.IMAGE_PREFIX }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}" \
            -o spdx-json \
            --file "${{ matrix.service }}-sbom.spdx.json"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        with:
          name: sbom-${{ matrix.service }}
          path: ${{ matrix.service }}-sbom.spdx.json
          retention-days: 7

# ── Single GitHub Release ─────────────────────────────────────────────────────

  release:
    name: Create GitHub Release
    needs: [build-cli, build-zynax-ci, build-push-images]
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve version
        id: ver
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          if [[ "${TAG}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: cli-*
          merge-multiple: true
          path: dist/cli/

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: zynax-ci-*
          merge-multiple: true
          path: dist/zynax-ci/

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: sbom-*
          merge-multiple: true
          path: dist/sboms/

      - name: Generate checksums
        run: |
          (cd dist/cli     && sha256sum * > ../checksums-cli.txt)
          (cd dist/zynax-ci && sha256sum * > ../checksums-zynax-ci.txt)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: Zynax ${{ steps.ver.outputs.version }}
          prerelease: ${{ steps.ver.outputs.prerelease == 'true' }}
          body: |
            ## Zynax ${{ steps.ver.outputs.version }}

            Declarative AI-workflow control plane — CLI, CI toolchain, and service images.

            ### Install zynax CLI

            **macOS (Apple Silicon):**
            ```bash
            curl -L https://github.com/zynax-io/zynax/releases/download/${{ steps.ver.outputs.version }}/zynax_${{ steps.ver.outputs.version }}_darwin_arm64.tar.gz | tar xz && sudo mv zynax /usr/local/bin/
            ```

            **macOS (Intel):**
            ```bash
            curl -L https://github.com/zynax-io/zynax/releases/download/${{ steps.ver.outputs.version }}/zynax_${{ steps.ver.outputs.version }}_darwin_amd64.tar.gz | tar xz && sudo mv zynax /usr/local/bin/
            ```

            **Linux (amd64):**
            ```bash
            curl -L https://github.com/zynax-io/zynax/releases/download/${{ steps.ver.outputs.version }}/zynax_${{ steps.ver.outputs.version }}_linux_amd64.tar.gz | tar xz && sudo mv zynax /usr/local/bin/
            ```

            **Linux (arm64):**
            ```bash
            curl -L https://github.com/zynax-io/zynax/releases/download/${{ steps.ver.outputs.version }}/zynax_${{ steps.ver.outputs.version }}_linux_arm64.tar.gz | tar xz && sudo mv zynax /usr/local/bin/
            ```

            **Windows (amd64):** download `zynax_${{ steps.ver.outputs.version }}_windows_amd64.zip`

            **Build from source:**
            ```bash
            git clone https://github.com/zynax-io/zynax.git && cd zynax/cmd/zynax
            GOWORK=off go build -o zynax . && sudo mv zynax /usr/local/bin/
            ```

            **Verify checksums:**
            ```bash
            sha256sum -c checksums-cli.txt
            ```

            ### Install zynax-ci

            ```bash
            # Linux (amd64)
            curl -fsSL https://github.com/zynax-io/zynax/releases/download/${{ steps.ver.outputs.version }}/zynax-ci-linux-amd64 \
              -o ~/bin/zynax-ci && chmod +x ~/bin/zynax-ci

            # macOS (Apple Silicon)
            curl -fsSL https://github.com/zynax-io/zynax/releases/download/${{ steps.ver.outputs.version }}/zynax-ci-darwin-arm64 \
              -o ~/bin/zynax-ci && chmod +x ~/bin/zynax-ci
            ```

            ### Service images (GHCR)

            ```bash
            docker pull ghcr.io/zynax-io/zynax/api-gateway:${{ steps.ver.outputs.version }}
            docker pull ghcr.io/zynax-io/zynax/engine-adapter:${{ steps.ver.outputs.version }}
            docker pull ghcr.io/zynax-io/zynax/workflow-compiler:${{ steps.ver.outputs.version }}
            docker pull ghcr.io/zynax-io/zynax/task-broker:${{ steps.ver.outputs.version }}
            docker pull ghcr.io/zynax-io/zynax/http-adapter:${{ steps.ver.outputs.version }}
            ```

            SPDX SBOMs for all service and adapter images are attached to this release. Verify image signatures with `cosign verify ghcr.io/zynax-io/zynax/<service>:<version>`.

            ### What's new

            See [CHANGELOG.md](https://github.com/zynax-io/zynax/blob/main/CHANGELOG.md) for full release notes.
          files: |
            dist/cli/*
            dist/zynax-ci/*
            dist/sboms/*
            dist/checksums-cli.txt
            dist/checksums-zynax-ci.txt
