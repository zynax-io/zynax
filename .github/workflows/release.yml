# SPDX-License-Identifier: Apache-2.0
#
# Release — retag-only promotion pipeline (ADR-027, #1120).
#
# Container images are built EXACTLY ONCE, pre-merge, by the build-images
# job in ci.yml (staging lane ghcr.io/zynax-io/zynax/staging/<svc>:pr-<sha>,
# Trivy-gated, SBOM'd). This workflow never builds an image — it promotes
# the verified staging artifact by retag:
#
#   merge to main →  staging/<svc>:pr-<pr-sha> → <svc>:main-<merge-sha> + :main + :latest
#   version tag   →  <svc>:main-<sha>          → <svc>:vX.Y.Z
#
# Post-merge has exactly two responsibilities (manifesto P7):
#   1. retag the verified image to its production names (+ cosign sign), and
#   2. commit the updated digests to images/images.yaml as a [skip ci] bot
#      commit — the recorded ADR-023 exception in ADR-027.
#
# §3C loop-safety (recorded answer to the spec's open question): the
# retag-on-merge job fires on EVERY completed CI run on main, including
# non-PR pushes. A non-PR push has no associated PR and therefore no staging
# images — the job exits as a no-op. The digest bot commit carries
# [skip ci], so GitHub never starts CI for it: no CI run → no workflow_run
# event → no retag → no loop.
#
# Version tags additionally build the zynax/zynax-ci Go binaries (these are
# not container images and are built per-platform here), generate SBOMs for
# the version-tagged images, and create ONE GitHub Release with generated
# notes. sdk-publish.yml and proto-stubs-publish.yml stay independently
# triggered: the PyPI Trusted Publisher registration is bound to the
# sdk-publish.yml workflow filename, so wiring it via workflow_call would
# break OIDC publishing until re-registered (recorded deviation from the
# #1120 scope bullet).
#
# Dry-run / re-promotion (manual, idempotent):
#   Actions → Release → Run workflow → enter tag

name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to (re-)promote (e.g. v0.5.0)'
        required: true

# Least-privilege default — jobs that need more escalate per-job below (#1116).
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/zynax-io/zynax
  STAGING_PREFIX: ghcr.io/zynax-io/zynax/staging
  # Must match the build-images matrix in ci.yml — update both together.
  SERVICE_IMAGES: "api-gateway engine-adapter workflow-compiler task-broker agent-registry event-bus memory-service http-adapter llm-adapter langgraph-adapter ci-adapter git-adapter"
  SYFT_VERSION: "1.44.0"
  GHCR_KEEP_VERSIONS: "5"

jobs:

# ── Retag on merge (workflow_run: CI completed on main) ──────────────────────
# ~10 s manifest operations instead of a ~5 min rebuild. Idempotent: re-running
# points the same tags at the same digests and skips the digest commit.

  retag-on-merge:
    name: Retag staging → main-<sha> + latest
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    concurrency:
      group: retag-main          # serialize promotions across merges
      cancel-in-progress: false  # never cancel a digest commit mid-flight
    permissions:
      contents: write   # digest bot commit to main — ADR-027 §"Explicit exception to ADR-023"
      packages: write   # retags staging images + prunes old main-<sha> versions
      id-token: write   # cosign keyless OIDC signing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0   # first-parent walk over the pushed batch (ADR-047, #1742)
          # The digest push must bypass main's ruleset. GitHub's API does not
          # accept the built-in Actions app as a repo-ruleset bypass actor, so
          # the bypass is granted to the repository-admin role and the push
          # authenticates with BOT_GITHUB_TOKEN (admin-owned fine-grained PAT,
          # contents:write). Falls back to GITHUB_TOKEN, which fails loudly at
          # the push step until the secret exists.
          token: ${{ secrets.BOT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      # A CI run on main is the post-merge run: workflow_run.head_sha is the
      # BATCH-HEAD merge commit. The merge queue (ADR-047) can fast-forward
      # SEVERAL squash commits to main in one push, but only the batch head
      # gets a CI-on-main run → this single Release run must promote EVERY PR
      # in the push, not just the head (issue #1742: a non-head service PR
      # was silently skipped, orphaning its staging image + stale pin).
      #
      # Walk first-parent from the batch head, recording each commit's PR head
      # SHA (the staging lane is keyed by PR head SHA). Stop at the previous
      # digest-sync bot commit — its subject is reserved, and everything older
      # than it was already promoted, so stopping there both bounds the walk
      # and prevents re-promoting a superseded image (a later same-service
      # promotion would have written a newer boundary). A single-PR push
      # degrades to a one-entry list — identical behaviour to the old resolver.
      - name: Resolve merged PRs in this push
        id: prs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          : > /tmp/merged_prs.txt   # <commit_sha> <pr_head_sha>, newest first
          seen=" "
          walked=0
          MAX_WALK=50               # safety cap for the first-ever promotion (no boundary yet)
          while read -r sha; do
            walked=$((walked+1))
            if [ "${walked}" -gt "${MAX_WALK}" ]; then
              echo "ℹ️  reached ${MAX_WALK}-commit safety cap — stopping walk"
              break
            fi
            subject=$(git log -1 --format='%s' "${sha}")
            case "${subject}" in
              "chore(images): sync digests"*)
                echo "ℹ️  reached digest-sync boundary at ${sha:0:7} — everything older is already promoted"
                break
                ;;
            esac
            PR_HEAD=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${sha}/pulls" \
              --jq '.[0].head.sha // empty' 2>/dev/null || true)
            if [ -z "${PR_HEAD}" ]; then
              continue   # non-PR commit (e.g. a direct bot push) — no staging images
            fi
            case "${seen}" in
              *" ${PR_HEAD} "*) continue ;;   # dedupe repeated PR heads
            esac
            seen="${seen}${PR_HEAD} "
            printf '%s %s\n' "${sha}" "${PR_HEAD}" >> /tmp/merged_prs.txt
          done < <(git rev-list --first-parent "${MERGE_SHA}")
          if [ -s /tmp/merged_prs.txt ]; then
            echo "promote=true" >> "$GITHUB_OUTPUT"
            echo "── commits to promote (merge_sha → pr_head) ──"
            cat /tmp/merged_prs.txt
          else
            echo "promote=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No PR-associated commits in this push — nothing to promote."
          fi

      - name: Log in to GHCR
        if: steps.prs.outputs.promote == 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.prs.outputs.promote == 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Install cosign
        if: steps.prs.outputs.promote == 'true'
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      # zynax-ci performs the images.yaml digest upsert (replaces the former
      # scripts/update_image_digest.py). Built from source — the retag job
      # checks out main, so cmd/zynax-ci is present.
      - name: Set up Go
        if: steps.prs.outputs.promote == 'true'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: cmd/zynax-ci/go.mod
          cache-dependency-path: cmd/zynax-ci/go.sum

      # The promotion is RESTARTABLE end-to-end (P9): each attempt rebuilds its
      # scratch files DETERMINISTICALLY (the resolver re-walks first-parent
      # history; promote re-derives from staging existence) and reads every
      # digest back from the registry — never carrying state across attempts.
      # A single GHCR i/o timeout killed a 12-image promotion mid-loop
      # (run 27339823924) and the old single-step layout could not resume —
      # it had already deleted the staging images it had promoted, so a
      # re-run lost their digests for the images.yaml commit. Deleting staging
      # LAST (after the commit) keeps staging present through a mid-run re-run,
      # so promote can always regenerate the promotion set. Phases:
      #   1. promote  — re-points tags from staging (skip if staging gone),
      #                 recording each (svc, commit, pr_head) to promotions.txt
      #   2. collect  — digests read from the PROMOTED main-<sha> tags + sign
      #   3. commit   — images.yaml bot commit from the collected digests
      #   4. cleanup  — staging deletion + prune, only after the commit
      # imagetools create copies the FULL manifest list — platform manifests
      # AND attestation manifests (ADR-025). One cosign signature per digest
      # covers every tag pointing at it; re-signing on a re-run just appends
      # an equivalent signature.
      - name: Promote staging → main-<sha> + main + latest
        if: steps.prs.outputs.promote == 'true'
        run: |
          set -euo pipefail
          # 3-attempt retry for registry round-trips (transient GHCR timeouts).
          retry() { local n; for n in 1 2 3; do "$@" && return 0; echo "⚠️  attempt ${n}/3 failed: $*" >&2; sleep 10; done; return 1; }
          read -ra SERVICES <<< "${SERVICE_IMAGES}"
          : > /tmp/promotions.txt   # <svc> <commit_sha> <pr_head_sha> actually promoted
          seen_main=" "
          # merged_prs.txt is newest-first: the FIRST commit that carries a
          # given service's staging image is its newest in this push, so it
          # owns the floating :main/:latest tags; any older same-service commit
          # only lands its immutable :main-<sha>. (Older superseded images are
          # not reached at all — the resolver stops at the digest-sync boundary.)
          while read -r merge_sha pr_head; do
            for svc in "${SERVICES[@]}"; do
              STAGING="${STAGING_PREFIX}/${svc}:pr-${pr_head}"
              if ! docker buildx imagetools inspect "${STAGING}" >/dev/null 2>&1; then
                continue   # image-less PR for this service, or already promoted+cleaned
              fi
              TAGS=( -t "${IMAGE_PREFIX}/${svc}:main-${merge_sha}" )
              case "${seen_main}" in
                *" ${svc} "*) : ;;   # a newer image in this push already owns main/latest
                *)
                  TAGS+=( -t "${IMAGE_PREFIX}/${svc}:main" -t "${IMAGE_PREFIX}/${svc}:latest" )
                  seen_main="${seen_main}${svc} "
                  ;;
              esac
              retry docker buildx imagetools create "${TAGS[@]}" "${STAGING}"
              printf '%s %s %s\n' "${svc}" "${merge_sha}" "${pr_head}" >> /tmp/promotions.txt
              echo "✅ ${svc}: staging pr-${pr_head} → main-${merge_sha}"
            done
          done < /tmp/merged_prs.txt
          if [ -s /tmp/promotions.txt ]; then
            echo "── promoted this run (svc commit pr_head) ──"
            cat /tmp/promotions.txt
          else
            echo "ℹ️  No staging image matched any merged PR in this push — nothing promoted."
          fi

      - name: Collect promoted digests and sign
        id: retag
        if: steps.prs.outputs.promote == 'true'
        run: |
          set -euo pipefail
          retry() { local n; for n in 1 2 3; do "$@" && return 0; echo "⚠️  attempt ${n}/3 failed: $*" >&2; sleep 10; done; return 1; }
          : > /tmp/promoted.txt
          if [ ! -s /tmp/promotions.txt ]; then
            echo "promoted=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No images promoted for this push — nothing to record."
            exit 0
          fi
          # Digest is read from the PROMOTED main-<commit> tag (registry is the
          # source of truth, not a scratch file). promotions.txt is newest-first,
          # so the first digest recorded per service is the one that lands in
          # images.yaml (matches the :main/:latest floating tags set above).
          seen=" "
          while read -r svc merge_sha _pr_head; do
            REF="${IMAGE_PREFIX}/${svc}:main-${merge_sha}"
            if ! docker buildx imagetools inspect "${REF}" >/dev/null 2>&1; then
              continue   # promotion did not land (unexpected post-promote)
            fi
            DIGEST=$(retry docker buildx imagetools inspect \
              --format '{{json .Manifest.Digest}}' "${REF}" | tr -d '"')
            cosign sign --yes "${IMAGE_PREFIX}/${svc}@${DIGEST}"
            echo "✅ ${svc}@${DIGEST} signed"
            case "${seen}" in
              *" ${svc} "*) continue ;;   # newer digest already recorded for images.yaml
            esac
            seen="${seen}${svc} "
            echo "${svc} ${DIGEST}" >> /tmp/promoted.txt
          done < /tmp/promotions.txt
          if [ -s /tmp/promoted.txt ]; then
            echo "promoted=true" >> "$GITHUB_OUTPUT"
          else
            echo "promoted=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No images promoted for this push — nothing to record."
          fi

      # Atomic digest sync (ADR-027): the promoted digests land on main in
      # the same run that promoted them. Service entries in images.yaml carry
      # no consumers, so this commit only ever touches images/images.yaml.
      # If a service digest ever gains consumer files, add an `images sync`
      # stamp step here (BOT_GITHUB_TOKEN already covers workflow stamps).
      - name: Commit digest update to main [skip ci]
        if: steps.retag.outputs.promoted == 'true'
        env:
          MERGE_SHA: ${{ github.event.workflow_run.head_sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # merge-queue emptiness poll (ADR-047)
        run: |
          set -euo pipefail
          (cd cmd/zynax-ci && GOWORK=off go build -o "${RUNNER_TEMP}/zynax-ci" .)
          while read -r svc digest; do
            "${RUNNER_TEMP}/zynax-ci" images digest-update --root "${GITHUB_WORKSPACE}" \
              --name "${svc}" --ref "${IMAGE_PREFIX}/${svc}" --digest "${digest}"
          done < /tmp/promoted.txt
          if git diff --quiet -- images/images.yaml; then
            echo "✅ images.yaml already current — no digest commit (idempotent re-run)."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add images/images.yaml
          git commit -s \
            -m "chore(images): sync digests after main-${MERGE_SHA:0:7} [skip ci]" \
            -m "Automated digest update for every PR promoted in the push to main-${MERGE_SHA:0:7} (ADR-027 retag model; ADR-047 batch-aware, #1742)."

          # ADR-047: a direct push to main invalidates every in-flight
          # merge-queue group. Yield while the queue is busy — bounded, then
          # push anyway (ADR-027 near-atomicity beats indefinite deferral).
          # With no merge_queue rule on main the query returns 0 → no-op.
          QUEUE_WAIT_LIMIT=600
          waited=0
          while :; do
            entries=$(gh api graphql \
              -f query='query($owner:String!,$name:String!){repository(owner:$owner,name:$name){mergeQueue(branch:"main"){entries(first:1){totalCount}}}}' \
              -f owner="${GITHUB_REPOSITORY%/*}" -f name="${GITHUB_REPOSITORY#*/}" \
              --jq '.data.repository.mergeQueue.entries.totalCount // 0' 2>/dev/null || echo 0)
            if [ "${entries}" -eq 0 ]; then
              echo "✅ merge queue empty after ${waited}s — pushing digest sync"
              break
            fi
            if [ "${waited}" -ge "${QUEUE_WAIT_LIMIT}" ]; then
              echo "⚠️  merge queue still busy (${entries} entries) after ${QUEUE_WAIT_LIMIT}s — pushing anyway (ADR-027 near-atomicity)"
              break
            fi
            echo "⏳ merge queue busy (${entries} entries) — waiting 30s (${waited}s/${QUEUE_WAIT_LIMIT}s)"
            sleep 30
            waited=$((waited+30))
          done

          git pull --rebase origin main
          git push origin HEAD:main || {
            echo "::error::Digest push to main rejected. The ADR-027 §ADR-023 bot"
            echo "::error::exception requires main's protection to allow github-actions[bot]"
            echo "::error::pushes (ruleset bypass for the Actions app) — see PR #1120 notes."
            exit 1
          }

      # Staging cleanup runs LAST — once the digests are committed, the
      # promoted manifests live in zynax/<svc> and the staging versions are
      # dead weight. pr-image-cleanup.yml only handles PRs closed without
      # merging (deleting on merge-close raced this job — PR #1137/#1138).
      # 404 / already-deleted are quiet no-ops for idempotent re-runs.
      - name: Delete promoted staging versions
        if: steps.retag.outputs.promoted == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # One staging tag per (service, PR head) promoted in this push.
          while read -r svc _merge_sha pr_head; do
            PKG="zynax%2Fstaging%2F${svc}"
            IDS=$(gh api --paginate "/orgs/zynax-io/packages/container/${PKG}/versions" \
              --jq ".[] | select(.metadata.container.tags[]? == \"pr-${pr_head}\") | .id" \
              2>/dev/null) || IDS=""
            if [ -z "${IDS}" ]; then
              echo "ℹ️  ${svc}: no staging version tagged pr-${pr_head} — already cleaned."
              continue
            fi
            for ID in ${IDS}; do
              if ! [[ "${ID}" =~ ^[0-9]+$ ]]; then
                continue
              fi
              gh api --method DELETE \
                "/orgs/zynax-io/packages/container/${PKG}/versions/${ID}" \
                && echo "🧹 ${svc}: staging version ${ID} (pr-${pr_head}) deleted"
            done
          done < /tmp/promotions.txt

      - name: Prune old main-<sha> versions
        if: steps.retag.outputs.promoted == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          KEEP="${GHCR_KEEP_VERSIONS}"
          while read -r svc _; do
            PKG="zynax%2F${svc}"
            IDS=$(gh api "/orgs/zynax-io/packages/container/${PKG}/versions" --paginate \
              --jq "[.[] | select(
                  (.metadata.container.tags | any(test(\"^main-[a-f0-9]\"))) and
                  (.metadata.container.tags | all(. != \"latest\" and . != \"main\" and (test(\"^v[0-9]\") | not)))
              ) | {id:.id,ts:.updated_at}] | sort_by(.ts) | reverse | .[${KEEP}:] | .[].id")
            if [ -z "${IDS}" ]; then
              echo "ℹ️  ${svc}: nothing to prune (≤${KEEP} main-sha versions)."
              continue
            fi
            echo "${IDS}" | while read -r ID; do
              gh api -X DELETE "/orgs/zynax-io/packages/container/${PKG}/versions/${ID}" \
                && echo "Deleted ${svc} version ${ID}"
            done
          done < /tmp/promoted.txt

# ── CLI binary — 5 platforms (version tags only; Go binaries, not images) ────

  build-cli:
    name: CLI — ${{ matrix.goos }}/${{ matrix.goarch }}
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64, archive: tar.gz }
          - { goos: linux,   goarch: arm64, archive: tar.gz }
          - { goos: darwin,  goarch: amd64, archive: tar.gz }
          - { goos: darwin,  goarch: arm64, archive: tar.gz }
          - { goos: windows, goarch: amd64, archive: zip    }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: cmd/zynax/go.mod
          cache-dependency-path: cmd/zynax/go.sum

      - name: Resolve version
        id: ver
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          BINARY=zynax
          [ "$GOOS" = "windows" ] && BINARY=zynax.exe
          cd cmd/zynax
          GOWORK=off go build -trimpath \
            -ldflags "-s -w -X github.com/zynax-io/zynax/cmd/zynax/cmd.Version=${VERSION}" \
            -o "${BINARY}" .

      - name: Package
        id: pkg
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          NAME="zynax_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          cd cmd/zynax
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip "${NAME}.zip" zynax.exe
            echo "file=${NAME}.zip" >> "$GITHUB_OUTPUT"
          else
            tar czf "${NAME}.tar.gz" zynax
            echo "file=${NAME}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cmd/zynax/${{ steps.pkg.outputs.file }}
          retention-days: 7

# ── zynax-ci binary — 4 platforms ────────────────────────────────────────────

  build-zynax-ci:
    name: zynax-ci — ${{ matrix.goos }}/${{ matrix.goarch }}
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - { goos: linux,  goarch: amd64, suffix: linux-amd64  }
          - { goos: linux,  goarch: arm64, suffix: linux-arm64  }
          - { goos: darwin, goarch: amd64, suffix: darwin-amd64 }
          - { goos: darwin, goarch: arm64, suffix: darwin-arm64 }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: cmd/zynax-ci/go.mod
          cache: true
          cache-dependency-path: cmd/zynax-ci/go.sum

      - name: Resolve version
        id: ver
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: cmd/zynax-ci
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          GOWORK=off go build -trimpath \
            -ldflags "-s -w -X github.com/zynax-io/zynax/cmd/zynax-ci/cmd.Version=${{ steps.ver.outputs.version }}" \
            -o zynax-ci-${{ matrix.suffix }} .

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: zynax-ci-${{ matrix.suffix }}
          path: cmd/zynax-ci/zynax-ci-${{ matrix.suffix }}
          retention-days: 7

# ── Retag main-<sha> → version (tag pushes / dispatch; no builds) ────────────
# For each image, walk first-parent history from the tagged commit and promote
# the most recent main-<sha> tag (full-SHA retag-model tags and legacy 8-char
# tags both resolve). tools + ci-runner join the matrix: their main builds
# come from tools-image.yml, but version promotion is retag-only here too.

  retag-version:
    name: Version retag — ${{ matrix.service }}
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write       # retags main-<sha> → vX.Y.Z
      id-token: write       # cosign keyless OIDC + SLSA provenance
      attestations: write   # actions/attest-build-provenance (SLSA L2 — ADR-025)
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, engine-adapter, workflow-compiler, task-broker,
                  agent-registry, event-bus, memory-service, http-adapter,
                  llm-adapter, langgraph-adapter, ci-adapter, git-adapter,
                  tools, ci-runner]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0   # full history + tags for the first-parent walk

      - name: Resolve version and source image
        id: src
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SVC: ${{ matrix.service }}
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag || github.ref_name }}"
          TAG_SHA=$(git rev-list -n1 "refs/tags/${TAG}")
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"

          EXISTING=$(gh api "/orgs/zynax-io/packages/container/zynax%2F${SVC}/versions" \
            --paginate --jq '.[].metadata.container.tags[]' 2>/dev/null | grep '^main-' || true)
          if [ -z "${EXISTING}" ]; then
            echo "⚠️  ${SVC}: no promoted main-* image exists — excluded from ${TAG}."
            echo "src=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SRC_TAG=""
          while read -r sha; do
            if grep -qx "main-${sha}" <<< "${EXISTING}"; then
              SRC_TAG="main-${sha}"; break
            fi
            if grep -qx "main-${sha:0:8}" <<< "${EXISTING}"; then
              SRC_TAG="main-${sha:0:8}"; break
            fi
          done < <(git rev-list --first-parent -n 200 "${TAG_SHA}")

          if [ -z "${SRC_TAG}" ]; then
            echo "⚠️  ${SVC}: no main-<sha> within 200 first-parent commits of ${TAG} — excluded."
            echo "src=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "✅ ${SVC}: promoting ${SRC_TAG} → ${TAG}"
          echo "src=${SRC_TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: steps.src.outputs.src != ''
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.src.outputs.src != ''
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Install cosign
        if: steps.src.outputs.src != ''
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Retag to version and sign
        id: retag
        if: steps.src.outputs.src != ''
        env:
          SVC: ${{ matrix.service }}
          SRC: ${{ steps.src.outputs.src }}
          VERSION: ${{ steps.src.outputs.version }}
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            -t "${IMAGE_PREFIX}/${SVC}:${VERSION}" \
            "${IMAGE_PREFIX}/${SVC}:${SRC}"
          DIGEST=$(docker buildx imagetools inspect \
            --format '{{json .Manifest.Digest}}' \
            "${IMAGE_PREFIX}/${SVC}:${VERSION}" | tr -d '"')
          cosign sign --yes "${IMAGE_PREFIX}/${SVC}@${DIGEST}"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      # SLSA L2 provenance — signed, verifiable attestation on the version
      # digest (ADR-025, #1116). Verify:
      #   gh attestation verify oci://<image>@<digest> --owner zynax-io
      - name: Attest build provenance (SLSA L2)
        if: steps.src.outputs.src != ''
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          subject-digest: ${{ steps.retag.outputs.digest }}
          push-to-registry: true

      - name: Install syft ${{ env.SYFT_VERSION }}
        if: steps.src.outputs.src != ''
        run: |
          curl -sSfL \
            "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_amd64.tar.gz" \
            -o /tmp/syft.tar.gz
          tar -xzf /tmp/syft.tar.gz -C /usr/local/bin syft
          rm /tmp/syft.tar.gz

      - name: Generate SBOM (SPDX) from version digest
        if: steps.src.outputs.src != ''
        run: |
          syft \
            "${{ env.IMAGE_PREFIX }}/${{ matrix.service }}@${{ steps.retag.outputs.digest }}" \
            -o spdx-json \
            --file "${{ matrix.service }}-sbom.spdx.json"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: steps.src.outputs.src != ''
        with:
          name: sbom-${{ matrix.service }}
          path: ${{ matrix.service }}-sbom.spdx.json
          retention-days: 7

# ── Single GitHub Release ─────────────────────────────────────────────────────

  release:
    name: Create GitHub Release
    needs: [build-cli, build-zynax-ci, retag-version]
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    permissions:
      contents: write   # creates the GitHub Release with binaries + SBOMs
    steps:
      - name: Resolve version
        id: ver
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          if [[ "${TAG}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: cli-*
          merge-multiple: true
          path: dist/cli/

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: zynax-ci-*
          merge-multiple: true
          path: dist/zynax-ci/

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: sbom-*
          merge-multiple: true
          path: dist/sboms/

      - name: Generate checksums
        run: |
          (cd dist/cli     && sha256sum * > ../checksums-cli.txt)
          (cd dist/zynax-ci && sha256sum * > ../checksums-zynax-ci.txt)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: Zynax ${{ steps.ver.outputs.version }}
          prerelease: ${{ steps.ver.outputs.prerelease == 'true' }}
          generate_release_notes: true
          body: |
            ## Zynax ${{ steps.ver.outputs.version }}

            Declarative AI-workflow control plane — CLI, CI toolchain, and service images.

            All service images are retag-promoted from the pre-merge security
            gate (ADR-027): the digests below are the exact binaries that
            passed Trivy before merge.

            ### Install zynax CLI

            **macOS (Apple Silicon):**
            ```bash
            curl -L https://github.com/zynax-io/zynax/releases/download/${{ steps.ver.outputs.version }}/zynax_${{ steps.ver.outputs.version }}_darwin_arm64.tar.gz | tar xz && sudo mv zynax /usr/local/bin/
            ```

            **macOS (Intel):**
            ```bash
            curl -L https://github.com/zynax-io/zynax/releases/download/${{ steps.ver.outputs.version }}/zynax_${{ steps.ver.outputs.version }}_darwin_amd64.tar.gz | tar xz && sudo mv zynax /usr/local/bin/
            ```

            **Linux (amd64):**
            ```bash
            curl -L https://github.com/zynax-io/zynax/releases/download/${{ steps.ver.outputs.version }}/zynax_${{ steps.ver.outputs.version }}_linux_amd64.tar.gz | tar xz && sudo mv zynax /usr/local/bin/
            ```

            **Linux (arm64):**
            ```bash
            curl -L https://github.com/zynax-io/zynax/releases/download/${{ steps.ver.outputs.version }}/zynax_${{ steps.ver.outputs.version }}_linux_arm64.tar.gz | tar xz && sudo mv zynax /usr/local/bin/
            ```

            **Windows (amd64):** download `zynax_${{ steps.ver.outputs.version }}_windows_amd64.zip`

            **Build from source:**
            ```bash
            git clone https://github.com/zynax-io/zynax.git && cd zynax/cmd/zynax
            GOWORK=off go build -o zynax . && sudo mv zynax /usr/local/bin/
            ```

            **Verify checksums:**
            ```bash
            sha256sum -c checksums-cli.txt
            ```

            ### Install zynax-ci

            ```bash
            # Linux (amd64)
            curl -fsSL https://github.com/zynax-io/zynax/releases/download/${{ steps.ver.outputs.version }}/zynax-ci-linux-amd64 \
              -o ~/bin/zynax-ci && chmod +x ~/bin/zynax-ci

            # macOS (Apple Silicon)
            curl -fsSL https://github.com/zynax-io/zynax/releases/download/${{ steps.ver.outputs.version }}/zynax-ci-darwin-arm64 \
              -o ~/bin/zynax-ci && chmod +x ~/bin/zynax-ci
            ```

            ### Service images (GHCR)

            ```bash
            docker pull ghcr.io/zynax-io/zynax/api-gateway:${{ steps.ver.outputs.version }}
            docker pull ghcr.io/zynax-io/zynax/engine-adapter:${{ steps.ver.outputs.version }}
            docker pull ghcr.io/zynax-io/zynax/workflow-compiler:${{ steps.ver.outputs.version }}
            docker pull ghcr.io/zynax-io/zynax/task-broker:${{ steps.ver.outputs.version }}
            docker pull ghcr.io/zynax-io/zynax/http-adapter:${{ steps.ver.outputs.version }}
            docker pull ghcr.io/zynax-io/zynax/llm-adapter:${{ steps.ver.outputs.version }}
            docker pull ghcr.io/zynax-io/zynax/langgraph-adapter:${{ steps.ver.outputs.version }}
            docker pull ghcr.io/zynax-io/zynax/ci-adapter:${{ steps.ver.outputs.version }}
            docker pull ghcr.io/zynax-io/zynax/git-adapter:${{ steps.ver.outputs.version }}
            ```

            SPDX SBOMs for all service and adapter images are attached to this release. Verify image signatures with `cosign verify ghcr.io/zynax-io/zynax/<service>:<version>`.
          files: |
            dist/cli/*
            dist/zynax-ci/*
            dist/sboms/*
            dist/checksums-cli.txt
            dist/checksums-zynax-ci.txt
