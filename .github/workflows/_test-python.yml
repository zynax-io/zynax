# SPDX-License-Identifier: Apache-2.0
# Reusable workflow — Python pytest-bdd + coverage gate.
# Called by the test-python job in ci.yml.

name: _test-python (reusable)

on:
  workflow_call:
    inputs:
      event_name: { required: true, type: string }

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  test-python:
    name: test-python
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/zynax-io/zynax/ci-runner@sha256:cf4972f24c76dc8061dfc3f7aef1b08a1b44ec2947953dbac91bdf51ca62491e
      options: --user root
    env:
      UV_LINK_MODE: copy
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Load coverage gates
        run: |
          while IFS='=' read -r key value; do
            [[ -z "$key" || "$key" =~ ^# ]] && continue
            echo "$key=$value" >> "$GITHUB_ENV"
          done < tools/coverage-gates.env

      - name: Detect Python agents
        id: py-detect
        run: |
          count=$(find agents/ -name "*.py" 2>/dev/null | wc -l)
          echo "has_py=$count" >> "$GITHUB_OUTPUT"
          # Auto-discover example agents from agents/examples/*/pyproject.toml
          # (mirrors the Makefile AGENTS glob — no manual list to maintain).
          agents=""
          for dir in agents/examples/*/; do
            [ -f "${dir}pyproject.toml" ] && agents="$agents $(basename "$dir")"
          done
          agents=$(echo "$agents" | tr ' ' '\n' | sort | tr '\n' ' ')
          echo "agents=$agents" >> "$GITHUB_OUTPUT"
          echo "Discovered example agents: ${agents:-<none>}"

      - name: pytest-bdd (SDK + all Python agents)
        if: steps.py-detect.outputs.has_py != '0'
        run: |
          failed=false

          if [ -f agents/sdk/pyproject.toml ]; then
            echo "── test: agents/sdk"
            cd agents/sdk
            uv run pytest tests/ \
              --cov=src \
              --cov-report=term-missing \
              --cov-report=json:coverage.json \
              --cov-fail-under=${COVERAGE_PYTHON_GATE:-90} \
              -v --tb=short || failed=true
            cd ../..
          fi

          for agent in ${{ steps.py-detect.outputs.agents }}; do
            if [ -f "agents/examples/${agent}/pyproject.toml" ]; then
              echo "── test: agents/examples/${agent}"
              cd "agents/examples/${agent}"
              uv run pytest tests/ \
                --cov=src \
                --cov-report=term-missing \
                --cov-report=json:coverage.json \
                --cov-fail-under=${COVERAGE_PYTHON_GATE:-90} \
                -v --tb=short || failed=true
              cd ../../..
            fi
          done

          $failed && exit 1 || echo "✅ Python tests passed"
