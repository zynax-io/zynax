# SPDX-License-Identifier: Apache-2.0
# Zynax — Developer Tools + CI Runner Images
#
# Builds and pushes two images to GHCR on every merge to main that touches
# the relevant Dockerfiles or zynax-ci source. Also triggered on version tags.
#
# Images:
#   ghcr.io/zynax-io/zynax/tools      — developer tools for local `make` commands
#   ghcr.io/zynax-io/zynax/ci-runner  — pre-baked CI environment for GH Actions container: mode
#
# Tags (both images):
#   :latest      (always points to the newest main build)
#   :main-<sha>  (immutable per-commit tag)
#   :v*.*.*      (on version tag pushes)
#
# Digest for ci-runner is recorded in config/ci-runner-digest.txt after each build.

name: tools-image

on:
  push:
    branches: [main]
    paths:
      - 'infra/docker/Dockerfile.tools'
      - 'infra/docker/Dockerfile.ci-runner'
      - 'cmd/zynax-ci/**'
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write   # cosign keyless OIDC signing on tag builds
  issues: write     # open bump-tracking issue after ci-runner rebuild

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: zynax-io/zynax/tools
  CI_RUNNER_IMAGE: zynax-io/zynax/ci-runner
  SYFT_VERSION: "1.44.0"

jobs:
  build-push:
    name: Build and push tools image
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Compute image tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          SHA_TAG="${IMAGE}:main-${{ github.sha }}"

          if echo "${{ github.ref }}" | grep -q '^refs/tags/v'; then
            VERSION_TAG="${IMAGE}:${{ github.ref_name }}"
            echo "tags=${IMAGE}:latest,${VERSION_TAG},${SHA_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${IMAGE}:latest,${SHA_TAG}" >> "$GITHUB_OUTPUT"
          fi

      # provenance=true (default) attaches SLSA Build L1 attestation manifests.
      # These appear as "unknown/unknown" rows in GHCR — expected, not broken.
      # See docs/adr/ADR-025-slsa-provenance-attestation.md for the keep decision.
      - name: Build and push
        id: build-tools
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: infra/docker/Dockerfile.tools
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=tools
          cache-to: type=gha,mode=max,scope=tools
          labels: |
            org.opencontainers.image.source=https://github.com/zynax-io/zynax
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Report tools image size
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIGEST="${{ steps.build-tools.outputs.digest }}"
          BASE="https://ghcr.io/v2/${{ env.IMAGE_NAME }}"
          { echo "## 📦 tools"; echo "**Digest:** \`${DIGEST}\`"; echo ""; \
            echo "| Platform | Compressed size |"; echo "|----------|-----------------|"; \
          } >> "$GITHUB_STEP_SUMMARY"
          INDEX=$(curl -fsSL -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.oci.image.index.v1+json" \
            "${BASE}/manifests/${DIGEST}" 2>/dev/null) || true
          if [ -n "$INDEX" ]; then
            while IFS='|' read -r osname arch pdigs; do
              MF=$(curl -fsSL -H "Authorization: Bearer ${TOKEN}" \
                -H "Accept: application/vnd.oci.image.manifest.v1+json" \
                "${BASE}/manifests/${pdigs}" 2>/dev/null) || true
              [ -n "$MF" ] && echo "| ${osname}/${arch} | $(echo "$MF" | jq '[.layers[].size] | add // 0' | xargs -I{} sh -c 'echo "scale=1; {} / 1048576" | bc') MB |" >> "$GITHUB_STEP_SUMMARY" \
                           || echo "| ${osname}/${arch} | — |" >> "$GITHUB_STEP_SUMMARY"
            done < <(echo "$INDEX" | jq -r '.manifests[] | select(.platform.architecture == "amd64" or .platform.architecture == "arm64") | select(.platform.os != "unknown") | [.platform.os, .platform.architecture, .digest] | join("|")' 2>/dev/null)
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"

      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Sign tools image
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-tools.outputs.digest }}"

      - name: Install syft ${{ env.SYFT_VERSION }}
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          curl -sSfL \
            "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_amd64.tar.gz" \
            -o /tmp/syft.tar.gz
          tar -xzf /tmp/syft.tar.gz -C /usr/local/bin syft
          rm /tmp/syft.tar.gz

      - name: Generate SBOM (SPDX)
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          syft \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-tools.outputs.digest }}" \
            -o spdx-json \
            --file tools-sbom.spdx.json

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        with:
          name: sbom-tools
          path: tools-sbom.spdx.json
          retention-days: 7

  build-push-ci-runner:
    name: Build and push ci-runner image
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.CI_RUNNER_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=main-,format=long
            type=semver,pattern={{version}}

      # provenance=true (default) attaches SLSA Build L1 attestation manifests.
      # These appear as "unknown/unknown" rows in GHCR — expected, not broken.
      # See docs/adr/ADR-025-slsa-provenance-attestation.md for the keep decision.
      - name: Build and push ci-runner
        id: build-ci-runner
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: infra/docker/Dockerfile.ci-runner
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=ci-runner
          cache-to: type=gha,mode=max,scope=ci-runner
          labels: |
            org.opencontainers.image.source=https://github.com/zynax-io/zynax
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Report ci-runner digest and sizes
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIGEST="${{ steps.build-ci-runner.outputs.digest }}"
          BASE="https://ghcr.io/v2/${{ env.CI_RUNNER_IMAGE }}"
          { echo "## 📦 ci-runner"; echo "**Digest:** \`${DIGEST}\`"; \
            echo ""; echo "> Update \`config/ci-runner-digest.txt\` and all \`ci.yml / pr-checks.yml / _test-*.yml\` references to \`${DIGEST}\`"; \
            echo ""; echo "| Platform | Compressed size |"; echo "|----------|-----------------|"; \
          } >> "$GITHUB_STEP_SUMMARY"
          INDEX=$(curl -fsSL -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.oci.image.index.v1+json" \
            "${BASE}/manifests/${DIGEST}" 2>/dev/null) || true
          if [ -n "$INDEX" ]; then
            while IFS='|' read -r osname arch pdigs; do
              MF=$(curl -fsSL -H "Authorization: Bearer ${TOKEN}" \
                -H "Accept: application/vnd.oci.image.manifest.v1+json" \
                "${BASE}/manifests/${pdigs}" 2>/dev/null) || true
              [ -n "$MF" ] && echo "| ${osname}/${arch} | $(echo "$MF" | jq '[.layers[].size] | add // 0' | xargs -I{} sh -c 'echo "scale=1; {} / 1048576" | bc') MB |" >> "$GITHUB_STEP_SUMMARY" \
                           || echo "| ${osname}/${arch} | — |" >> "$GITHUB_STEP_SUMMARY"
            done < <(echo "$INDEX" | jq -r '.manifests[] | select(.platform.architecture == "amd64" or .platform.architecture == "arm64") | select(.platform.os != "unknown") | [.platform.os, .platform.architecture, .digest] | join("|")' 2>/dev/null)
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"

      - name: Open ci-runner bump issue
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIGEST: ${{ steps.build-ci-runner.outputs.digest }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          SHORT="${DIGEST:7:16}"
          gh issue create \
            --title "chore(ci): bump ci-runner digest to ${SHORT}" \
            --label "type: chore,area: ci" \
            --body "$(printf '## ci-runner digest bump\n\n**New digest:** `%s`\n**Built by:** %s\n\n## Steps\n\n```bash\nmake bump-ci-runner NEW_DIGEST=%s\nscripts/bump-ci-runner.sh --check %s\n```\n\nThen open a PR: branch off `main`, commit, push, CI green, `gh pr merge --rebase`, delete branch.\n\n## Checklist\n\n- [ ] `make bump-ci-runner NEW_DIGEST=%s` ran\n- [ ] `--check` exits 0\n- [ ] PR merged (rebase), branch deleted\n' \
              "$DIGEST" "$RUN_URL" "$DIGEST" "$DIGEST" "$DIGEST")"

      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Sign ci-runner image
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.CI_RUNNER_IMAGE }}@${{ steps.build-ci-runner.outputs.digest }}"
