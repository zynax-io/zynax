# ── Collation: post single PR comment with all expert outputs ─────────────────
  collate-and-comment:
    name: "Collate expert outputs -> PR comment"
    # Runs on the hosted runner (not ci-runner container) because gh CLI is
    # not installed in the ci-runner image — only the expert jobs need it.
    runs-on: ubuntu-24.04
    needs:
      - expert-arch-adr
      - expert-api-contract
      - expert-ci-release
      - expert-docs-agents
      - expert-persistence
      - expert-planning
      - expert-qa-bdd
      - expert-security
    if: always()
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Post collated PR comment
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          OUT_ARCH: ${{ needs.expert-arch-adr.outputs.expert_output }}
          OUT_API: ${{ needs.expert-api-contract.outputs.expert_output }}
          OUT_CI: ${{ needs.expert-ci-release.outputs.expert_output }}
          OUT_DOCS: ${{ needs.expert-docs-agents.outputs.expert_output }}
          OUT_PERS: ${{ needs.expert-persistence.outputs.expert_output }}
          OUT_PLAN: ${{ needs.expert-planning.outputs.expert_output }}
          OUT_QA: ${{ needs.expert-qa-bdd.outputs.expert_output }}
          OUT_SEC: ${{ needs.expert-security.outputs.expert_output }}
        run: |
          RUN_URL="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
          ARCH="${OUT_ARCH:-No output (context slice empty or expert skipped)}"
          API="${OUT_API:-No output (context slice empty or expert skipped)}"
          CI_OUT="${OUT_CI:-No output (context slice empty or expert skipped)}"
          DOCS="${OUT_DOCS:-No output (context slice empty or expert skipped)}"
          PERS="${OUT_PERS:-No output (context slice empty or expert skipped)}"
          PLAN="${OUT_PLAN:-No output (context slice empty or expert skipped)}"
          QA="${OUT_QA:-No output (context slice empty or expert skipped)}"
          SEC="${OUT_SEC:-No output (context slice empty or expert skipped)}"

          DIVIDER="---"

          {
            printf '%s\n\n' "## Dev Advisory: Expert Review (Wave 0)"
            printf '%s\n' "> **Advisory only.** Expert outputs are recommendations; humans decide all actions."
            printf '%s\n\n' "> Run: [${RUN_ID}](${RUN_URL})"
            printf '%s\n\n' "$DIVIDER"
            printf '%s\n\n' "### arch-adr"
            printf '%s\n\n' "$ARCH"
            printf '%s\n\n' "$DIVIDER"
            printf '%s\n\n' "### api-contract"
            printf '%s\n\n' "$API"
            printf '%s\n\n' "$DIVIDER"
            printf '%s\n\n' "### ci-release"
            printf '%s\n\n' "$CI_OUT"
            printf '%s\n\n' "$DIVIDER"
            printf '%s\n\n' "### docs-agents"
            printf '%s\n\n' "$DOCS"
            printf '%s\n\n' "$DIVIDER"
            printf '%s\n\n' "### persistence-state"
            printf '%s\n\n' "$PERS"
            printf '%s\n\n' "$DIVIDER"
            printf '%s\n\n' "### planning-task-split"
            printf '%s\n\n' "$PLAN"
            printf '%s\n\n' "$DIVIDER"
            printf '%s\n\n' "### qa-bdd"
            printf '%s\n\n' "$QA"
            printf '%s\n\n' "$DIVIDER"
            printf '%s\n\n' "### security-supply-chain"
            printf '%s\n\n' "$SEC"
            printf '%s\n\n' "$DIVIDER"
            printf '\n---\n'
            printf '*Assisted by: `%s` via `%s`*\n' "${LLM_MODEL}" "${LLM_PROVIDER}"
            if [ "${LLM_PROVIDER}" != "claude" ]; then
              printf '> ⚠️ **Debug advisory** — generated by a small/local model. Results may be inaccurate and are for reference only.\n'
            fi
          } > /tmp/pr-comment.md

          gh pr comment "${PR_NUM}" \
            --repo "$REPO" \
            --edit-last \
            --body-file /tmp/pr-comment.md \
            2>/dev/null || \
          gh pr comment "${PR_NUM}" \
            --repo "$REPO" \
            --body-file /tmp/pr-comment.md

# ── Orchestrator: Wave 1 — aggregate expert outputs into decision-support ─────
# Plane: near-term
  orchestrate-and-comment:
    name: "Orchestrator: Wave 1 aggregation"
    # Runs on hosted runner (not ci-runner container) — gh CLI is not in ci-runner.
    # LLM invocation via scripts/invoke-llm.sh (LLM_PROVIDER=claude|ollama|openai-compat).
    runs-on: ubuntu-24.04
    needs:
      - expert-arch-adr
      - expert-api-contract
      - expert-ci-release
      - expert-docs-agents
      - expert-persistence
      - expert-planning
      - expert-qa-bdd
      - expert-security
    if: always()
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore Ollama model cache
        if: ${{ env.LLM_PROVIDER == 'ollama' }}
