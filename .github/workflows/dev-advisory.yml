        if: ${{ env.LLM_PROVIDER == 'ollama' && (startsWith(env.OLLAMA_BASE_URL, 'http://localhost') || startsWith(env.OLLAMA_BASE_URL, 'http://127.0.0.1')) }}
        run: |
