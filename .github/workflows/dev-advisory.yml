# SPDX-License-Identifier: Apache-2.0
# Zynax — Dev Advisory Workflow (Wave 0 + Wave 1)
#
# Plane: near-term
#
# Wave 0: Runs 8 expert subagents in parallel on pull_request events.  Each
# expert receives a context slice (git diff filtered to its declared glob
# patterns) and writes its output to the GitHub Actions job summary.
#
# Wave 1: After all expert jobs complete, an orchestrator subagent reads all
# expert outputs, applies the aggregation protocol
# (automation/orchestrator/config.yaml), and posts one consolidated
# decision-support PR comment plus uploads a decision-log JSON artifact.
#
# Humans decide all actions.  No automated merge, push, or code changes.
# No Zynax gRPC calls, no agent-registry lookups — pure claude CLI invocation.
#
# Issue: #877 (M6.DevAuto — DevAuto.4), #878 (M6.DevAuto — DevAuto.5)
# Depends on: #875 (automation/experts/*.yaml), #876 (orchestrator config)

name: Dev Advisory (Wave 0 + Wave 1)

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: dev-advisory-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    shell: bash

env:
  LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'ollama' }}
  LLM_MODEL:    ${{ vars.LLM_MODEL    || 'qwen2.5-coder:1.5b' }}
  OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL || 'http://localhost:11434' }}

jobs:

# ── Expert: Architecture / ADR ────────────────────────────────────────────────
  expert-arch-adr:
    name: "Expert: arch-adr"
    runs-on: ubuntu-24.04
    continue-on-error: true
    outputs:
      expert_output: ${{ steps.expert.outputs.EXPERT_OUTPUT }}
    env:
      EXPERT_NAME: arch-adr
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Restore Ollama model cache
        if: ${{ env.LLM_PROVIDER == 'ollama' }}
        id: model-cache
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-${{ env.LLM_MODEL }}

      - name: Install and start Ollama
        if: ${{ env.LLM_PROVIDER == 'ollama' && (startsWith(env.OLLAMA_BASE_URL, 'http://localhost') || startsWith(env.OLLAMA_BASE_URL, 'http://127.0.0.1')) }}
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          for i in $(seq 1 15); do
            curl -sf http://localhost:11434/api/tags >/dev/null 2>&1 && break || sleep 2
          done

      - name: Pull model if not cached
        if: ${{ env.LLM_PROVIDER == 'ollama' && steps.model-cache.outputs.cache-hit != 'true' }}
        run: |
          curl -sf "${{ env.OLLAMA_BASE_URL }}/api/pull" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${{ env.LLM_MODEL }}\"}" \
            | while IFS= read -r line; do
                STATUS=$(printf '%s' "$line" | jq -r '.status // empty' 2>/dev/null || true)
                [ -n "$STATUS" ] && printf '%s\n' "$STATUS"
              done

      - name: Allow git safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Fetch base branch for diff
        run: |
          git fetch --depth=1 origin "${{ github.event.pull_request.base.ref }}"

      - name: Build context slice and run expert
        id: expert
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          CHANGED=$(git diff --name-only "${BASE_SHA}..${HEAD_SHA}" 2>/dev/null || \
                    git diff --name-only "FETCH_HEAD..HEAD" 2>/dev/null || printf "")

          SLICE=""
          for pat in "AGENTS.md" "services/AGENTS.md" "agents/AGENTS.md" \
                     "protos/AGENTS.md" "cmd/zynax/AGENTS.md" \
                     "docs/adr/INDEX.md" "docs/adr/.*.md"; do
            m=$(printf '%s\n' "$CHANGED" | grep -E "^${pat}$" || true)
            SLICE="${SLICE}${m}"$'\n'
          done

          DIFF_CONTENT=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ -f "$f" ] || continue
            chunk=$(git diff "${BASE_SHA}..${HEAD_SHA}" -- "$f" 2>/dev/null || \
                    git diff "FETCH_HEAD..HEAD" -- "$f" 2>/dev/null || true)
            DIFF_CONTENT="${DIFF_CONTENT}=== ${f} ===${chunk}"$'\n'
          done <<< "$SLICE"

          if [ -z "$(printf '%s' "$DIFF_CONTENT" | tr -d '[:space:]')" ]; then
            printf '## Expert: arch-adr\n\nNo files matching this context slice changed.\n' \
              >> "$GITHUB_STEP_SUMMARY"
            printf 'EXPERT_OUTPUT=No files matching arch-adr context slice changed.\n' \
              >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DIFF_STAT=$(git diff --stat "${BASE_SHA}..${HEAD_SHA}" 2>/dev/null || \
                      git diff --stat "FETCH_HEAD..HEAD" 2>/dev/null || printf "unavailable")

          # Write input to temp file to avoid shell quoting issues
          {
            printf 'trigger: pull_request\n'
            printf 'pr_number: %s\n' "$PR_NUM"
            printf 'pr_title: %s\n' "$PR_TITLE"
            printf 'diff_summary: |\n'
            printf '%s\n' "$DIFF_STAT" | sed 's/^/  /'
            printf 'changed_files:\n'
            printf '%s\n' "$CHANGED" | sed '/^$/d; s/^/  - /'
            printf 'context_slice: |\n'
            printf '%s\n' "$DIFF_CONTENT" | sed 's/^/  /'
          } > /tmp/expert-input.txt

          EXPERT_OUTPUT=$(bash scripts/invoke-llm.sh \
            "automation/experts/${EXPERT_NAME}.yaml" /tmp/expert-input.txt 2>/dev/null \
            || printf "Expert invocation failed (provider: ${LLM_PROVIDER:-unknown}, model: ${LLM_MODEL:-unknown}).")

          printf '## Expert: arch-adr\n\n%s\n' "$EXPERT_OUTPUT" >> "$GITHUB_STEP_SUMMARY"

          {
            printf 'EXPERT_OUTPUT<<EXPERT_EOF\n'
            printf '%s\n' "$EXPERT_OUTPUT"
            printf 'EXPERT_EOF\n'
          } >> "$GITHUB_OUTPUT"

