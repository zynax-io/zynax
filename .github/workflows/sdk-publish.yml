# SPDX-License-Identifier: Apache-2.0
# Zynax — SDK PyPI Publish
#
# Fires on version-tag pushes (v*.*.*) and publishes zynax-sdk to the
# real PyPI via GitHub Actions OIDC Trusted Publisher — no API keys
# stored in secrets. Also manually dispatchable (workflow_dispatch) so a
# publish can run from main without waiting for the next platform tag —
# the trusted publisher matches repo+workflow+environment, not the ref.
# On dispatch the Release-upload step is skipped (no tag, no Release).
#
# Prerequisites (one-time manual setup — see agents/sdk/AGENTS.md):
#   1. Register a Trusted Publisher on pypi.org for this repo.
#   2. Workflow file name:  sdk-publish.yml
#   3. Environment name:    pypi
#
# Related:
#   tools-publish.yml — TestPyPI dry-run on PRs touching agents/sdk/ (#805, F.1)
#   This file is F.2 (#806).

name: SDK PyPI Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Build & publish zynax-sdk to PyPI
    runs-on: ubuntu-24.04
    environment: pypi   # OIDC trusted publisher environment — must match PyPI registration

    permissions:
      contents: write   # required to upload SBOM + bundles to GitHub Release
      id-token: write   # required for OIDC token minting (PyPI + cosign keyless)

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb  # v6.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Install hatch + supply-chain tools
        run: |
          pip install --quiet "hatch>=1.13"
          # cosign — keyless signing via Sigstore OIDC
          COSIGN_VERSION="v2.4.3"
          curl -sSL "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" \
            -o /usr/local/bin/cosign
          chmod +x /usr/local/bin/cosign
          # syft — SBOM generation
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Build wheel and sdist
        working-directory: agents/sdk
        run: |
          hatch build
          echo "Build artifacts:"
          ls -lh dist/

      - name: Verify dist contents
        working-directory: agents/sdk
        run: |
          # Confirm both wheel and sdist were produced.
          WHL=$(ls dist/*.whl 2>/dev/null | wc -l)
          SDT=$(ls dist/*.tar.gz 2>/dev/null | wc -l)
          if [ "$WHL" -eq 0 ] || [ "$SDT" -eq 0 ]; then
            echo "ERROR: expected both .whl and .tar.gz in dist/" >&2
            exit 1
          fi
          echo "OK — wheel: $WHL  sdist: $SDT"

      - name: Generate SBOM for SDK package
        working-directory: agents/sdk
        run: |
          syft packages dist/ -o spdx-json=dist/zynax_sdk.spdx.json
          echo "SBOM generated:"
          ls -lh dist/zynax_sdk.spdx.json

      - name: Sign SDK wheel (keyless OIDC)
        working-directory: agents/sdk
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          WHEEL=$(ls dist/*.whl | head -1)
          echo "Signing wheel: $WHEEL"
          cosign sign-blob --yes --bundle "${WHEEL}.bundle" "$WHEEL"
          echo "Bundle created: ${WHEEL}.bundle"

      - name: Sign SDK sdist (keyless OIDC)
        working-directory: agents/sdk
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          SDIST=$(ls dist/*.tar.gz | head -1)
          echo "Signing sdist: $SDIST"
          cosign sign-blob --yes --bundle "${SDIST}.bundle" "$SDIST"
          echo "Bundle created: ${SDIST}.bundle"

      - name: Stage distributions for PyPI (exclude SBOM + cosign bundles)
        working-directory: agents/sdk
        run: |
          # The SBOM (*.spdx.json) and cosign bundles (*.bundle) live in dist/
          # alongside the wheel + sdist; twine rejects them as unknown
          # distribution formats, so the publish step gets a clean dir.
          mkdir -p pypi-dist
          cp dist/*.whl dist/*.tar.gz pypi-dist/
          echo "Staged for publish:"
          ls -lh pypi-dist/

      - name: Publish to PyPI (OIDC — Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc  # v1.12.4
        with:
          packages-dir: agents/sdk/pypi-dist/
          # The SDK versions independently of platform tags (0.1.0 today) —
          # a platform tag that doesn't bump the SDK must not fail the run.
          skip-existing: true
          verbose: true

      - name: Upload SBOM and signature bundles to GitHub Release
        if: github.ref_type == 'tag'   # workflow_dispatch from a branch has no Release to attach to
        working-directory: agents/sdk
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          echo "Uploading supply-chain artifacts to release $TAG"
          # SBOM
          gh release upload "$TAG" dist/zynax_sdk.spdx.json --clobber
          # Cosign bundles
          for bundle in dist/*.bundle; do
            gh release upload "$TAG" "$bundle" --clobber
          done
          echo "Uploaded:"
          ls -lh dist/*.bundle dist/*.spdx.json
