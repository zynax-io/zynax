# SPDX-License-Identifier: Apache-2.0
# Helm chart linting gate — runs ct lint on every PR or push touching helm/ or infra/.
# Closes #242.
#
# ct lint validates chart structure, required resources, and YAML syntax.
# It does NOT install charts (that is the EPIC G e2e harness, #770).

name: Helm Lint

on:
  pull_request:
    branches: [main]
    paths:
      - "helm/**"
      - "infra/**"
  push:
    branches: [main]
    paths:
      - "helm/**"
      - "infra/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: helm-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  helm-lint:
    name: ct lint
    runs-on: ubuntu-latest
    env:
      HELM_VERSION: v3.17.3
      CT_VERSION: 3.11.0
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Helm
        run: |
          curl -sSLo /tmp/helm.tar.gz \
            "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz"
          tar -C /tmp -xzf /tmp/helm.tar.gz linux-amd64/helm
          sudo install /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version --short

      - name: Install chart-testing (ct) + yamale
        run: |
          curl -sSLo /tmp/ct.tar.gz \
            "https://github.com/helm/chart-testing/releases/download/v${CT_VERSION}/chart-testing_${CT_VERSION}_linux_amd64.tar.gz"
          mkdir -p /tmp/ct-bin
          tar -C /tmp/ct-bin -xzf /tmp/ct.tar.gz
          sudo install /tmp/ct-bin/ct /usr/local/bin/ct
          pip3 install yamale
          ct version

      - name: Configure chart-testing
        run: |
          mkdir -p ~/.ct
          cp etc/ct/chart_schema.yaml ~/.ct/chart_schema.yaml
          cp etc/ct/lintconf.yaml ~/.ct/lintconf.yaml

      - name: Add Helm repositories
        run: |
          helm repo add nats https://nats-io.github.io/k8s/helm/charts
          helm repo add temporalio https://temporalio.github.io/helm-charts
          helm repo add jetstack https://charts.jetstack.io
          helm repo update

      - name: Guard — no vendored first-party subchart tgz in VCS (#1521)
        run: |
          # First-party file:// subchart .tgz must NOT be committed — they drift
          # from source (the #1488 nodePort regression) and reach any consumer
          # that installs the umbrella without `helm dependency build`. They are
          # rebuilt from source below. Fail if any are tracked so drift can never
          # return to main. Upstream third-party tgz (helm/charts/*/charts/) are
          # intentionally vendored for offline installs and are exempt.
          tracked=$(git ls-files 'helm/zynax-umbrella/charts/*.tgz')
          if [ -n "$tracked" ]; then
            echo "::error::Vendored umbrella subchart tgz committed to VCS — remove them; source is the single source of truth (#1521):"
            echo "$tracked"
            exit 1
          fi
          echo "OK — no vendored umbrella subchart tgz tracked."

      - name: Build chart dependencies
        run: |
          # Build file:// dependencies from source so ct lint renders the CURRENT
          # subchart templates. The built .tgz are gitignored (#1521), so this is
          # the authoritative render — never a stale committed artifact.
          for dir in helm/zynax-*/; do
            if [ -f "$dir/Chart.yaml" ] && grep -q "file://" "$dir/Chart.yaml" 2>/dev/null; then
              echo "Building deps for $dir"
              helm dependency build "$dir" 2>&1 || true
            fi
          done
          helm dependency build helm/zynax-umbrella/ 2>&1 || true

      - name: Run ct lint
        run: |
          ct lint \
            --chart-dirs helm \
            --validate-maintainers=false \
            --excluded-charts zynax-lib \
            --all
