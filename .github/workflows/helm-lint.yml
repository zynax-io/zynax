# SPDX-License-Identifier: Apache-2.0
# Helm chart linting gate — runs ct lint on every PR or push touching helm/ or infra/.
# Closes #242.
#
# ct lint validates chart structure, required resources, and YAML syntax.
# It does NOT install charts (that is the EPIC G e2e harness, #770).

name: Helm Lint

on:
  pull_request:
    branches: [main]
    paths:
      - "helm/**"
      - "infra/**"
  push:
    branches: [main]
    paths:
      - "helm/**"
      - "infra/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: helm-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  helm-lint:
    name: ct lint
    runs-on: ubuntu-latest
    env:
      HELM_VERSION: v3.17.3
      CT_VERSION: 3.11.0
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Helm
        run: |
          curl -sSLo /tmp/helm.tar.gz \
            "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz"
          tar -C /tmp -xzf /tmp/helm.tar.gz linux-amd64/helm
          sudo install /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version --short

      - name: Install chart-testing (ct)
        run: |
          curl -sSLo /tmp/ct.tar.gz \
            "https://github.com/helm/chart-testing/releases/download/v${CT_VERSION}/chart-testing_${CT_VERSION}_linux_amd64.tar.gz"
          mkdir -p /tmp/ct-bin
          tar -C /tmp/ct-bin -xzf /tmp/ct.tar.gz
          sudo install /tmp/ct-bin/ct /usr/local/bin/ct
          ct version

      - name: Configure chart-testing
        run: |
          mkdir -p ~/.ct
          # Minimal chart_schema.yaml — validates required Chart.yaml fields only.
          cat > ~/.ct/chart_schema.yaml << 'EOF'
          name:
            required: true
            type: string
          apiVersion:
            required: true
            type: string
          version:
            required: true
            type: string
          description:
            required: false
            type: string
          appVersion:
            required: false
            type: string
          type:
            required: false
            type: string
          dependencies:
            required: false
            type: seq
          home:
            required: false
            type: string
          sources:
            required: false
            type: seq
          keywords:
            required: false
            type: seq
          maintainers:
            required: false
            type: seq
          icon:
            required: false
            type: string
          EOF
          # Minimal lintconf.yaml — disable strict YAML style checks for chart templates.
          cat > ~/.ct/lintconf.yaml << 'EOF'
          ---
          rules:
            braces:
              min-spaces-inside: 0
              max-spaces-inside: 0
            brackets:
              min-spaces-inside: 0
              max-spaces-inside: 0
            colons:
              max-spaces-after: -1
              max-spaces-before: 0
            commas:
              max-spaces-after: -1
              min-spaces-after: 1
              max-spaces-before: 0
            document-start: disable
            indentation:
              indent-sequences: true
              spaces: 2
            line-length:
              max: 160
            trailing-spaces: enable
            truthy:
              allowed-values: ['true', 'false']
              check-keys: false
          EOF

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add nats https://nats-io.github.io/k8s/helm/charts
          helm repo add temporalio https://temporalio.github.io/helm-charts
          helm repo add jetstack https://charts.jetstack.io
          helm repo update

      - name: Build chart dependencies
        run: |
          # Build file:// dependencies so ct lint can render dependent charts.
          # The .tgz files are already committed; this is a no-op if satisfied.
          for dir in helm/zynax-*/; do
            if [ -f "$dir/Chart.yaml" ] && grep -q "file://" "$dir/Chart.yaml" 2>/dev/null; then
              echo "Building deps for $dir"
              helm dependency build "$dir" 2>&1 || true
            fi
          done
          helm dependency build helm/zynax-umbrella/ 2>&1 || true

      - name: Run ct lint
        run: |
          ct lint \
            --chart-dirs helm \
            --validate-maintainers false \
            --all
