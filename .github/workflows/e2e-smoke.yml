# SPDX-License-Identifier: Apache-2.0
# e2e smoke — gated/optional live-cluster end-to-end test (EPIC G #770 step 5, #813).
#
# Brings up an ephemeral kind cluster, deploys the zynax-umbrella chart, runs the
# happy-path and failure-path workflow assertions (scripts/e2e/e2e-happy.sh,
# scripts/e2e/e2e-failure.sh), then the Helm upgrade/rollback assertion
# (scripts/e2e/helm-upgrade.sh).
#
# GATED, NOT a required PR gate: it triggers ONLY on changes to helm/**,
# services/**, or engine-adapter/**, plus manual workflow_dispatch. It is
# deliberately excluded from the branch-protection required-check set — only
# developers landing infra/service changes need to watch it.
#
# Image lane (#1118 / ADR-027): when the PR touches docker-relevant paths, the
# pre-merge build-images job in ci.yml pushes staging/<svc>:pr-<head-sha> images;
# this workflow waits for them and deploys THOSE (the exact binaries under
# review) instead of the :main lane. PRs with no docker changes — and runs where
# the staging images never appear (build-images failed, or the staging packages
# are not public yet) — fall back to :main with a warning.
#
# All third-party Actions are pinned to a full 40-char commit SHA.

name: e2e smoke

on:
  pull_request:
    branches: [main]
    paths:
      - "helm/**"
      - "services/**"
      - "engine-adapter/**"
      - "scripts/e2e/**"
      - ".github/workflows/e2e-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  helm-upgrade:
    name: helm upgrade/rollback (kind)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      HELM_VERSION: v3.17.3
      KIND_VERSION: v0.23.0
      KIND_NODE_IMAGE: kindest/node:v1.29.2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0   # lane resolution diffs base...head

      - name: Resolve service image lane (staging when this PR built images)
        if: github.event_name == 'pull_request'
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          # Same docker-relevance pattern as the `changes` job in ci.yml — keep in sync.
          if ! git diff --name-only "${BASE_SHA}...${HEAD_SHA}" \
               | grep -qE '^(services/|infra/docker/Dockerfile\.|agents/adapters/[^/]+/Dockerfile$)'; then
            echo "No docker-relevant changes — deploying the :main image lane."
            exit 0
          fi
          echo "Docker-relevant changes — waiting for staging images (pr-${HEAD_SHA})…"
          DEADLINE=$(( $(date +%s) + 1200 ))   # build-images runs in parallel in ci.yml
          for svc in api-gateway workflow-compiler engine-adapter task-broker agent-registry; do
            IMG="ghcr.io/zynax-io/zynax/staging/${svc}:pr-${HEAD_SHA}"
            until docker manifest inspect "${IMG}" >/dev/null 2>&1; do
              if [ "$(date +%s)" -ge "${DEADLINE}" ]; then
                echo "::warning::staging image ${IMG} did not appear — falling back to the :main lane. Check the build-images job and that the staging packages are public."
                exit 0
              fi
              sleep 20
            done
            echo "  ✓ ${IMG}"
          done
          {
            echo "E2E_IMAGE_PREFIX=ghcr.io/zynax-io/zynax/staging"
            echo "E2E_IMAGE_TAG=pr-${HEAD_SHA}"
          } >> "$GITHUB_ENV"
          echo "All staging images present — deploying the staging lane."

      - name: Install kind + kubectl + Helm
        # The e2e scripts own cluster bootstrap (cluster-up.sh creates the kind
        # cluster idempotently), so this step only installs the binaries on PATH.
        run: |
          curl -sSLo /tmp/kind \
            "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          sudo install /tmp/kind /usr/local/bin/kind
          kind version

          curl -sSLo /tmp/kubectl \
            "https://dl.k8s.io/release/v1.29.2/bin/linux/amd64/kubectl"
          sudo install /tmp/kubectl /usr/local/bin/kubectl
          kubectl version --client

          curl -sSLo /tmp/helm.tar.gz \
            "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz"
          tar -C /tmp -xzf /tmp/helm.tar.gz linux-amd64/helm
          sudo install /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version --short

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add nats https://nats-io.github.io/k8s/helm/charts
          helm repo add temporalio https://temporalio.github.io/helm-charts
          helm repo add jetstack https://charts.jetstack.io
          helm repo update

      - name: Bring up cluster + deploy stack
        run: scripts/e2e/cluster-up.sh

      - name: Happy-path workflow assertion
        # Submits code-review.yaml via api-gateway, asserts the workflow
        # reaches a terminal success state, the workflow.completed CloudEvent
        # lands on NATS JetStream, and the memory-service KV plane roundtrips.
        # A failed assertion exits non-zero and fails the job (readable logs).
        run: scripts/e2e/e2e-happy.sh

      - name: Failure-path workflow assertion
        # Submits a workflow whose first state invokes an unreachable
        # capability, asserts it reaches a terminal failed state and the
        # workflow.failed CloudEvent lands on NATS JetStream.
        run: scripts/e2e/e2e-failure.sh

      - name: Helm upgrade/rollback smoke
        run: scripts/e2e/helm-upgrade.sh

      - name: Tear down cluster
        if: always()
        run: scripts/e2e/cluster-down.sh
