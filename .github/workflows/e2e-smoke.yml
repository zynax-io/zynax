# SPDX-License-Identifier: Apache-2.0
# e2e smoke — gated/optional live-cluster end-to-end test (EPIC G #770 step 5, #813).
#
# Runs a 2-leg engine matrix (engine ∈ {temporal, argo}, fail-fast: false —
# #1071, EPIC #771, ADR-015 pluggable engines). Each leg brings up its own
# ephemeral kind cluster on its own runner and deploys the zynax-umbrella chart
# with engine-selecting values (cluster-up.sh + values-e2e-argo.yaml overlay):
#   - temporal leg: happy-path + failure-path workflow assertions
#     (scripts/e2e/e2e-happy.sh, scripts/e2e/e2e-failure.sh), then the Helm
#     upgrade/rollback assertion (scripts/e2e/helm-upgrade.sh). This leg is the
#     protected baseline — behavior identical to the pre-matrix gate.
#   - argo leg: Argo happy-path assertion (scripts/e2e/e2e-argo.sh — Workflow
#     CR reaches phase Succeeded). cluster-up.sh additionally installs the Argo
#     Workflows control plane (pinned argo-helm chart) for this leg.
#
# GATED, NOT a required PR gate: it triggers ONLY on changes to helm/**,
# services/**, or engine-adapter/**, plus manual workflow_dispatch. It is
# deliberately excluded from the branch-protection required-check set — only
# developers landing infra/service changes need to watch it.
#
# Image lane (#1118 / ADR-027): when the PR touches docker-relevant paths, the
# pre-merge build-images job in ci.yml pushes staging/<svc>:pr-<head-sha> images;
# this workflow waits for them and deploys THOSE (the exact binaries under
# review) instead of the :main lane. PRs with no docker changes — and runs where
# the staging images never appear (build-images failed, or the staging packages
# are not public yet) — fall back to :main with a warning.
#
# All third-party Actions are pinned to a full 40-char commit SHA.

name: e2e smoke

on:
  pull_request:
    branches: [main]
    paths:
      - "helm/**"
      - "services/**"
      - "engine-adapter/**"
      - "scripts/e2e/**"
      - ".github/workflows/e2e-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: e2e smoke (${{ matrix.engine }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      # Engine matrix (#1071, EPIC #771): both pluggable engines (ADR-015) are
      # validated per run. fail-fast off so a red argo leg never cancels the
      # protected temporal baseline (and vice versa).
      fail-fast: false
      matrix:
        engine: [temporal, argo]
    env:
      HELM_VERSION: v3.17.3
      KIND_VERSION: v0.23.0
      KIND_NODE_IMAGE: kindest/node:v1.29.2
      GRPCURL_VERSION: "1.9.3"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0   # lane resolution diffs base...head

      - name: Resolve service image lane (staging when this PR built images)
        if: github.event_name == 'pull_request'
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          # Same docker-relevance pattern as the `changes` job in ci.yml — keep in sync.
          if ! git diff --name-only "${BASE_SHA}...${HEAD_SHA}" \
               | grep -qE '^(services/|infra/docker/Dockerfile\.|agents/adapters/[^/]+/Dockerfile$)'; then
            echo "No docker-relevant changes — deploying the :main image lane."
            exit 0
          fi
          echo "Docker-relevant changes — waiting for staging images (pr-${HEAD_SHA})…"
          DEADLINE=$(( $(date +%s) + 1200 ))   # build-images runs in parallel in ci.yml
          for svc in api-gateway workflow-compiler engine-adapter task-broker agent-registry event-bus memory-service; do
            IMG="ghcr.io/zynax-io/zynax/staging/${svc}:pr-${HEAD_SHA}"
            until docker manifest inspect "${IMG}" >/dev/null 2>&1; do
              if [ "$(date +%s)" -ge "${DEADLINE}" ]; then
                echo "::warning::staging image ${IMG} did not appear — falling back to the :main lane. Check the build-images job and that the staging packages are public."
                exit 0
              fi
              sleep 20
            done
            echo "  ✓ ${IMG}"
          done
          {
            echo "E2E_IMAGE_PREFIX=ghcr.io/zynax-io/zynax/staging"
            echo "E2E_IMAGE_TAG=pr-${HEAD_SHA}"
          } >> "$GITHUB_ENV"
          echo "All staging images present — deploying the staging lane."

      - name: Install kind + kubectl + Helm + grpcurl
        # The e2e scripts own cluster bootstrap (cluster-up.sh creates the kind
        # cluster idempotently), so this step only installs the binaries on PATH.
        # grpcurl is required by e2e-happy.sh for the memory-service KV
        # roundtrip assertion (#1090).
        run: |
          curl -sSLo /tmp/kind \
            "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          sudo install /tmp/kind /usr/local/bin/kind
          kind version

          curl -sSLo /tmp/kubectl \
            "https://dl.k8s.io/release/v1.29.2/bin/linux/amd64/kubectl"
          sudo install /tmp/kubectl /usr/local/bin/kubectl
          kubectl version --client

          curl -sSLo /tmp/helm.tar.gz \
            "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz"
          tar -C /tmp -xzf /tmp/helm.tar.gz linux-amd64/helm
          sudo install /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version --short

          curl -sSLo /tmp/grpcurl.tar.gz \
            "https://github.com/fullstorydev/grpcurl/releases/download/v${GRPCURL_VERSION}/grpcurl_${GRPCURL_VERSION}_linux_x86_64.tar.gz"
          tar -C /tmp -xzf /tmp/grpcurl.tar.gz grpcurl
          sudo install /tmp/grpcurl /usr/local/bin/grpcurl
          grpcurl --version

      - name: Add Helm repositories
        run: |
          helm repo add nats https://nats-io.github.io/k8s/helm/charts
          helm repo add temporalio https://temporalio.github.io/helm-charts
          helm repo add jetstack https://charts.jetstack.io
          helm repo update

      - name: Bring up cluster + deploy stack
        # E2E_ENGINE selects the umbrella values per matrix leg (ADR-015): the
        # argo leg layers values-e2e-argo.yaml and installs the Argo Workflows
        # control plane (pinned argo-helm chart) before the umbrella deploy.
        env:
          E2E_ENGINE: ${{ matrix.engine }}
        run: scripts/e2e/cluster-up.sh

      - name: Happy-path workflow assertion
        if: matrix.engine == 'temporal'
        # Submits code-review.yaml via api-gateway, asserts the workflow
        # reaches a terminal success state, the workflow.completed CloudEvent
        # lands on NATS JetStream, and the memory-service KV plane roundtrips.
        # A failed assertion exits non-zero and fails the job (readable logs).
        run: scripts/e2e/e2e-happy.sh

      - name: Workflow output read-path assertion
        if: matrix.engine == 'temporal'
        # Submits hello-world.yaml (which declares a terminal `outputs:` block),
        # asserts it reaches COMPLETED, then reads GET /api/v1/workflows/{id}/outputs
        # and confirms the declared `message` output is returned — the live
        # apply → COMPLETED → read-outputs proof that closes #1103 gap #4 (M7.U).
        run: scripts/e2e/hello-world-smoke.sh

      - name: Failure-path workflow assertion
        if: matrix.engine == 'temporal'
        # Submits a workflow whose first state invokes an unreachable
        # capability, asserts it reaches a terminal failed state and the
        # workflow.failed CloudEvent lands on NATS JetStream.
        run: scripts/e2e/e2e-failure.sh

      - name: Argo happy-path workflow assertion
        if: matrix.engine == 'argo'
        # Submits code-review.yaml via api-gateway against the ArgoEngine and
        # asserts the gateway projection reaches a terminal success state AND
        # the underlying Argo `Workflow` CR reaches phase Succeeded — the
        # engine's own source of truth (#811).
        run: scripts/e2e/e2e-argo.sh

      - name: Workflow CRD reconcile assertion
        # Both engine legs (ADR-043, M8.E): kubectl apply a Workflow custom
        # resource and assert the api-gateway's embedded controller reconciles
        # it through the same compile->submit path to a Dispatched run, keeps a
        # thin status (no run state in the CR), and is idempotent (a reconcile of
        # the unchanged spec starts no new run). Runs on temporal AND argo since
        # no engine is pinned in the CR.
        run: scripts/e2e/e2e-workflow-crd.sh

      - name: Helm upgrade/rollback smoke
        if: matrix.engine == 'temporal'
        # Temporal leg only: helm-upgrade.sh re-applies values-e2e.yaml without
        # the argo overlay, which would silently flip the release back to the
        # Temporal engine mid-leg on the argo leg.
        run: scripts/e2e/helm-upgrade.sh

      - name: Tear down cluster
        if: always()
        run: scripts/e2e/cluster-down.sh
