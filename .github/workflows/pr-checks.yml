# SPDX-License-Identifier: Apache-2.0
# Zynax — PR Automation Checks
#
# These jobs automate the PR template checklist so reviewers can focus on
# design and correctness rather than process compliance.
#
# Coverage:
#   actionlint           → GitHub Actions workflow YAML and expression linting
#   conventional-commit  → PR title follows Conventional Commits format
#   pr-size              → auto-labels size/S · size/M · size/L · size/XL
#   proto-breaking       → buf breaking change detection against base branch
#   proto-stubs-fresh    → detects stale generated stubs (issue #12 tracks gen)
#   layer-boundaries     → detects cross-layer imports (ADR-001 §separation)
#   gitleaks-scan        → scans full PR commit range for secrets (all paths)
#
# Required status checks (branch protection):
#   GitHub Actions workflow lint · Conventional Commit title · PR size label
#   Secret scan (gitleaks)
# All jobs with if: github.event_name == 'pull_request' are skipped on push
# to main (only gitleaks-scan fires on push).

name: PR Checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

# ── GitHub Actions Workflow Lint ──────────────────────────────────────────────
# actionlint catches expression-context mismatches (e.g. using pull_request
# context variables in a job that also fires on push), invalid step outputs,
# and schema errors — before they reach main.
#   actionlint docs: https://github.com/rhysd/actionlint
jobs:
  actionlint:
    name: GitHub Actions workflow lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache actionlint
        id: actionlint-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: /usr/local/bin/actionlint
          key: actionlint-1.7.7-linux-amd64

      - name: Install actionlint
        if: steps.actionlint-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL \
            "https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz" \
            -o /tmp/actionlint.tar.gz
          tar -xzf /tmp/actionlint.tar.gz -C /usr/local/bin actionlint

      - name: Lint all workflow files
        run: actionlint -color

# ── Conventional Commit Title ─────────────────────────────────────────────────
# The PR title becomes the squash commit subject on merge. It must follow the
# Conventional Commits spec so changelog generation and semantic versioning work.
  conventional-commit:
    name: Conventional Commit title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            docs
            test
            ci
            chore
          requireScope: false
          subjectPattern: ^.{1,72}$
          subjectPatternError: |
            PR title subject must be ≤72 characters.
            Current: "{subject}"

# ── PR Size Labeling ──────────────────────────────────────────────────────────
# Labels the PR with size/S · size/M · size/L · size/XL based on net lines
# changed, excluding generated code, lock files, and test fixtures.
# >800 lines fails the check — the PR must be decomposed before review.
  pr-size:
    name: PR size label
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Label PR by size and enforce 800-line limit
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            // Exclude generated stubs, lock files, binary fixtures, changelogs,
            // CI workflow files, and documentation-only paths (AGENTS.md, docs/, state/).
            const skipPattern = /\.(pb\.go|pb\.py|sum|lock|png|jpg|gif|svg)$|\/generated\/|CHANGELOG\.md$|^\.github\/workflows\/|AGENTS\.md$|^docs\/|^state\/|^\.claude\//;
            const lines = files
              .filter(f => !skipPattern.test(f.filename))
              .reduce((total, f) => total + f.additions + f.deletions, 0);

            const sizeLabel =
              lines <= 100  ? 'size/S'  :
              lines <= 400  ? 'size/M'  :
              lines <= 900  ? 'size/L'  : 'size/XL';

            // Remove any existing size/* labels then apply the new one
            const { data: existing } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const lbl of existing.filter(l => l.name.startsWith('size/'))) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: lbl.name,
              });
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [sizeLabel],
            });

            core.info(`PR changes: ${lines} lines (excluding generated/lock files) → ${sizeLabel}`);

            if (lines > 900) {
              core.setFailed(
                `PR is ${lines} lines — exceeds the 900-line hard limit.\n` +
                `Decompose this PR into smaller, reviewable units before requesting review.\n` +
                `See CONTRIBUTING.md §"PR Size Policy" for guidance.`
              );
            } else if (lines > 400) {
              core.warning(
                `PR is ${lines} lines — over the 400-line soft limit.\n` +
                `If it cannot be split, document the reason in the PR template.`
              );
            }

# ── Proto Breaking-Change Detection ──────────────────────────────────────────
# Fails if any change to protos/ breaks backward compatibility with the base
# branch. buf compares field numbers, message names, enum values, and service
# signatures. New fields and enums are always safe; removals and renames fail.
  proto-breaking:
    name: Proto backward compatibility
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect proto changes
        id: proto-detect
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          changed=$(git diff --name-only "${BASE}..${HEAD}" -- 'protos/**/*.proto' | wc -l)
          echo "proto_changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Cache buf
        id: buf-cache
        if: steps.proto-detect.outputs.proto_changed != '0'
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: /usr/local/bin/buf
          key: buf-1.47.2-linux-x86_64

      - name: Install buf
        if: steps.proto-detect.outputs.proto_changed != '0' && steps.buf-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL \
            "https://github.com/bufbuild/buf/releases/download/v1.47.2/buf-Linux-x86_64" \
            -o /usr/local/bin/buf
          chmod +x /usr/local/bin/buf

      - name: buf breaking (compare against base branch)
        if: steps.proto-detect.outputs.proto_changed != '0'
        working-directory: protos
        run: |
          buf breaking \
            --against \
            "https://github.com/${{ github.repository }}.git#branch=${{ github.event.pull_request.base.ref }},subdir=protos"

      - name: No proto changes
        if: steps.proto-detect.outputs.proto_changed == '0'
        run: echo "ℹ️  No .proto files changed — backward-compat check skipped."

# ── Generated Stub Freshness ──────────────────────────────────────────────────
# If a .proto file changed and stubs exist in protos/generated/, verifies
# that the stubs were regenerated in this PR (i.e. they are not stale).
# Issue #12 tracks implementing `make generate-protos` in buf.gen.yaml.
  proto-stubs-fresh:
    name: Proto generated stubs freshness
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check stubs are not stale
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          proto_changed=$(git diff --name-only "${BASE}..${HEAD}" -- 'protos/**/*.proto' | wc -l)
          stubs_changed=$(git diff --name-only "${BASE}..${HEAD}" -- 'protos/generated/' | wc -l)

          if [ "$proto_changed" -gt 0 ] && [ -d protos/generated ] && [ "$stubs_changed" -eq 0 ]; then
            echo "❌ .proto files changed but generated stubs were not updated."
            echo ""
            echo "Proto files modified:"
            git diff --name-only "${BASE}..${HEAD}" -- 'protos/**/*.proto'
            echo ""
            echo "Fix: run  make generate-protos  and commit the updated stubs."
            exit 1
          fi

          if [ "$proto_changed" -gt 0 ] && [ ! -d protos/generated ]; then
            echo "ℹ️  protos/generated/ does not exist yet (issue #12 tracks this)."
            echo "   Stub freshness check skipped until buf.gen.yaml is added."
          else
            echo "✅ Generated stubs are up to date (or no protos changed)."
          fi

# ── Layer Boundary Enforcement ────────────────────────────────────────────────
# Detects cross-layer imports that violate the three-layer separation (AGENTS.md §1).
# Scans only files changed in this PR to keep the check fast.
# Rules:
#   domain/  must NOT import from  api/  or  infrastructure/
#   protos/  must NOT import service business logic
  layer-boundaries:
    name: Layer boundary enforcement
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check for cross-layer imports
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          changed_go=$(git diff --name-only "${BASE}..${HEAD}" -- '*.go' | grep -v "_test.go" || true)
          violations=""

          for f in $changed_go; do
            [ -f "$f" ] || continue

            # domain/ must not import api/ or infrastructure/
            if echo "$f" | grep -q "/domain/"; then
              if grep -qE '".*/(api|infrastructure)/' "$f"; then
                violations="${violations}\n  ${f}: domain/ imports api/ or infrastructure/"
              fi
            fi

            # contracts (protos/) must not import service packages
            if echo "$f" | grep -q "^protos/"; then
              if grep -qE '"github\.com/zynax-io/zynax/services/' "$f"; then
                violations="${violations}\n  ${f}: protos/ imports service business logic"
              fi
            fi
          done

          if [ -n "$violations" ]; then
            echo "❌ Layer boundary violations detected (AGENTS.md §1 / ADR-001):"
            printf "%b\n" "$violations"
            echo ""
            echo "See docs/adr/ADR-001-*.md for the three-layer separation rules."
            exit 1
          fi

          echo "✅ Layer boundaries respected"

# ── SPDD Canvas Freshness (feat: PRs only) ────────────────────────────────────
# For every PR whose title starts with feat:, verifies that a REASONS Canvas
# was committed as part of this PR (or already exists in docs/spdd/).
# Rules (ADR-019):
#   - feat: PRs must include at least one docs/spdd/**/canvas.md in the diff
#     OR have an existing canvas.md anywhere under docs/spdd/.
#   - Any canvas touched by this PR is validated with tools/validate_canvas.py.
#   - Draft status emits a warning but does not fail (Aligned is enforced by
#     /spdd-generate at code-generation time, not at PR open time).
  canvas-freshness:
    name: SPDD Canvas freshness (feat only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: "Check Canvas present for feat: PRs"
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Only enforce for feat: PRs
          if ! echo "$PR_TITLE" | grep -qE '^feat(\([^)]+\))?:'; then
            echo "ℹ️  Not a feat: PR — Canvas check skipped."
            exit 0
          fi

          echo "feat: PR detected — checking for REASONS Canvas (ADR-019)..."

          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          # Canvas files added or modified in this PR
          canvas_in_pr=$(git diff --name-only "${BASE}..${HEAD}" -- 'docs/spdd/**/canvas.md' 'docs/spdd/*/canvas.md' | grep "canvas\.md" || true)

          # Any canvas that already exists under docs/spdd/
          canvas_existing=$(find docs/spdd -name "canvas.md" 2>/dev/null | head -1 || true)

          if [ -z "$canvas_in_pr" ] && [ -z "$canvas_existing" ]; then
            echo ""
            echo "❌ No REASONS Canvas found for this feat: PR."
            echo ""
            echo "Every feat: PR requires a Canvas committed before implementation."
            echo "Steps:"
            echo "  1. Run /spdd-analysis <issue> to research the feature"
            echo "  2. Run /spdd-reasons-canvas <issue> to generate the Canvas"
            echo "  3. Run /spdd-security-review docs/spdd/<issue>-<slug>/canvas.md"
            echo "  4. Commit docs/spdd/<issue>-<slug>/canvas.md before implementation"
            echo ""
            echo "See docs/patterns/spdd-guide.md and ADR-019."
            exit 1
          fi

          if [ -n "$canvas_in_pr" ]; then
            echo "Canvas file(s) in this PR:"
            echo "$canvas_in_pr"
          else
            echo "Existing canvas(es) in docs/spdd/:"
            find docs/spdd -name "canvas.md"
          fi

      - name: Set up Python for canvas validation
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate touched canvases
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$PR_TITLE" | grep -qE '^feat(\([^)]+\))?:'; then
            exit 0
          fi

          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          # Validate canvases touched in this PR; fall back to all canvases
          canvas_in_pr=$(git diff --name-only "${BASE}..${HEAD}" -- 'docs/spdd/**/canvas.md' 'docs/spdd/*/canvas.md' | grep "canvas\.md" || true)

          if [ -n "$canvas_in_pr" ]; then
            failed=0
            for canvas in $canvas_in_pr; do
              dir=$(dirname "$canvas")
              echo "Validating $canvas ..."
              python tools/validate_canvas.py "$dir" || failed=1
            done
            exit $failed
          else
            echo "No canvas in this PR diff — running validate-canvas on all existing canvases..."
            python tools/validate_canvas.py docs/spdd/

# ── Secret Scan (gitleaks) ────────────────────────────────────────────────────
# Scans every commit in the PR range — including commits that were later amended
# or squashed — so secrets deleted before merge are still caught.
# Uses the same gitleaks-ai-context.toml config used by the main CI lint-proto
# job, extended with all paths (not just KB files).
  gitleaks-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Cache gitleaks
        id: gitleaks-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: /usr/local/bin/gitleaks
          key: gitleaks-8.21.2-linux-x64

      - name: Install gitleaks
        if: steps.gitleaks-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks

      - name: Scan PR commit range for secrets
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            LOG_OPTS="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            LOG_OPTS="HEAD~1..HEAD"
          fi
          echo "── gitleaks scanning commit range: ${LOG_OPTS}"
          gitleaks detect \
            --source . \
            --log-opts "${LOG_OPTS}" \
            --config tools/gitleaks-ai-context.toml \
            --report-format json \
            --report-path /tmp/gitleaks-report.json \
            --verbose 2>&1 || {
            echo ""
            echo "❌ Secrets detected in PR commit range:"
            cat /tmp/gitleaks-report.json
            echo ""
            echo "Even if you deleted the secret in a later commit, it is still"
            echo "in git history and must be removed with git filter-repo."
            echo "See docs/knowledge-base-policy.md for guidance."
            exit 1
          }
          echo "✅ No secrets found in PR commit range"
