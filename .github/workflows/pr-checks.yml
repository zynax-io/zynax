# SPDX-License-Identifier: Apache-2.0
# Zynax — PR Automation Checks
#
# These jobs automate the PR template checklist.
#
# Jobs:
#   actionlint           → GitHub Actions workflow YAML and expression linting
#   dependency-review    → blocks new HIGH-severity CVEs in dependency manifests
#   conventional-commit  → PR title follows Conventional Commits format
#   proto-check          → buf breaking-change detection + generated stubs freshness
#   layer-boundaries     → detects cross-layer imports (ADR-001 §separation)
#   canvas-freshness     → SPDD Canvas present + valid for feat: PRs (ADR-019)
#   conflict-markers     → scans PR for leftover git conflict markers
#   gitleaks-scan        → secrets scan across full PR commit range
#   milestone-state      → ADVISORY: state/milestone.yaml schema check (issue #1110)
#
# PR size labeling is in pr-size.yml (separate workflow) to avoid feedback loops.
#
# Required status checks: GitHub Actions workflow lint · Conventional Commit title
#   PR size label · Secret scan (gitleaks)

name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Least-privilege default — jobs that need more escalate per-job below (#1116).
permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
# ── GitHub Actions Workflow Lint ──────────────────────────────────────────────
  actionlint:
    name: GitHub Actions workflow lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/zynax-io/zynax/ci-runner@sha256:48a2646547cbe4066b3b9a82071c1f2b9e4f8ef9ceb09cc1be63930c29c9f1c1
      options: --user root
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint all workflow files
        run: actionlint -color

# ── Dependency Review (HIGH CVE gate) ─────────────────────────────────────────
# Blocks PRs that introduce dependencies with known HIGH/CRITICAL CVEs in
# go.mod / pyproject.toml manifests, via the GitHub Dependency Graph diff.
  dependency-review:
    name: Dependency review (HIGH CVEs)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read   # reads the dependency diff via the Dependency Graph API
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Block new HIGH-severity vulnerable dependencies
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high

# ── Conventional Commit Title ─────────────────────────────────────────────────
  conventional-commit:
    name: Conventional Commit title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/zynax-io/zynax/ci-runner@sha256:48a2646547cbe4066b3b9a82071c1f2b9e4f8ef9ceb09cc1be63930c29c9f1c1
      options: --user root
    permissions:
      pull-requests: read   # action-semantic-pull-request reads the PR title
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            docs
            test
            ci
            chore
          requireScope: false
          subjectPattern: ^.{1,72}$
          subjectPatternError: |
            PR title subject must be ≤72 characters.
            Current: "{subject}"

# ── Proto: Breaking-Change Detection + Stubs Freshness ───────────────────────
# Merged from proto-breaking + proto-stubs-fresh: both fire on proto changes,
# share the same checkout + fetch setup, and buf is already in ci-runner.
  proto-check:
    name: Proto backward compatibility
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/zynax-io/zynax/ci-runner@sha256:48a2646547cbe4066b3b9a82071c1f2b9e4f8ef9ceb09cc1be63930c29c9f1c1
      options: --user root
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Allow git to read workspace inside container
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Detect proto changes
        id: proto-detect
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          git fetch --depth=1 origin "$BASE_REF"
          proto_changed=$(git diff --name-only FETCH_HEAD HEAD -- 'protos/**/*.proto' | wc -l)
          stubs_changed=$(git diff --name-only FETCH_HEAD HEAD -- 'protos/generated/' | wc -l)
          echo "proto_changed=$proto_changed" >> "$GITHUB_OUTPUT"
          echo "stubs_changed=$stubs_changed" >> "$GITHUB_OUTPUT"

      - name: buf breaking (compare against base branch)
        if: steps.proto-detect.outputs.proto_changed != '0'
        working-directory: protos
        run: |
          buf breaking \
            --against \
            "https://github.com/${{ github.repository }}.git#branch=${{ github.event.pull_request.base.ref }},subdir=protos"

      - name: Check generated stubs are not stale
        if: steps.proto-detect.outputs.proto_changed != '0'
        run: |
          if [ -d protos/generated ] && [ "${{ steps.proto-detect.outputs.stubs_changed }}" -eq 0 ]; then
            echo "❌ .proto files changed but generated stubs were not updated."
            echo ""
            echo "Proto files modified:"
            git diff --name-only FETCH_HEAD HEAD -- 'protos/**/*.proto'
            echo ""
            echo "Fix: run  make generate-protos  and commit the updated stubs."
            exit 1
          fi
          if [ ! -d protos/generated ]; then
            echo "ℹ️  protos/generated/ does not exist yet (issue #12 tracks this)."
          else
            echo "✅ Generated stubs are up to date (or no protos changed)."
          fi

      - name: No proto changes
        if: steps.proto-detect.outputs.proto_changed == '0'
        run: echo "ℹ️  No .proto files changed — backward-compat and stubs checks skipped."

# ── Layer Boundary Enforcement ────────────────────────────────────────────────
  layer-boundaries:
    name: Layer boundary enforcement
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/zynax-io/zynax/ci-runner@sha256:48a2646547cbe4066b3b9a82071c1f2b9e4f8ef9ceb09cc1be63930c29c9f1c1
      options: --user root
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check for cross-layer imports
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          changed_go=$(git diff --name-only "${BASE}..${HEAD}" -- '*.go' | grep -v "_test.go" || true)
          violations=""

          for f in $changed_go; do
            [ -f "$f" ] || continue
            if echo "$f" | grep -q "/domain/"; then
              if grep -qE '".*/(api|infrastructure)/' "$f"; then
                violations="${violations}\n  ${f}: domain/ imports api/ or infrastructure/"
              fi
            fi
            if echo "$f" | grep -q "^protos/"; then
              if grep -qE '"github\.com/zynax-io/zynax/services/' "$f"; then
                violations="${violations}\n  ${f}: protos/ imports service business logic"
              fi
            fi
          done

          if [ -n "$violations" ]; then
            echo "❌ Layer boundary violations detected (AGENTS.md §1 / ADR-001):"
            printf "%b\n" "$violations"
            echo ""
            echo "See docs/adr/ADR-001-*.md for the three-layer separation rules."
            exit 1
          fi
          echo "✅ Layer boundaries respected"

# ── SPDD Canvas Freshness (feat: PRs only) ────────────────────────────────────
  canvas-freshness:
    name: SPDD Canvas freshness (feat only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/zynax-io/zynax/ci-runner@sha256:48a2646547cbe4066b3b9a82071c1f2b9e4f8ef9ceb09cc1be63930c29c9f1c1
      options: --user root
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: "Check Canvas present for feat: PRs"
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$PR_TITLE" | grep -qE '^feat(\([^)]+\))?:'; then
            echo "ℹ️  Not a feat: PR — Canvas check skipped."
            exit 0
          fi

          echo "feat: PR detected — checking for REASONS Canvas (ADR-019)..."

          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          canvas_in_pr=$(git diff --name-only "${BASE}..${HEAD}" -- 'docs/spdd/**/canvas.md' 'docs/spdd/*/canvas.md' | grep "canvas\.md" || true)
          canvas_existing=$(find docs/spdd -name "canvas.md" 2>/dev/null | head -1 || true)

          if [ -z "$canvas_in_pr" ] && [ -z "$canvas_existing" ]; then
            echo ""
            echo "❌ No REASONS Canvas found for this feat: PR."
            echo ""
            echo "Every feat: PR requires a Canvas committed before implementation."
            echo "Steps:"
            echo "  1. Run /spdd-analysis <issue> to research the feature"
            echo "  2. Run /spdd-reasons-canvas <issue> to generate the Canvas"
            echo "  3. Run /spdd-security-review docs/spdd/<issue>-<slug>/canvas.md"
            echo "  4. Commit docs/spdd/<issue>-<slug>/canvas.md before implementation"
            echo ""
            echo "See docs/patterns/spdd-guide.md and ADR-019."
            exit 1
          fi

          if [ -n "$canvas_in_pr" ]; then
            echo "Canvas file(s) in this PR:"
            echo "$canvas_in_pr"
          else
            echo "Existing canvas(es) in docs/spdd/:"
            find docs/spdd -name "canvas.md"
          fi

      - name: Validate touched canvases
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$PR_TITLE" | grep -qE '^feat(\([^)]+\))?:'; then
            exit 0
          fi

          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          canvas_in_pr=$(git diff --name-only "${BASE}..${HEAD}" -- 'docs/spdd/**/canvas.md' 'docs/spdd/*/canvas.md' | grep "canvas\.md" || true)

          if [ -n "$canvas_in_pr" ]; then
            failed=0
            for canvas in $canvas_in_pr; do
              dir=$(dirname "$canvas")
              echo "Validating $canvas ..."
              zynax-ci validate canvas "$dir" || failed=1
            done
            exit $failed
          else
            echo "No canvas in this PR diff — running validate-canvas on all existing canvases..."
            zynax-ci validate canvas docs/spdd/
          fi

# ── Git Conflict Marker Check ─────────────────────────────────────────────────
  conflict-markers:
    name: No conflict markers
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/zynax-io/zynax/ci-runner@sha256:48a2646547cbe4066b3b9a82071c1f2b9e4f8ef9ceb09cc1be63930c29c9f1c1
      options: --user root
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Scan changed files for conflict markers
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          changed=$(git diff --name-only "${BASE}..${HEAD}" | grep -v "^$" || true)
          if [ -z "$changed" ]; then echo "✅ No changed files"; exit 0; fi

          found=0
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            if grep -IqE '^(<{7} |={7}$|>{7} )' "$f" 2>/dev/null; then
              echo "❌ Conflict markers in: $f"
              grep -InE '^(<{7} |={7}$|>{7} )' "$f" | head -5
              found=1
            fi
          done <<< "$changed"

          if [ "$found" -eq 1 ]; then
            echo ""
            echo "Fix: resolve the conflict, remove the markers, and push again."
            exit 1
          fi
          echo "✅ No conflict markers found"

# ── Image Digest Alignment ───────────────────────────────────────────────────
  image-digest-alignment:
    name: Image digest alignment (images.yaml SoT)
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/zynax-io/zynax/ci-runner@sha256:48a2646547cbe4066b3b9a82071c1f2b9e4f8ef9ceb09cc1be63930c29c9f1c1
      options: --user root
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify all consumer files match images/images.yaml
        env:
          GOPROXY: https://proxy.golang.org,direct
          GONOSUMDB: "*"
        run: |
          cd cmd/zynax-ci
          GOWORK=off go run . images check --root "$GITHUB_WORKSPACE"
          echo "✅ All consumer digests match images/images.yaml"

# ── Milestone State Schema (ADVISORY — non-blocking) ─────────────────────────
# Validates state/milestone.yaml (machine-readable milestone SSoT, updated only
# by /milestone-close and /milestone-new) against state/milestone.schema.json.
# Advisory while the schema stabilizes — promote to a required check once stable.
  milestone-state:
    name: Milestone state schema (advisory)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    continue-on-error: true
    container:
      image: ghcr.io/zynax-io/zynax/ci-runner@sha256:48a2646547cbe4066b3b9a82071c1f2b9e4f8ef9ceb09cc1be63930c29c9f1c1
      options: --user root
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate state/milestone.yaml against schema
        run: |
          uv run --no-project --quiet --with pyyaml --with jsonschema \
            python3 scripts/validate_milestone_state.py

# ── Secret Scan (gitleaks) ────────────────────────────────────────────────────
  gitleaks-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/zynax-io/zynax/ci-runner@sha256:48a2646547cbe4066b3b9a82071c1f2b9e4f8ef9ceb09cc1be63930c29c9f1c1
      options: --user root
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Scan PR commit range for secrets
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            LOG_OPTS="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            LOG_OPTS="HEAD~1..HEAD"
          fi
          echo "── gitleaks scanning commit range: ${LOG_OPTS}"
          gitleaks detect \
            --source . \
            --log-opts "${LOG_OPTS}" \
            --config tools/gitleaks-ai-context.toml \
            --report-format json \
            --report-path /tmp/gitleaks-report.json \
            --verbose 2>&1 || {
            echo ""
            echo "❌ Secrets detected in PR commit range:"
            cat /tmp/gitleaks-report.json
            echo ""
            echo "Even if you deleted the secret in a later commit, it is still"
            echo "in git history and must be removed with git filter-repo."
            echo "See docs/knowledge-base-policy.md for guidance."
            exit 1
          }
          echo "✅ No secrets found in PR commit range"
