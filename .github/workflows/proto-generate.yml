# SPDX-License-Identifier: Apache-2.0
# Zynax — Post-merge Proto Stub Auto-regeneration
#
# Fires on every push to main that modifies .proto files or buf config.
# Runs buf generate. If stubs changed, opens a PR (branch protection prevents
# the bot from pushing signed commits directly to main).
#
# Relationship to the pre-merge freshness gate in ci.yml:
#   Pre-merge  — ci.yml "Generate stubs and check for drift" fails the PR if
#                stubs are not committed alongside the proto change.
#   Post-merge — this workflow opens a follow-up PR when stubs drift after merge.
#
# The two together: stubs verified before merge AND auto-corrected after merge.

name: Proto Stub Auto-regeneration

on:
  push:
    branches: [main]
    paths:
      - "protos/zynax/**/*.proto"
      - "protos/buf.yaml"
      - "protos/buf.gen.yaml"
      - "infra/docker/Dockerfile.tools"

permissions:
  contents: write
  pull-requests: write

env:
  BUF_VERSION: "1.69.0"

jobs:
  regenerate-stubs:
    name: regenerate-stubs
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          # Use GITHUB_TOKEN so the push back to main is authenticated.
          # Branch protection must allow github-actions[bot] pushes, or use
          # a PAT stored in secrets.BOT_GITHUB_TOKEN instead.
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Install buf
        run: |
          curl -fsSL \
            "https://github.com/bufbuild/buf/releases/download/v${BUF_VERSION}/buf-Linux-x86_64" \
            -o /usr/local/bin/buf
          chmod +x /usr/local/bin/buf
          buf --version

      - name: Regenerate Go and Python stubs
        working-directory: protos
        run: |
          buf generate --template buf.gen.yaml
          echo "✅ buf generate complete"

      - name: Open PR if stubs changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- protos/generated/; then
            echo "ℹ️  Stubs already up to date — no PR needed."
            exit 0
          fi

          git diff --stat -- protos/generated/

          BRANCH="chore/proto-regen-${GITHUB_SHA:0:7}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add protos/generated/
          git commit -m "$(printf 'chore(protos): regenerate Go and Python stubs\n\nAuto-generated: proto change on main (%s).\n\nAssisted-by: github-actions[bot]' "${GITHUB_SHA:0:7}")"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore(protos): regenerate Go and Python stubs" \
            --body "$(printf 'Auto-generated by proto-generate workflow.\n\nTriggered by commit %s on main.' "${GITHUB_SHA:0:7}")" \
            --base main \
            --head "$BRANCH"
          echo "✅ PR opened for regenerated stubs."
