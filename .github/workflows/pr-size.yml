# SPDX-License-Identifier: Apache-2.0
# PR Size Labeling — auto-labels PRs with size/S · size/M · size/L · size/XL
# based on net lines changed, excluding generated code, lock files, and docs.
#
# Deliberately kept in its own workflow so that the label write-back does NOT
# re-trigger pr-checks.yml. The previous design embedded this job inside
# pr-checks.yml (which also listened on `edited`), causing a feedback loop:
#   label applied → pull_request edited event → pr-checks.yml re-runs
#
# This file triggers only on code-change events (opened / synchronize / reopened),
# so the label write-back fires a `labeled` event that no workflow here subscribes to.

name: PR Size

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-size-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default — jobs that need more escalate per-job below (#1116).
permissions:
  contents: read

jobs:
  pr-size:
    name: PR size label
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write   # applies/removes size/* labels on the PR
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Label PR by size and enforce 800-line limit
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            // Exclude generated stubs, lock files, binary fixtures, changelogs,
            // CI workflow files, documentation-only paths (AGENTS.md, docs/, state/),
            // config/contract surfaces (images.yaml SoT, Helm charts, spec fixtures,
            // automation configs, Makefile), and narrative docs (CLAUDE/ROADMAP/README).
            // Keep this list in sync with CLAUDE.md §PR size.
            const skipPattern = /\.(pb\.go|pb\.py|sum|lock|png|jpg|gif|svg)$|\/generated\/|CHANGELOG\.md$|^\.github\/workflows\/|AGENTS\.md$|^docs\/|^state\/|^\.claude\/|^images\/images\.yaml$|^infra\/helm\/|^infra\/packages\/|^spec\/|^automation\/|^Makefile$|^CLAUDE\.md$|^ROADMAP\.md$|^README\.md$/;
            const lines = files
              .filter(f => !skipPattern.test(f.filename))
              .reduce((total, f) => total + f.additions + f.deletions, 0);

            const sizeLabel =
              lines <= 100  ? 'size/S'  :
              lines <= 400  ? 'size/M'  :
              lines <= 900  ? 'size/L'  : 'size/XL';

            // Apply the size/* label as a best-effort side effect. PRs from forks
            // run with a read-only GITHUB_TOKEN regardless of the job's requested
            // `pull-requests: write` scope, so the label write-back 403s. That must
            // NOT fail this required check — the size *enforcement* below still runs
            // on read-only access. Swallow the write error and warn instead.
            try {
              // Remove any existing size/* labels then apply the new one
              const { data: existing } = await github.rest.issues.listLabelsOnIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              for (const lbl of existing.filter(l => l.name.startsWith('size/'))) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: lbl.name,
                });
              }
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [sizeLabel],
              });
            } catch (err) {
              // Fork PRs get a read-only token → 403. Not fatal: the size gate below
              // still enforces the limit. Any other status is surfaced as a warning.
              core.warning(
                `Could not write the ${sizeLabel} label (status ${err.status ?? 'unknown'}): ${err.message}. ` +
                `This is expected for PRs from forks (read-only GITHUB_TOKEN); size enforcement still applies.`
              );
            }

            core.info(`PR changes: ${lines} lines (excluding generated/lock files) → ${sizeLabel}`);

            if (lines > 900) {
              core.setFailed(
                `PR is ${lines} lines — exceeds the 900-line hard limit.\n` +
                `Decompose this PR into smaller, reviewable units before requesting review.\n` +
                `See CONTRIBUTING.md §"PR Size Policy" for guidance.`
              );
            } else if (lines > 400) {
              core.warning(
                `PR is ${lines} lines — over the 400-line soft limit.\n` +
                `If it cannot be split, document the reason in the PR template.`
              );
            }
