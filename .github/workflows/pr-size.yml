# SPDX-License-Identifier: Apache-2.0
# PR Size gate — enforces the 900-line hard limit (warning at 400) based on
# net lines changed, excluding generated code, lock files, and docs.
#
# The size/* label write-back was removed: fork PRs (e.g. #1668) run with a
# read-only GITHUB_TOKEN, so the label write 403'd — failing the check until
# #1670 downgraded the write to best-effort. Nothing consumes size/* labels,
# so the write-back is gone entirely: the gate is read-only and needs no
# write scope or checkout.
#
# The job name stays "PR size label" — it is a required status check context
# in the main branch ruleset; renaming the job would orphan that requirement.

name: PR Size

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-size-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege (#1116) — the gate only reads PR file metadata.
permissions:
  contents: read

jobs:
  pr-size:
    name: PR size label
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - name: Enforce PR size limits
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            // Exclude generated stubs, lock files, binary fixtures, changelogs,
            // CI workflow files, documentation-only paths (AGENTS.md, docs/, state/),
            // config/contract surfaces (images.yaml SoT, Helm charts, spec fixtures,
            // automation configs, Makefile), and narrative docs (CLAUDE/ROADMAP/README).
            // Keep this list in sync with CLAUDE.md §PR size.
            const skipPattern = /\.(pb\.go|pb\.py|sum|lock|png|jpg|gif|svg)$|\/generated\/|CHANGELOG\.md$|^\.github\/workflows\/|AGENTS\.md$|^docs\/|^state\/|^\.claude\/|^images\/images\.yaml$|^infra\/helm\/|^infra\/packages\/|^spec\/|^automation\/|^Makefile$|^CLAUDE\.md$|^ROADMAP\.md$|^README\.md$/;
            const lines = files
              .filter(f => !skipPattern.test(f.filename))
              .reduce((total, f) => total + f.additions + f.deletions, 0);

            core.info(`PR changes: ${lines} lines (excluding generated/lock files)`);

            if (lines > 900) {
              core.setFailed(
                `PR is ${lines} lines — exceeds the 900-line hard limit.\n` +
                `Decompose this PR into smaller, reviewable units before requesting review.\n` +
                `See CONTRIBUTING.md §"PR Size Policy" for guidance.`
              );
            } else if (lines > 400) {
              core.warning(
                `PR is ${lines} lines — over the 400-line soft limit.\n` +
                `If it cannot be split, document the reason in the PR template.`
              );
            }
