# SPDX-License-Identifier: Apache-2.0
# CI Pipeline Workflow — real, runnable reference (EPIC T.3, #1208)
#
# Demonstrates: sequential CI stages, failure recovery, human gate, and
# cross-state DATA-FLOW bindings (ADR-029, EPIC W.4 #1178).
#
# Data-flow:
#   * the `build` state PUBLISHES the built image digest under `built_image`
#     via `output:`
#   * `deploy_staging` and `integration_test` CONSUME it through input
#     bindings rooted at "$.states.build.output.built_image".
#
# To apply: zynax apply spec/workflows/examples/ci-pipeline.yaml

kind: Workflow
apiVersion: zynax.io/v1

metadata:
  name: ci-pipeline-workflow
  namespace: platform
  version: "1.0.0"
  annotations:
    description: "Test → scan → build → deploy CI pipeline with image data-flow."

spec:
  initial_state: test

  triggers:
    - event: github.push
      filter:
        branch: "main"

  states:
    test:
      actions:
        - capability: run_tests
          input:
            repo: "{{ .trigger.repo }}"
            commit: "{{ .trigger.commit_sha }}"
          timeout: 30m
      on:
        - event: tests.passed
          goto: security_scan
        - event: tests.failed
          goto: notify_failure
        - event: tests.timeout
          goto: notify_failure

    security_scan:
      actions:
        - capability: run_security_scan
          input:
            commit: "{{ .trigger.commit_sha }}"
          timeout: 15m
      on:
        - event: scan.passed
          goto: build
        - event: scan.failed
          goto: block_merge
        - event: scan.findings
          guard: "severity == 'low'"
          goto: build    # low severity findings don't block

    # ── Build — PUBLISHES the image digest via output binding ──
    build:
      actions:
        - capability: build_image
          input:
            commit: "{{ .trigger.commit_sha }}"
            registry: "ghcr.io/zynax-io"
          timeout: 20m
          # Publish the action's `image_digest` result as `built_image`.
          output:
            built_image: image_digest
      on:
        - event: build.success
          goto: deploy_staging
        - event: build.failed
          goto: notify_failure

    # ── Deploy — CONSUMES the build digest via input binding ──
    deploy_staging:
      actions:
        - capability: deploy
          input:
            environment: "staging"
            # Data-flow binding: deploy exactly what `build` produced.
            image: "$.states.build.output.built_image"
          timeout: 10m
      on:
        - event: deploy.success
          goto: integration_test
        - event: deploy.failed
          goto: rollback

    integration_test:
      actions:
        - capability: run_integration_tests
          input:
            environment: "staging"
            # Same digest the workflow built and deployed.
            image: "$.states.build.output.built_image"
          timeout: 20m
      on:
        - event: integration.passed
          goto: done
        - event: integration.failed
          goto: rollback

    rollback:
      actions:
        - capability: rollback_deploy
          input:
            environment: "staging"
      on:
        - event: rollback.complete
          goto: notify_failure

    block_merge:
      type: human_in_the_loop
      actions:
        - capability: notify_human
          input:
            channel: "#security"
            message: "Security scan found HIGH findings on {{ .trigger.commit_sha }}"
      on:
        - event: human.approved
          goto: build
        - event: human.rejected
          goto: notify_failure

    notify_failure:
      type: terminal
      actions:
        - capability: notify_author
          input:
            message: "CI pipeline failed for {{ .trigger.commit_sha }}"
            channel: "#ci-failures"

    done:
      type: terminal
      actions:
        - capability: notify_author
          input:
            message: "CI pipeline passed — staging deployment live"
            channel: "#ci"
