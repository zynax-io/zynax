# SPDX-License-Identifier: Apache-2.0
# Code Review Workflow — EVENT-DRIVEN REFERENCE spec (EPIC T.3, #1208)
#
# ⚠ NOT a runnable CLI demo. This workflow is event-driven: it waits on external
# `github.*` / `review.*` / `human.*` events and dispatches capabilities
# (request_review, summarize_feedback, merge_pr, notify_human, notify_author,
# close_pr) that have no deployed agents. Applying it from the CLI alone just
# hangs — there is no event source to advance it. It needs the event-injection
# CLI (#1377) and backing agents before it can run.
#
# For a workflow that runs to WORKFLOW_STATUS_COMPLETED from the CLI alone, see
# code-review-ollama.yaml (dispatches the local Ollama-backed `codereview`
# capability over a git diff and transitions to a terminal state on completion).
#
# Demonstrates: loops, async events, human-in-the-loop, timeout handling, and
# cross-state DATA-FLOW bindings (ADR-029, EPIC W.4 #1178).
#
# Data-flow:
#   * the `fix` state's summarize_feedback action PUBLISHES its `summary`
#     result field under the context key `feedback_summary` via `output:`
#   * the `escalate` state CONSUMES it with an input binding rooted at
#     "$.states.fix.output.feedback_summary" — no template indirection.
#
# To apply:   zynax apply spec/workflows/examples/code-review.yaml
# To dry-run: zynax apply --dry-run spec/workflows/examples/code-review.yaml

kind: Workflow
apiVersion: zynax.io/v1

metadata:
  name: code-review-workflow
  namespace: engineering
  version: "1.0.0"
  labels:
    team: platform
    tier: production
  annotations:
    description: "Automated code review with feedback data-flow and human escalation."

spec:
  initial_state: review

  # Events that automatically trigger a NEW workflow instance.
  triggers:
    - event: github.pull_request.opened
      filter:
        repo: "zynax-io/zynax"
        base_branch: "main"

  states:
    # ── Review state ─────────────────────────────────────────────
    review:
      actions:
        - capability: request_review
          input:
            pr_url: "{{ .trigger.pr_url }}"
            reviewers: "{{ .context.assigned_reviewers }}"
          timeout: 24h   # If no review in 24h, emit review.timeout
      on:
        - event: review.approved
          goto: merge

        - event: review.needswork
          goto: fix
          # Carry the raw reviewer comments forward for the fix state.
          set:
            context.latest_feedback: "{{ .event.comments }}"

        - event: review.timeout
          goto: escalate
          guard: "escalation_count < 2"

        - event: review.timeout
          goto: abandon
          guard: "escalation_count >= 2"

    # ── Fix state — PUBLISHES a feedback summary via output binding ──
    fix:
      actions:
        - capability: summarize_feedback
          input:
            feedback: "{{ .context.latest_feedback }}"
          # Publish the action's `summary` result field as `feedback_summary`.
          output:
            feedback_summary: summary
      on:
        # Developer pushes a new commit → go back to review (the loop).
        - event: github.push
          goto: review
          set:
            context.escalation_count: "0"
        # Developer explicitly requests a re-review.
        - event: review.requested
          goto: review

    # ── Merge state ──────────────────────────────────────────────
    merge:
      actions:
        - capability: merge_pr
          input:
            pr_url: "{{ .trigger.pr_url }}"
            merge_strategy: "squash"
      on:
        - event: merge.success
          goto: done
        - event: merge.conflict
          goto: fix
          set:
            context.latest_feedback: "Merge conflict — please rebase"

    # ── Escalate state — CONSUMES the fix summary via input binding ──
    escalate:
      type: human_in_the_loop    # Workflow pauses here until a human signals.
      actions:
        - capability: notify_human
          input:
            channel: "#engineering"
            message: "PR needs manual review — timed out"
            # Data-flow binding: pull the summary published by the fix state.
            review_summary: "$.states.fix.output.feedback_summary"
      on:
        - event: human.approved
          goto: merge
        - event: human.needswork
          goto: fix
          set:
            context.latest_feedback: "{{ .event.feedback }}"
            context.escalation_count: "{{ add .context.escalation_count 1 }}"

    # ── Terminal states ──────────────────────────────────────────
    done:
      type: terminal
      actions:
        - capability: notify_author
          input:
            pr_url: "{{ .trigger.pr_url }}"
            message: "Your PR has been merged."
      # Return the review feedback summary published by the fix state as the
      # workflow's declared result (ADR-042). Demonstrates surfacing a data-flow
      # output (ADR-029) at the workflow boundary; on the review→fix→merge path
      # `zynax result <run>` would print `feedback_summary=<the summary>`.
      outputs:
        feedback_summary: "$.states.fix.output.feedback_summary"

    abandon:
      type: terminal
      actions:
        - capability: notify_author
          input:
            pr_url: "{{ .trigger.pr_url }}"
            message: "PR closed after repeated review timeouts."
        - capability: close_pr
          input:
            pr_url: "{{ .trigger.pr_url }}"
