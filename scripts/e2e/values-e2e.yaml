# SPDX-License-Identifier: Apache-2.0
#
# values-e2e.yaml — Helm value overrides shared by cluster-up.sh and
# helm-upgrade.sh so the zynax-umbrella release has an IDENTICAL shape across
# install, upgrade, and rollback in the ephemeral kind smoke cluster (EPIC G
# #770). Keep this file the single source of truth for e2e-only overrides;
# both scripts pass it with `-f`.
#
# These overrides are e2e-only. Production deployments provision the Postgres
# credentials Secret and a properly-privileged Temporal database role out of
# band (ADR-021); they do NOT use these values.

# ── Service images ──────────────────────────────────────────────────────────
# Pin all 7 services to the floating `main` tag, which CI publishes on every
# merge (pre-merge staging build + retag promotion, ADR-027). The chart default
# (Chart.AppVersion → "0.4.0") was never pushed to GHCR, so the default tag
# fails ImagePull. event-bus + memory-service images ship since #1089 (canvas
# 1086 O3), so both are enabled below and their CloudEvent / memory-Get
# assertions run unskipped (#1090, canvas 1086 O4).
#
# fullnameOverride (#1086 O2): the umbrella wires inter-service addresses as
# "zynax-<svc>" (registryAddr/compilerAddr/engineAddr/taskBrokerAddr), but the
# chart fullname for release `zynax` is "zynax-zynax-<svc>", so every cross-service
# call — and the capability-dispatch chain — fails DNS. Pinning each name to
# "zynax-<svc>" makes all those addresses resolve. (Same class as the Temporal /
# Postgres connectAddr overrides below.)
zynax-api-gateway:
  fullnameOverride: zynax-api-gateway
  image:
    tag: main
  # Behind the Gateway API edge (M8.F, ADR-044): api-gateway is ClusterIP; the
  # Envoy Gateway edge takes the host-mapped NodePort 30080, so kind's
  # host 8080 -> nodePort 30080 mapping now reaches the edge (kind-config.yaml
  # unchanged). e2e/demo/bench hit localhost:8080 -> edge -> api-gateway.
  service:
    type: ClusterIP
  edge:
    enabled: true
    nodePort: 30080
  # Enable the embedded Workflow CRD controller (ADR-043, M8.E) so
  # e2e-workflow-crd.sh can assert a Workflow CR reconciles to a dispatched run.
  # WATCH_NAMESPACE resolves to the pod namespace via the downward API.
  crdController:
    enabled: true
  # Engine allow-list VAP (ADR-045, M8.G): both matrix engines are allowed so
  # the existing CR happy-path admits on either leg; e2e-workflow-crd.sh
  # asserts a CR with an engine OUTSIDE this list is denied at admission.
  # Requires the kind ≥ 1.30 node image (#1634).
  admissionPolicy:
    enabled: true
    allowedEngines: [temporal, argo]
  # JetStream client identity (ADR-046 Decision #4): the broker is fail-closed
  # verify_and_map; the events client dials with the gateway's cert-manager
  # certificate. Decoupled from tlsSecretName — the e2e gRPC mesh profile is
  # unchanged.
  eventsTls:
    secretName: zynax-api-gateway-tls
zynax-workflow-compiler:
  fullnameOverride: zynax-workflow-compiler
  image:
    tag: main
zynax-engine-adapter:
  fullnameOverride: zynax-engine-adapter
  image:
    tag: main
  env:
    # Temporal frontend Service for release `zynax` is `zynax-temporal-frontend`
    # (subchart naming); the umbrella default is wrong, so correct it here.
    temporalHostPort: "zynax-temporal-frontend:7233"
  # JetStream client identity for the lifecycle-event publisher (ADR-046
  # Decision #4) — see the api-gateway eventsTls note above.
  eventsTls:
    secretName: zynax-engine-adapter-tls
zynax-task-broker:
  fullnameOverride: zynax-task-broker
  image:
    tag: main
zynax-agent-registry:
  fullnameOverride: zynax-agent-registry
  image:
    tag: main
  # CRD-native discovery path (ADR-039, #1571 O-step 6): the joint
  # first-run-on-CRD-path gate — dispatch flows Agent CR -> informer ->
  # SelectAgent; readiness reconciled from the echo-worker EndpointSlice.
  crdInformer:
    enabled: true
# event-bus + memory-service (#1090): enabled so e2e-happy.sh can assert the
# workflow.completed CloudEvent off NATS JetStream and a memory-service KV
# roundtrip. Requests are kept minimal so the trimmed smoke stack still fits
# the 2 CPU / 7 GB runner (#1091 owns the full right-sizing pass).
zynax-event-bus:
  enabled: true
  fullnameOverride: zynax-event-bus
  image:
    tag: main
  # The deprecated facade must dial the fail-closed verify_and_map broker with
  # its own cert-manager identity until its M9 removal (ADR-046): mounting the
  # secret sets the ZYNAX_EVENTBUS_TLS_* envs its NATS client-cert dial reads.
  tlsSecretName: zynax-event-bus-tls
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi
zynax-memory-service:
  enabled: true
  fullnameOverride: zynax-memory-service
  image:
    tag: main
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi
  redis:
    # Ephemeral smoke cluster — skip the PVC; Redis state does not need to
    # survive a pod restart inside a single gate run.
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 200m
        memory: 128Mi

# ── Resource right-sizing for the e2e smoke runner (#1091) ────────────────────
# The CI runner (ubuntu-latest, 2 CPU / 7 GB) is below the harness's documented
# 4 CPU / 8 GB minimum, so the full default stack drives the node into
# memory-pressure eviction. These overrides trim the smoke footprint WITHOUT
# touching the chart defaults (production is unchanged). See #1091 for the
# before/after analysis. Key levers: drop unused pods (NATS, Temporal Web UI),
# slash Temporal history shards, and cap the otherwise-unbounded Temporal pods.

# NATS backs event-bus (enabled above, #1090): the StatefulSet must run so the
# CloudEvent assertions have a JetStream to land on. Keep it as small as the
# smoke runner demands: cap the otherwise-unbounded server container, drop the
# config reloader (the smoke config never changes), and shrink the JetStream
# PVC. nats-box stays — e2e-happy.sh uses its `nats` CLI for the stream
# assertion.
zynax-nats:
  enabled: true
  nats:
    config:
      jetstream:
        fileStore:
          pvc:
            size: 1Gi
      # JetStream link TLS with cert-manager identities (ADR-046 Decision #4,
      # M8.H #1649): the broker requires client certificates and maps each to
      # a NATS user by subject DN (verify_and_map); per-identity subject
      # permissions bound the blast radius of any single compromised service.
      # The zynax-nats-tls / *-tls secrets are auto-issued by the
      # zynax-cert-manager subchart — zero manual secret steps (ADR-041).
      nats:
        tls:
          enabled: true
          secretName: zynax-nats-tls
          merge:
            ca_file: /etc/nats-certs/nats/ca.crt
            verify_and_map: true
      merge:
        authorization:
          users:
            - user: CN=zynax-engine-adapter
              permissions:
                publish: ["zynax.v1.engine-adapter.>", "$JS.API.>"]
                subscribe: ["_INBOX.>"]
            - user: CN=zynax-task-broker
              permissions:
                publish: ["zynax.v1.task-broker.>", "$JS.API.>"]
                subscribe: ["_INBOX.>"]
            - user: CN=zynax-api-gateway
              permissions:
                publish: ["zynax.v1.>", "$JS.API.>", "$JS.ACK.>"]
                subscribe: ["_INBOX.>", "zynax.dlq.>"]
            # The deprecated facade serves arbitrary publish/subscribe until
            # its M9 removal — widest identity, removed with it (ADR-046).
            - user: CN=zynax-event-bus
              permissions:
                publish: [">"]
                subscribe: [">"]
            # nats-box carries the e2e assertion CLI.
            - user: CN=zynax-natsbox
              permissions:
                publish: [">"]
                subscribe: [">"]
    natsBox:
      contexts:
        default:
          tls:
            secretName: zynax-natsbox-tls
          merge:
            url: tls://zynax-nats:4222
            ca: /etc/nats-certs/default/ca.crt
    container:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 400m
          memory: 256Mi
    reloader:
      enabled: false

# ── Postgres ────────────────────────────────────────────────────────────────
# Use a deterministic, pre-created credentials Secret (created by cluster-up.sh)
# instead of the chart's auto-generated password, so the Temporal schema Job and
# the temporal-db Secret can share a known password. The Secret must carry the
# keys configured in the postgres subchart (postgres-password + password).
#
# No e2e image override is needed (#1079, EPIC #1073 O7): the subchart ships
# the maintained Docker Official Image, digest-pinned via images/images.yaml
# (ADR-026). The interim deprecated-image override from #1069 was removed in #1076.
zynax-postgres:
  postgresql:
    auth:
      existingSecret: zynax-postgres-creds
    # Trim the reservation for a single-workflow smoke test (default is
    # 250m/256Mi req, 1000m/1Gi lim).
    primary:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

# ── Temporal ──────────────────────────────────────────────────────────────────
# Point the Temporal schema/connection at the Postgres SUPERUSER for the e2e
# cluster. The schema Job runs `temporal-sql-tool create-database`, which the
# non-privileged application role (zynax) cannot do; the superuser can. The
# temporal-db Secret (created by cluster-up.sh) carries this password.
# Merges into the subchart datastore config — connectAddr/databaseName/
# existingSecret from helm/charts/temporal/values.yaml are preserved. The
# subchart default connectAddr (`zynax-postgresql:5432`, fixed in #1077)
# matches the Service the postgres subchart creates for release `zynax`,
# so no connectAddr override is needed here anymore.
zynax-temporal:
  temporal:
    # The Web UI is not needed to run or assert a workflow — drop it (#1091).
    web:
      enabled: false
    server:
      config:
        persistence:
          # The kind cluster is always a fresh, ephemeral deploy, so lowering the
          # shard count is safe (it cannot change on an existing deployment) and
          # is the single biggest cut to Temporal-history memory. Default is 512.
          numHistoryShards: 4
          datastores:
            default:
              sql:
                user: postgres
                # Fewer Postgres backends for the smoke test (default 20/store).
                maxConns: 5
                maxIdleConns: 2
            visibility:
              sql:
                user: postgres
                maxConns: 5
                maxIdleConns: 2
      # Cap every Temporal server role (frontend/history/matching/worker), which
      # the upstream chart leaves unbounded (resources: {}). With 4 shards these
      # limits are comfortable and give the kubelet accurate accounting so the
      # node is never driven into memory-pressure eviction.
      resources:
        requests:
          cpu: 50m
          memory: 96Mi
        limits:
          cpu: 400m
          memory: 256Mi
    # admintools is only used to register the Temporal namespace — keep it tiny.
    admintools:
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
