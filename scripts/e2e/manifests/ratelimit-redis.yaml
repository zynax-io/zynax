# SPDX-License-Identifier: Apache-2.0
# Minimal Redis for the Envoy Gateway global rate-limit service (M8.F, ADR-044 §2).
# Only applied by cluster-up.sh when RATE_LIMIT_ENABLED=true. Envoy Gateway does
# not ship Redis; the rate-limit service needs a store to share counters across
# proxy replicas. Ephemeral (no persistence) — rate-limit counters are transient.
apiVersion: v1
kind: Namespace
metadata:
  name: redis-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: redis-system
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports: [{ containerPort: 6379 }]
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { cpu: 200m, memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: redis-system
spec:
  selector: { app: redis }
  ports: [{ port: 6379, targetPort: 6379 }]
