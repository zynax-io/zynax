#
# Zynax umbrella chart default values.
#
# Each top-level key matches the dependency name in Chart.yaml.
# Values nested under a key are passed through to the sub-chart's values.
# See individual chart values.yaml files for all configurable fields.
#
# Secrets (DB DSNs, TLS certs, API keys) are NEVER stored here.
# Provide them as K8s Secrets referenced via <chart>.db.secretName etc.

# ── Service charts ────────────────────────────────────────────────────────────

zynax-api-gateway:
  enabled: true
  replicaCount: 1
  env:
    compilerAddr: "zynax-workflow-compiler:50054"
    engineAddr: "zynax-engine-adapter:50055"
    registryAddr: "zynax-agent-registry:50052"
    logLevel: "info"

zynax-workflow-compiler:
  enabled: true
  replicaCount: 1
  env:
    logLevel: "info"

zynax-engine-adapter:
  enabled: true
  replicaCount: 1
  env:
    logLevel: "info"
    # Set temporalHostPort to the Temporal Frontend address within the cluster.
    # Default assumes the umbrella chart's zynax-temporal subchart is enabled.
    temporalHostPort: "zynax-umbrella-zynax-temporal-temporal-frontend:7233"
    taskBrokerAddr: "zynax-task-broker:50053"
    registryAddr: "zynax-agent-registry:50052"

zynax-task-broker:
  enabled: true
  replicaCount: 1
  env:
    registryAddr: "zynax-agent-registry:50052"
    logLevel: "info"
  # Set db.secretName to the K8s Secret containing ZYNAX_BROKER_DB_DSN.
  db:
    secretName: ""

zynax-agent-registry:
  enabled: true
  replicaCount: 1
  env:
    logLevel: "info"
  # Set db.secretName to the K8s Secret containing ZYNAX_REGISTRY_DB_DSN.
  db:
    secretName: ""

# Placeholder — disabled until EPIC I (#772) implementation merges.
# DEPRECATED (ADR-046, M8.H): services publish/subscribe directly over NATS
# JetStream via libs/zynaxevents; this gRPC facade is kept deployable through
# M8 only and is hard-removed in M9 together with its chart. Do not enable
# for new deployments.
zynax-event-bus:
  enabled: false

# Placeholder — disabled until EPIC J (#773) implementation merges.
zynax-memory-service:
  enabled: false

# ── Cluster dependency subcharts ──────────────────────────────────────────────

zynax-nats:
  enabled: true

zynax-postgres:
  enabled: true

zynax-temporal:
  enabled: true

# cert-manager resources — disabled by default.
# Enable only when cert-manager is pre-installed in the cluster.
# See helm/charts/cert-manager/templates/NOTES.txt for prerequisites.
zynax-cert-manager:
  enabled: false

# ── Observability (EPIC O #467, step O.8) ─────────────────────────────────────
# Master toggle for the in-cluster Uptrace backend (traces · metrics · logs ·
# APM · login UI). Off by default — telemetry is env-gated and adds zero
# overhead until services set ZYNAX_OTEL_EXPORTER_OTLP_ENDPOINT.
observability:
  enabled: false

# Uptrace subchart passthrough (only rendered when observability.enabled=true).
# Login credentials must come from a pre-created Secret — never set here.
# Point services at the in-cluster OTLP collector via:
#   ZYNAX_OTEL_EXPORTER_OTLP_ENDPOINT=http://<release>-zynax-uptrace-otel-collector:4317
# The chart's NOTES.txt prints the exact endpoint for your release/namespace.
zynax-uptrace:
  enabled: true
