# SPDX-License-Identifier: Apache-2.0
replicaCount: 1

image:
  repository: ghcr.io/zynax-io/zynax/engine-adapter
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to .Chart.AppVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 50055

# Non-secret env vars (prefix: ZYNAX_ENGINE_ADAPTER_)
env:
  grpcPort: 50055
  metricsPort: 9095
  logLevel: "info"
  temporalHostPort: "temporal-frontend:7233"
  temporalNamespace: "default"
  temporalTaskQueue: "engine-adapter"
  taskBrokerAddr: "zynax-task-broker:50053"
  # EventBusService gRPC address for lifecycle CloudEvents (ADR-022). The gRPC
  # client is lazy and publication is best-effort, so an unreachable address
  # never blocks workflow execution (e.g. when zynax-event-bus is disabled).
  # Direct JetStream events (ADR-046): the shared client dials NATS; the
  # EventBusService gRPC facade is deprecated and no longer a peer.
  natsURL: "nats://zynax-nats:4222"
  activeEngine: "temporal"
  # ArgoEngine connection settings — consumed only when activeEngine=argo
  # (ADR-015 pluggable engines). The configmap/deployment templates gate these
  # keys on activeEngine, so with the default Temporal engine the rendered
  # manifests are byte-identical to before these values existed. Defaults
  # mirror the binary's env defaults (cmd/engine-adapter/main.go).
  argoServerURL: "http://localhost:2746"
  argoNamespace: "argo"
  argoWorkflowTemplateRef: "zynax-ir-interpreter"
  # ServiceAccount bound to submitted Workflows; empty = cluster default.
  argoServiceAccount: ""
  grpcCallTimeoutS: 30
  maxActivityAttempts: 3
  livenessThresholdS: 60

# mTLS secret — set to empty string to disable TLS (dev only).
# When set, the secret must contain tls.crt, tls.key, and ca.crt.
tlsSecretName: ""

# JetStream client identity for direct eventing (ADR-046 Decision #4) —
# deliberately decoupled from tlsSecretName so the broker can require mTLS
# (verify_and_map) while the gRPC mesh profile stays unchanged. Set to the
# service's cert-manager secret to dial NATS with its client certificate.
eventsTls:
  secretName: ""

resources:
  requests:
    cpu: 200m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}
