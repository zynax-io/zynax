{{- if not .Values.postgresql.auth.existingSecret }}
# SPDX-License-Identifier: Apache-2.0
#
# Chart-managed credentials Secret — rendered ONLY when auth.existingSecret is
# empty (dev/e2e convenience). Production deployments MUST provision their own
# Secret out of band and set auth.existingSecret (ADR-021: no passwords in
# values files). On upgrade, previously generated passwords are reused via
# `lookup` so an initialised data volume never diverges from the Secret.
{{- $secretName := include "zynax-postgres.fullname" . }}
{{- $adminKey := .Values.postgresql.auth.secretKeys.adminPasswordKey }}
{{- $userKey := .Values.postgresql.auth.secretKeys.userPasswordKey }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $existingData := dict }}
{{- if $existing }}
{{- $existingData = $existing.data | default dict }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "zynax-postgres.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if hasKey $existingData $adminKey }}
  {{ $adminKey }}: {{ index $existingData $adminKey }}
  {{- else }}
  {{ $adminKey }}: {{ randAlphaNum 24 | b64enc }}
  {{- end }}
  {{- if hasKey $existingData $userKey }}
  {{ $userKey }}: {{ index $existingData $userKey }}
  {{- else }}
  {{ $userKey }}: {{ randAlphaNum 24 | b64enc }}
  {{- end }}
{{- end }}
