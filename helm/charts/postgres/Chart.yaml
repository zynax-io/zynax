# SPDX-License-Identifier: Apache-2.0
apiVersion: v2
name: zynax-postgres
description: >
  Postgres 17 subchart for Zynax — thin, project-owned chart around the
  Docker Official Image `postgres` (ADR-026). Provisions a single
  cluster-level StatefulSet. task-broker, agent-registry, and memory-service
  each use a dedicated schema (ADR-008 + ADR-021).
  No cross-schema access is permitted.
type: application
version: 0.3.0
appVersion: "17.10"
