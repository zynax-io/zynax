#
# Zynax Temporal subchart values.
# Overrides for the temporalio/temporal chart are nested under the `temporal:` key.
# See: https://github.com/temporalio/helm-charts
#
# Persistence: Temporal uses the cluster Postgres instance (zynax-postgres subchart,
# ADR-021/ADR-026). Two databases required: `temporal` (default store) and
# `temporal_visibility` (visibility store) — the schema Job creates them
# (useHelmHooks: false). Create the K8s Secret before installing:
#
#   kubectl create secret generic temporal-db \
#     --from-literal=password="<postgres-password>"
#
# The default connectAddr points to the `<release>-postgresql` Service the
# zynax-postgres subchart creates (helm/charts/postgres/templates/_helpers.tpl),
# assuming the umbrella release is named `zynax` — i.e. `zynax-postgresql`.
# Override if the release uses a different name or an external Postgres.

# temporalio/temporal chart overrides
temporal:
  # Run schema setup as a regular (non-hook) Job instead of a Helm pre-install
  # hook. The umbrella chart bundles Postgres in the SAME release, and a
  # pre-install hook runs BEFORE the Postgres StatefulSet exists, so the schema
  # job can never connect and `helm install` fails with
  # "failed pre-install: timed out waiting for the condition".
  # As a regular Job (backoffLimit) it is created alongside Postgres and
  # self-retries until the database is reachable; `helm --wait` then waits for it
  # to complete. This also matches GitOps installs (Flux/Argo) where hooks don't
  # apply. See helm/charts/temporal/charts/temporal/templates/server-job.yaml.
  schema:
    useHelmHooks: false
  server:
    replicaCount: 1
    image:
      repository: temporalio/server
      tag: "1.31.0"
      pullPolicy: IfNotPresent
    config:
      persistence:
        defaultStore: default
        visibilityStore: visibility
        numHistoryShards: 512
        datastores:
          default:
            sql:
              pluginName: postgres12_pgx
              driverName: postgres12_pgx
              databaseName: temporal
              connectAddr: "zynax-postgresql:5432"
              connectProtocol: "tcp"
              user: zynax
              existingSecret: temporal-db
              secretKey: password
              maxConns: 20
              maxIdleConns: 20
              maxConnLifetime: "1h"
          visibility:
            sql:
              pluginName: postgres12_pgx
              driverName: postgres12_pgx
              databaseName: temporal_visibility
              connectAddr: "zynax-postgresql:5432"
              connectProtocol: "tcp"
              user: zynax
              existingSecret: temporal-db
              secretKey: password
              maxConns: 20
              maxIdleConns: 20
              maxConnLifetime: "1h"
    metrics:
      annotations:
        enabled: true
      serviceMonitor:
        enabled: false

  # Temporal UI — exposes the workflow visibility UI on port 8080.
  ui:
    enabled: true
    image:
      repository: temporalio/ui
      tag: "2.34.0"
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 8080
