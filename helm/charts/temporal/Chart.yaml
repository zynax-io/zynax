# SPDX-License-Identifier: Apache-2.0
apiVersion: v2
name: zynax-temporal
description: >
  Temporal subchart for Zynax — wraps the temporalio/temporal chart and provides
  Zynax-specific value overrides. Engine-adapter connects to the Temporal Frontend
  service on port 7233. Pins Temporal server 1.31.0 (Helm chart 1.2.0).
type: application
version: 0.1.1
appVersion: "1.31.0"
dependencies:
  - name: temporal
    version: "1.2.0"
    repository: "https://go.temporal.io/helm-charts"
