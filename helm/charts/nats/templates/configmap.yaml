# JetStream stream configuration reference for Zynax eventing (ADR-046).
# This ConfigMap documents the required stream topology. Actual stream
# creation is performed on demand by the shared libs/zynaxevents client when
# services publish/subscribe directly over JetStream.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-jetstream-config
  labels:
    app.kubernetes.io/name: zynax-nats
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: zynax
data:
  streams.yaml: |
    # Zynax JetStream stream definitions (reference — see
    # docs/patterns/direct-jetstream-events.md). libs/zynaxevents derives these
    # streams on demand. Operators may use this ConfigMap to verify the expected
    # topology against a running NATS instance.
    {{- range .Values.jetstream.streams }}
    - name: {{ .name }}
      subjects: {{ .subjects | toJson }}
      retention: {{ .retention }}
      maxAge: {{ .maxAge }}
      storage: {{ .storage }}
    {{- end }}
