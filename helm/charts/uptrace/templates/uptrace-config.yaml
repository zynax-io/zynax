# Uptrace backend config — wires the single-binary to ClickHouse + Postgres.
# The project token is injected at runtime from the Secret via UPTRACE_PROJECT_TOKEN
# (template var ${UPTRACE_PROJECT_TOKEN}); no credentials are committed here.
{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "uptrace.fullname" . }}
  labels:
    {{- include "uptrace.labels" . | nindent 4 }}
    app.kubernetes.io/component: uptrace
data:
  uptrace.yml: |
    ch:
      addr: {{ include "uptrace.fullname" . }}-clickhouse:{{ .Values.clickhouse.port }}
      database: {{ .Values.clickhouse.database }}

    pg:
      addr: {{ include "uptrace.fullname" . }}-postgres:{{ .Values.postgres.port }}
      user: {{ .Values.postgres.user }}
      password: ${PG_PASSWORD}
      database: {{ .Values.postgres.database }}

    listen:
      grpc:
        addr: ":{{ .Values.uptrace.ports.grpc }}"
      http:
        addr: ":{{ .Values.uptrace.ports.http }}"

    projects:
      - id: 1
        name: zynax
        token: ${UPTRACE_PROJECT_TOKEN}

    auth:
      users:
        - email: ${UPTRACE_ADMIN_EMAIL}
          password: ${UPTRACE_ADMIN_PASSWORD}
{{- end }}
