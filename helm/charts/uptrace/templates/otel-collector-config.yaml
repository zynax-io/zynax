# OpenTelemetry Collector config — OTLP receivers + Uptrace exporter pipelines.
{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "uptrace.fullname" . }}-otel-collector
  labels:
    {{- include "uptrace.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
data:
  otel-collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:{{ .Values.collector.ports.grpc }}
          http:
            endpoint: 0.0.0.0:{{ .Values.collector.ports.http }}
    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 25
      batch:
        timeout: 5s
    exporters:
      otlp/uptrace:
        endpoint: {{ include "uptrace.fullname" . }}:{{ .Values.uptrace.ports.grpc }}
        tls:
          insecure: true
        headers:
          uptrace-dsn: http://${UPTRACE_PROJECT_TOKEN}@{{ include "uptrace.fullname" . }}:{{ .Values.uptrace.ports.http }}?grpc={{ .Values.uptrace.ports.grpc }}
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/uptrace]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/uptrace]
        # Logs forwarded verbatim — trace_id/span_id preserved end-to-end
        # (docs/observability/naming-conventions.md).
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/uptrace]
{{- end }}
