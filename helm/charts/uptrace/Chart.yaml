apiVersion: v2
name: zynax-uptrace
description: >
  In-cluster Uptrace observability backend for the Zynax platform: a
  single-binary Uptrace deployment (traces · metrics · logs · APM · service
  map · login UI) with its ClickHouse + Postgres storage dependencies, an
  OpenTelemetry Collector that fronts OTLP ingest for all services and
  adapters, a Service for the in-cluster OTLP endpoint, and an optional
  Ingress for the login UI (EPIC O #467, step O.8).

  Gated by the umbrella-level `observability.enabled` toggle — telemetry is
  off by default and adds zero overhead when disabled (canvas Safeguards).

  Login credentials MUST come from a pre-created Secret (uptrace.existingSecret)
  — this chart ships no committed default admin password (canvas Safeguards).
type: application
version: 0.1.0
appVersion: "1.7.0"
