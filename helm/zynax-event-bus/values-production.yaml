# PLACEHOLDER — do NOT deploy until EPIC I (#772) ships.
# Production overrides left as template for future use.
replicaCount: 2

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Wire the cert-manager issued certificate secret (ADR-020).
tlsSecretName: "zynax-event-bus-tls"
