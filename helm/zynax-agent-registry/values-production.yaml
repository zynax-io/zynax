# SPDX-License-Identifier: Apache-2.0
# Production overrides — do NOT store secret values here.
# DB DSN and TLS are wired from K8s Secrets (see values.yaml db.* and tlsSecretName).
replicaCount: 2

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Wire the Postgres DSN secret created by the Postgres subchart or external secret operator.
db:
  secretName: "agent-registry-db"
  secretKey: "dsn"

# Wire the cert-manager issued certificate secret (ADR-020).
tlsSecretName: "zynax-agent-registry-tls"
