# SPDX-License-Identifier: Apache-2.0
replicaCount: 1

image:
  repository: ghcr.io/zynax-io/zynax/agent-registry
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to .Chart.AppVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

# RBAC for the CRD-native scheduler (ADR-039): read Agent CRs, write their
# status subresource, read EndpointSlices, hold the reconciler Lease.
rbac:
  create: true

# CRD-native scheduler (ADR-039): watch Agent CRs, serve SelectAgent, and
# reconcile Agent readiness from EndpointSlices. promUrl points selection-time
# metrics at a Prometheus HTTP API; empty runs the (correct) degraded
# readiness-filtered mode.
crdInformer:
  enabled: false
  promUrl: ""

service:
  type: ClusterIP
  port: 50052

# Non-secret env vars (prefix: ZYNAX_REGISTRY_)
env:
  grpcPort: 50052
  logLevel: "info"

# The registry is STATELESS (ADR-039): agent identity lives in the Agent
# custom resource; on restart the scheduler resyncs its index from the API
# server. There is no database. (The push-era Postgres wiring was removed
# in M8; see docs/patterns/agent-crd-migration.md.)

# mTLS secret — set to empty string to disable TLS (dev only).
# When set, the secret must contain tls.crt, tls.key, and ca.crt.
tlsSecretName: ""

resources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    cpu: 250m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}
