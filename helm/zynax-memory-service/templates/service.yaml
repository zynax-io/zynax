apiVersion: v1
kind: Service
metadata:
  name: {{ include "zynax.fullname" . }}
  labels:
    {{- include "zynax.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  # component: server scopes the selector to the gRPC Deployment pods only.
  # Without it the selector is a subset of the Redis StatefulSet pod labels
  # (name+instance), so ClusterIP traffic / port-forward can route to Redis.
  selector:
    {{- include "zynax.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
