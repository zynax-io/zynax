apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "zynax.fullname" . }}
  labels:
    {{- include "zynax.labels" . | nindent 4 }}
spec:
  # Scoped to the gRPC server pods. The previous unscoped selector also matched
  # the Redis pod, whose only allowed ingress would then be the gRPC port —
  # blocking memory-service → Redis :6379 on a NetworkPolicy-enforcing CNI.
  podSelector:
    matchLabels:
      {{- include "zynax.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: {{ .Values.env.grpcPort }}
          protocol: TCP
  egress:
    # DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Redis KV plane (dedicated StatefulSet, ADR-008)
    - ports:
        - port: 6379
          protocol: TCP
    {{- if .Values.pgvector.secretName }}
    # Postgres pgvector plane (ADR-021: Postgres-backed)
    - ports:
        - port: 5432
          protocol: TCP
    {{- end }}
