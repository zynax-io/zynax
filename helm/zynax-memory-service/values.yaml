# SPDX-License-Identifier: Apache-2.0
#
# PLACEHOLDER CHART — Awaiting EPIC J (#773) memory-service implementation.
# This chart establishes the K8s resource structure for CI linting before
# the service implementation lands. Do NOT deploy until EPIC J merges.
#
replicaCount: 1

image:
  # TODO(EPIC-J #773): replace placeholder with actual image once memory-service ships
  repository: ghcr.io/zynax-io/zynax/memory-service
  pullPolicy: IfNotPresent
  tag: "placeholder"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  # gRPC port for MemoryService. Port 50057 reserved for memory-service.
  port: 50057

# Non-secret env vars (prefix: ZYNAX_MEMORY_)
env:
  grpcPort: 50057
  logLevel: "info"
  # Redis URL — must be set to the Redis service DNS when deploying.
  # Format: redis://<host>:<port>
  # Default points to the in-chart Redis StatefulSet headless service.
  redisURL: "redis://zynax-memory-service-redis:6379"
  # Postgres DSN for pgvector plane — sourced from a K8s Secret (ADR-021).
  # Set pgvector.secretName to enable the pgvector adapter.

# Redis StatefulSet — dedicated to memory-service (ADR-008; no other chart may use this).
redis:
  enabled: true
  image:
    repository: redis
    tag: "7.2-alpine"
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    # Adjust storageClassName to match your cluster's storage provisioner.
    storageClassName: ""
    size: 1Gi
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

# pgvector connection secret — sourced from a K8s Secret (ADR-021).
# Set secretName to enable the pgvector adapter in the memory-service Go binary.
# The Secret must contain a key matching pgvector.secretKey (default: dsn).
# Leave pgvector.secretName empty to skip (KV-only mode).
#
# Example Secret:
#   kubectl create secret generic memory-service-pgvector \
#     --from-literal=dsn="postgres://user:pass@postgres:5432/memory_service?sslmode=require"
pgvector:
  secretName: ""
  secretKey: "dsn"

# mTLS secret — set to empty string to disable TLS (dev only).
# When set, the secret must contain tls.crt, tls.key, and ca.crt.
tlsSecretName: ""

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}
