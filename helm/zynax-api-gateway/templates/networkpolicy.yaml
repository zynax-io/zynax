# SPDX-License-Identifier: Apache-2.0
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "zynax.fullname" . }}
  labels:
    {{- include "zynax.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "zynax.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.edge.enabled }}
    # ADR-044 §4a: with the edge enabled, the api-gateway HTTP port is reachable
    # ONLY from the Envoy Gateway edge — no unauthenticated in-cluster bypass of
    # the now-deleted in-process auth.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
      ports:
        - port: {{ .Values.env.httpPort }}
          protocol: TCP
    {{- else }}
    - ports:
        - port: {{ .Values.env.httpPort }}
          protocol: TCP
    {{- end }}
    # metrics scrape (Prometheus) — always open.
    - ports:
        - port: 9090
          protocol: TCP
  egress:
    # DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Upstream gRPC services
    - ports:
        - port: 50052
          protocol: TCP
        - port: 50054
          protocol: TCP
        - port: 50055
          protocol: TCP
