# SPDX-License-Identifier: Apache-2.0
replicaCount: 1

image:
  repository: ghcr.io/zynax-io/zynax/api-gateway
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to .Chart.AppVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

# Embedded Workflow CRD controller (ADR-043, M8.E). Off by default: when
# disabled, api-gateway serves only the REST apply path and starts no
# controller-runtime manager. When enabled, a namespaced, Lease-elected manager
# reconciles Workflow CRs (zynax.io/v1alpha1) through the existing compile->submit
# path. The CRD itself ships in crds/ and installs regardless of this flag.
crdController:
  enabled: false
  rbac:
    # Create the namespaced Role/RoleBinding for the controller (Workflow CRs +
    # workflows/status + leases). Bound to the api-gateway ServiceAccount.
    create: true
  # Namespace the controller watches. Empty => resolved at runtime from the
  # downward-API (the pod's own namespace); a cluster-scoped watch is never used.
  watchNamespace: ""

service:
  type: ClusterIP
  port: 8080
  # nodePort is only rendered when type is NodePort (e.g. the e2e kind cluster,
  # which maps host 8080 -> nodePort 30080). Null by default so production
  # ClusterIP deployments are unaffected.
  nodePort: null

# Non-secret env vars for the api-gateway (prefix: ZYNAX_GW_)
env:
  httpPort: 8080
  compilerAddr: "zynax-workflow-compiler:50054"
  engineAddr: "zynax-engine-adapter:50055"
  # NATS JetStream URL consumed by the /logs SSE merge (#1182) to stream
  # per-workflow capability CloudEvents — direct via the shared events client
  # (ADR-046; the EventBusService gRPC facade was retired in M9, #1700). The
  # connection retries in the background and the subscription is best-effort, so
  # an unreachable broker falls back to engine-history-only logs (e.g. the
  # ADR-041 lite profile, which ships no NATS).
  natsURL: "nats://zynax-nats:4222"
  logLevel: "info"
  grpcCallTimeoutS: 30
  livenessThresholdS: 60

# Gateway API edge (M8.F, ADR-044). When enabled, an Envoy Gateway fronts the
# api-gateway and enforces bearer auth (SecurityPolicy) + a profile-gated global
# rate-limit — replacing the in-process middleware. Off by default; the Envoy
# Gateway controller must be installed first (cluster-up.sh EDGE_ENABLED, #1623).
edge:
  enabled: false
  # Gateway HTTP listener port (the Envoy proxy fronts the api-gateway Service).
  listenerPort: 80
  # Secret (Opaque, client-name -> BARE key; no "Bearer " prefix) the
  # SecurityPolicy checks. Created out-of-band (cluster-up.sh), like the legacy
  # api-key Secret. Envoy extracts the credential from "Authorization: Bearer <key>".
  apiKeySecretName: zynax-edge-apikey
  # Fixed NodePort for the Envoy proxy Service so the kind host:port contract
  # reaches the edge. Empty => the proxy Service keeps its default type.
  nodePort: null
  # Global rate-limit (BackendTrafficPolicy) across all replicas — off by
  # default. Needs Envoy's rate-limit service + Redis (cluster-up.sh
  # RATE_LIMIT_ENABLED); profile-gated, off in the #1370 quickstart (ADR-041 §2a).
  rateLimit:
    enabled: false
    requests: 100
    unit: Minute


# Engine allow-list admission policy (M8.G, ADR-045). When enabled, a CEL
# ValidatingAdmissionPolicy bound to the Workflow CR (ADR-043) denies a CR
# whose spec.engine is not in allowedEngines; unset/empty spec.engine always
# admits (platform default engine). Requires Kubernetes >= 1.30 (VAP GA).
# Default OFF: admission is fail-closed where the compiler's REST-path gate is
# fail-open — enabling is a deliberate per-deployment choice. The REST path
# stays guarded by the compiler gate (ADR-045 §3 dual-guard). Multi-namespace
# policy = one binding + params object per namespace.
admissionPolicy:
  enabled: false
  # Engines this release namespace may use. Empty list = no restriction
  # (mirrors the compiler gate semantics).
  allowedEngines: []

# mTLS secret — set to empty string to disable TLS (dev only).
# When set, the secret must contain tls.crt, tls.key, and ca.crt.
tlsSecretName: ""

# JetStream client identity for direct eventing (ADR-046 Decision #4) —
# deliberately decoupled from tlsSecretName so the broker can require mTLS
# (verify_and_map) while the gRPC mesh profile stays unchanged. Set to the
# service's cert-manager secret to dial NATS with its client certificate.
eventsTls:
  secretName: ""

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}
