apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "zynax.fullname" . }}
  labels:
    {{- include "zynax.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "zynax.selectorLabels" . | nindent 6 }}
