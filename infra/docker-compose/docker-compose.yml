# Zynax — local development stack
#
# Starts all five platform services plus their dependencies.
# Usage:
#   make run-local       # build images + start all services
#   make stop-local      # stop and remove containers
#   make logs-local      # tail all service logs
#
# Host port map (70xx range):
#   7080  → api-gateway HTTP       export ZYNAX_API_URL=http://localhost:7080
#   7233  → Temporal gRPC
#   7088  → Temporal Web UI        http://localhost:7088
#   7422  → NATS client            (optional direct access)
#
# Internal-only (no host port — Docker network only):
#   agent-registry :50052, task-broker :50053
#
# Not included (M6+):
#   memory-service, event-bus

services:

  # ── Infrastructure ─────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  temporal:
    image: temporalio/auto-setup:1.25.2
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgres
      SKIP_DEFAULT_NAMESPACE_CREATION: "false"
      DEFAULT_NAMESPACE: default
      DEFAULT_NAMESPACE_RETENTION: 7d
      LOG_LEVEL: warn
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "IP=$$(getent hosts $$(hostname) | awk '{print $$1}' | head -1) && temporal workflow list --namespace default --address $${IP}:7233"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:2.34.0
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: "http://localhost:7088"
    ports:
      - "7088:8080"
    depends_on:
      temporal:
        condition: service_healthy

  nats:
    image: nats:2.12-alpine
    command: ["--jetstream", "--store_dir=/data", "--http_port=8222"]
    ports:
      - "7422:4222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ── Dev TLS cert generator ──────────────────────────────────────────────
  # Generates a self-signed CA + per-service leaf certs into the certs-data
  # volume. Set ZYNAX_TLS_CERT/KEY/CA on each service to enable mTLS.
  # Leave those env vars unset (default) to keep insecure mode for local dev.

  cert-gen:
    image: alpine/openssl:latest
    volumes:
      - certs-data:/certs
    entrypoint:
      - sh
      - -c
      - |
        set -e
        [ -f /certs/ca.pem ] && exit 0
        openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:P-256 \
          -keyout /certs/ca-key.pem -out /certs/ca.pem -days 3650 \
          -nodes -subj "/CN=zynax-dev-ca"
        for svc in api-gateway workflow-compiler engine-adapter task-broker agent-registry; do
          openssl req -newkey ec -pkeyopt ec_paramgen_curve:P-256 \
            -keyout /certs/$$svc-key.pem -out /certs/$$svc-csr.pem \
            -nodes -subj "/CN=$$svc"
          openssl x509 -req -in /certs/$$svc-csr.pem -CA /certs/ca.pem \
            -CAkey /certs/ca-key.pem -CAcreateserial \
            -out /certs/$$svc-cert.pem -days 3650 \
            -extfile <(printf "subjectAltName=DNS:$$svc,DNS:localhost")
        done

  # ── Zynax service Postgres (separate from Temporal's Postgres) ──────────
  # task-broker and agent-registry each own a separate database in this instance.
  # Never used by Temporal. Connection string: postgres://zynax:zynax@postgres-zynax:5432/<db>?sslmode=disable

  postgres-zynax:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zynax
      POSTGRES_PASSWORD: zynax
      POSTGRES_DB: zynax
    volumes:
      - postgres-zynax-data:/var/lib/postgresql/data
      - ./postgres-zynax-init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zynax"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  # ── Platform services ───────────────────────────────────────────────────

  agent-registry:
    image: ghcr.io/zynax-io/zynax/agent-registry:main
    build:
      context: ../..
      dockerfile: services/agent-registry/Dockerfile
    environment:
      ZYNAX_REGISTRY_GRPC_PORT: "50052"
      ZYNAX_REGISTRY_LOG_LEVEL: info
    healthcheck:
      test: ["CMD", "/healthcheck", "tcp://localhost:50052"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  task-broker:
    image: ghcr.io/zynax-io/zynax/task-broker:main
    build:
      context: ../..
      dockerfile: services/task-broker/Dockerfile
    environment:
      ZYNAX_BROKER_GRPC_PORT: "50053"
      ZYNAX_BROKER_REGISTRY_ADDR: "agent-registry:50052"
      ZYNAX_BROKER_LOG_LEVEL: info
      ZYNAX_BROKER_DB_ENABLED: "true"
      ZYNAX_BROKER_DB_DSN: "postgres://zynax:zynax@postgres-zynax:5432/task_broker?sslmode=disable"
    depends_on:
      agent-registry:
        condition: service_healthy
      postgres-zynax:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/healthcheck", "tcp://localhost:50053"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  workflow-compiler:
    image: ghcr.io/zynax-io/zynax/workflow-compiler:main
    build:
      context: ../..
      dockerfile: services/workflow-compiler/Dockerfile
    environment:
      ZYNAX_WC_PORT: "50054"
      ZYNAX_WC_METRICS_PORT: "9094"
      ZYNAX_WC_LOG_LEVEL: info
    healthcheck:
      test: ["CMD", "/healthcheck", "http://localhost:9094/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  engine-adapter:
    image: ghcr.io/zynax-io/zynax/engine-adapter:main
    build:
      context: ../..
      dockerfile: services/engine-adapter/Dockerfile
    environment:
      ZYNAX_ENGINE_ADAPTER_GRPC_PORT: "50055"
      ZYNAX_ENGINE_ADAPTER_METRICS_PORT: "9095"
      ZYNAX_ENGINE_ADAPTER_LOG_LEVEL: info
      ZYNAX_ENGINE_ADAPTER_TEMPORAL_HOST_PORT: temporal:7233
      ZYNAX_ENGINE_ADAPTER_TEMPORAL_NAMESPACE: default
      ZYNAX_ENGINE_ADAPTER_TEMPORAL_TASK_QUEUE: engine-adapter
      ZYNAX_ENGINE_ADAPTER_TASK_BROKER_ADDR: "task-broker:50053"
      ZYNAX_ENGINE_ADAPTER_ACTIVE_ENGINE: temporal
    depends_on:
      temporal:
        condition: service_healthy
      task-broker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/healthcheck", "http://localhost:9095/readyz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  api-gateway:
    image: ghcr.io/zynax-io/zynax/api-gateway:main
    build:
      context: ../..
      dockerfile: services/api-gateway/Dockerfile
    environment:
      ZYNAX_GW_HTTP_PORT: "8080"
      ZYNAX_GW_COMPILER_ADDR: workflow-compiler:50054
      ZYNAX_GW_ENGINE_ADDR: engine-adapter:50055
      ZYNAX_GW_REGISTRY_ADDR: "agent-registry:50052"
      ZYNAX_GW_LOG_LEVEL: info
      ZYNAX_GW_DEV_INSECURE: "1"
    ports:
      - "7080:8080"
    depends_on:
      workflow-compiler:
        condition: service_healthy
      engine-adapter:
        condition: service_healthy
      agent-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/healthcheck", "http://localhost:8080/readyz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── Adapters ────────────────────────────────────────────────────────────

  git-adapter:
    image: ghcr.io/zynax-io/zynax/git-adapter:main
    build:
      context: ../..
      dockerfile: agents/adapters/git/Dockerfile
    environment:
      ADAPTER_CONFIG: /etc/git-adapter/config.yaml
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    depends_on:
      agent-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/healthcheck", "tcp://localhost:50060"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  ci-adapter:
    image: ghcr.io/zynax-io/zynax/ci-adapter:main
    build:
      context: ../..
      dockerfile: agents/adapters/ci/Dockerfile
    environment:
      ADAPTER_CONFIG: /etc/ci-adapter/config.yaml
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    depends_on:
      agent-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/healthcheck", "tcp://localhost:50055"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  llm-adapter:
    image: ghcr.io/zynax-io/zynax/llm-adapter:main
    build:
      context: ../..
      dockerfile: agents/adapters/llm/Dockerfile
    environment:
      AGENT_ID: llm-adapter
      ADAPTER_ENDPOINT: "llm-adapter:50057"
      REGISTRY_ADDR: "agent-registry:50052"
      ZYNAX_LLM_ADAPTER_GRPC_PORT: "50057"
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      LLM_MODEL: ${LLM_MODEL:-llama3.2}
    depends_on:
      agent-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 50057), 2).close()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  langgraph-adapter:
    image: ghcr.io/zynax-io/zynax/langgraph-adapter:main
    build:
      context: ../..
      dockerfile: agents/adapters/langgraph/Dockerfile
    environment:
      AGENT_ID: langgraph-adapter
      ADAPTER_ENDPOINT: "langgraph-adapter:50058"
      REGISTRY_ADDR: "agent-registry:50052"
      ZYNAX_LANGGRAPH_ADAPTER_GRPC_PORT: "50058"
      LANGGRAPH_MOUNTS: '[{"capability_name":"echo","module":"examples.echo_graph","graph":"graph"}]'
    depends_on:
      agent-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 50058), 2).close()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres-data:
  postgres-zynax-data:
  nats-data:
  certs-data:
